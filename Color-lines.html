/* info */

.next-wrap {

.next-label { font-size: 0.68rem; color: #6c8fb0; letter-spacing: 1px; flex-shrink: 0; }

/* board */
.board-wrap {
  background: #0a1018;
  border-radius: 28px;
  padding: 10px;
  margin-bottom: 14px;
}
.board {
  display: grid;
  gap: 4px;
}
.cell {
  border-radius: 8px;
  background: #141e2a;
  border: 1px solid #1e2a3a;
  position: relative;
  cursor: pointer;
  transition: background 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.cell:active { background: #1a2a3a; }
.cell.highlight { background: rgba(246,180,95,0.12); border-color: rgba(246,180,95,0.3); }
.cell.path-hint { background: rgba(46,204,113,0.08); border-color: rgba(46,204,113,0.2); }

/* ball */
.ball {
  width: 78%;
  height: 78%;
  border-radius: 50%;
  position: absolute;
  transition: transform 0.12s;
  pointer-events: none;
}
.ball::after {
  content: '';
  position: absolute;
  width: 32%;
  height: 32%;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  top: 12%;
  left: 18%;
}
.ball.selected {
  animation: bounce 0.5s ease-in-out infinite alternate;
}
@keyframes bounce {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-20%) scale(1.08); }
}
.ball.pop {
  animation: popOut 0.3s ease-out forwards;
}
@keyframes popOut {
  0%   { transform: scale(1); opacity: 1; }
  50%  { transform: scale(1.4); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}
.ball.appear {
  animation: ballAppear 0.25s ease-out forwards;
}
@keyframes ballAppear {
  0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
  70%  { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">COLOR LİNES</div>
      <div class="sub">SilverCompass · Strateji & Planlama</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="info-bar">
    <div class="info-box">Skor: <span id="scoreNum">0</span></div>
    <div class="info-box">🏆 <span id="bestNum">—</span></div>
    <button class="new-btn" id="newBtn">↺ Yeni</button>
  </div>

  <div class="next-wrap">
    <div class="next-label">SIRA:</div>
    <div class="next-balls" id="nextBalls"></div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="footer">Topu seç → boş hücreye taşı · 5+ aynı renk = patlama · Yeni top gelmeden çizgi kur!</div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon">🎨</div>
    <div class="overlay-title">OYUN BİTTİ</div>
    <div class="overlay-msg" id="overlayMsg"></div>
    <button class="overlay-btn" id="overlayBtn">Tekrar Oyna</button>
  </div>
</div>

<script>
(function () {

  var GRID     = 9;   /* 9x9 board */
  var NEW_EACH = 3;   /* 3 new balls per turn */
  var MIN_LINE = 5;   /* minimum line length to clear */
  var COLORS   = [
    '#E74C3C', /* red */
    '#3498DB', /* blue */
    '#2ECC71', /* green */
    '#F6B45F', /* orange */
    '#9B59B6', /* purple */
    '#F1C40F', /* yellow */
    '#1ABC9C'  /* teal */
  ];

  var board       = [];   /* 0 = empty, 1-7 = color index+1 */
  var selected    = -1;   /* index of selected cell */
  var nextColors  = [];   /* upcoming 3 ball colors */
  var score       = 0;
  var bestScore   = parseInt(localStorage.getItem('cl_best') || '0', 10);
  var cellSize    = 40;

  /* ---- ELEMENTS ---- */
  var boardEl  = document.getElementById('board');
  var scoreEl  = document.getElementById('scoreNum');
  var bestEl   = document.getElementById('bestNum');
  var nextEl   = document.getElementById('nextBalls');
  var overlay  = document.getElementById('overlay');

  /* ---- INIT ---- */
  function calcCellSize() {
    var wrap = document.querySelector('.board-wrap');
    var avail = wrap.offsetWidth - 20;
    return Math.max(Math.floor((avail - 4 * (GRID - 1)) / GRID), 28);
  }

  function buildBoard() {
    cellSize = calcCellSize();
    boardEl.style.gridTemplateColumns = 'repeat(' + GRID + ', ' + cellSize + 'px)';
    boardEl.style.gap = '4px';
    boardEl.innerHTML = '';
    for (var i = 0; i < GRID * GRID; i++) {
      (function (idx) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.width  = cellSize + 'px';
        cell.style.height = cellSize + 'px';
        cell.setAttribute('data-idx', idx);
        cell.addEventListener('click', function () { onCellClick(idx); });
        boardEl.appendChild(cell);
      })(i);
    }
  }

  function renderBoard() {
    var cells = boardEl.querySelectorAll('.cell');
    for (var i = 0; i < GRID * GRID; i++) {
      var cell = cells[i];
      /* keep class but remove highlight/path */
      cell.classList.remove('highlight', 'path-hint');
      /* ball */
      var existing = cell.querySelector('.ball');
      if (board[i] > 0) {
        if (!existing) {
          var ball = document.createElement('div');
          ball.className = 'ball';
          ball.style.background = COLORS[board[i] - 1];
          cell.appendChild(ball);
        } else {
          existing.style.background = COLORS[board[i] - 1];
          existing.classList.remove('selected', 'pop', 'appear');
        }
      } else {
        if (existing) cell.removeChild(existing);
      }
    }
    /* selected highlight */
    if (selected >= 0 && board[selected] > 0) {
      cells[selected].classList.add('highlight');
      var sb = cells[selected].querySelector('.ball');
      if (sb) sb.classList.add('selected');
    }
  }

  /* ---- NEXT PREVIEW ---- */
  function genNext() {
    nextColors = [];
    for (var i = 0; i < NEW_EACH; i++) {
      nextColors.push(Math.floor(Math.random() * COLORS.length) + 1);
    }
    renderNext();
  }

  function renderNext() {
    nextEl.innerHTML = '';
    for (var i = 0; i < nextColors.length; i++) {
      var b = document.createElement('div');
      b.className = 'next-ball';
      b.style.background = COLORS[nextColors[i] - 1];
      nextEl.appendChild(b);
    }
  }

  /* ---- PLACE NEW BALLS ---- */
  function placeNewBalls() {
    var empty = [];
    for (var i = 0; i < GRID * GRID; i++) {
      if (board[i] === 0) empty.push(i);
    }
    if (empty.length === 0) { endGame(); return false; }

    /* shuffle empty */
    for (var i = empty.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = empty[i]; empty[i] = empty[j]; empty[j] = t;
    }

    var placed = [];
    for (var i = 0; i < Math.min(NEW_EACH, empty.length); i++) {
      board[empty[i]] = nextColors[i];
      placed.push(empty[i]);
    }

    /* animate appear */
    var cells = boardEl.querySelectorAll('.cell');
    for (var i = 0; i < placed.length; i++) {
      var cell = cells[placed[i]];
      var ball = document.createElement('div');
      ball.className = 'ball appear';
      ball.style.background = COLORS[board[placed[i]] - 1];
      /* remove old if any */
      var old = cell.querySelector('.ball');
      if (old) cell.removeChild(old);
      cell.appendChild(ball);
      setTimeout(function (b) { b.classList.remove('appear'); }, 300, ball);
    }

    /* check lines after placement */
    var cleared = checkAndClear();
    if (!cleared) {
      /* check game over */
      var emptyCount = 0;
      for (var i = 0; i < GRID * GRID; i++) if (board[i] === 0) emptyCount++;
      if (emptyCount === 0) { setTimeout(endGame, 200); return false; }
    }

    genNext();
    return true;
  }

  /* ---- PATH FINDING (BFS) ---- */
  function findPath(from, to) {
    if (board[to] !== 0) return null;
    var visited = [];
    var prev    = [];
    for (var i = 0; i < GRID * GRID; i++) { visited.push(false); prev.push(-1); }
    var queue = [from];
    visited[from] = true;

    while (queue.length > 0) {
      var cur = queue.shift();
      if (cur === to) {
        /* reconstruct path */
        var path = [];
        var n = to;
        while (n !== from) { path.unshift(n); n = prev[n]; }
        return path;
      }
      var neighbors = getNeighbors(cur);
      for (var i = 0; i < neighbors.length; i++) {
        var nb = neighbors[i];
        if (!visited[nb] && board[nb] === 0) {
          visited[nb] = true;
          prev[nb]    = cur;
          queue.push(nb);
        }
      }
    }
    return null; /* no path */
  }

  function getNeighbors(idx) {
    var r = Math.floor(idx / GRID);
    var c = idx % GRID;
    var nb = [];
    if (r > 0)        nb.push((r - 1) * GRID + c);
    if (r < GRID - 1) nb.push((r + 1) * GRID + c);
    if (c > 0)        nb.push(r * GRID + (c - 1));
    if (c < GRID - 1) nb.push(r * GRID + (c + 1));
    return nb;
  }

  /* ---- CELL CLICK ---- */
  function onCellClick(idx) {
    /* select ball */
    if (board[idx] > 0) {
      selected = idx;
      clearPathHints();
      renderBoard();
      return;
    }
    /* move selected ball */
    if (selected >= 0 && board[idx] === 0) {
      var path = findPath(selected, idx);
      if (!path) {
        /* no path — flash */
        var cells = boardEl.querySelectorAll('.cell');
        cells[idx].style.background = 'rgba(231,76,60,0.2)';
        setTimeout(function () { cells[idx].style.background = ''; }, 300);
        return;
      }
      /* animate move along path */
      moveBall(selected, idx, path, function () {
        var cleared = checkAndClear();
        if (!cleared) {
          placeNewBalls();
        }
      });
      selected = -1;
      clearPathHints();
      return;
    }
    selected = -1;
    clearPathHints();
    renderBoard();
  }

  /* ---- ANIMATE MOVE ---- */
  function moveBall(from, to, path, cb) {
    board[to]   = board[from];
    board[from] = 0;

    var cells  = boardEl.querySelectorAll('.cell');
    var fromCell = cells[from];
    var toCell   = cells[to];

    /* instant visual */
    var oldBall = fromCell.querySelector('.ball');
    if (oldBall) fromCell.removeChild(oldBall);

    var newBall = document.createElement('div');
    newBall.className = 'ball appear';
    newBall.style.background = COLORS[board[to] - 1];
    toCell.appendChild(newBall);
    setTimeout(function () { newBall.classList.remove('appear'); if (cb) cb(); }, 180);
  }

  /* ---- CHECK & CLEAR ---- */
  function checkAndClear() {
    var toRemove = [];

    /* horizontal */
    for (var r = 0; r < GRID; r++) {
      var line = [];
      for (var c = 0; c < GRID; c++) {
        var idx = r * GRID + c;
        if (board[idx] > 0 && (line.length === 0 || board[idx] === board[line[line.length - 1]])) {
          line.push(idx);
        } else {
          if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]);
          line = board[idx] > 0 ? [idx] : [];
        }
      }
      if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]);
    }

    /* vertical */
    for (var c = 0; c < GRID; c++) {
      var line = [];
      for (var r = 0; r < GRID; r++) {
        var idx = r * GRID + c;
        if (board[idx] > 0 && (line.length === 0 || board[idx] === board[line[line.length - 1]])) {
          line.push(idx);
        } else {
          if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]);
          line = board[idx] > 0 ? [idx] : [];
        }
      }
      if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]);
    }

    /* diagonal \\ */
    for (var start = -(GRID - MIN_LINE); start <= GRID - MIN_LINE; start++) {
      var line = [];
      for (var r = 0; r < GRID; r++) {
        var c = r - start;
        if (c < 0 || c >= GRID) { if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]); line = []; continue; }
        var idx = r * GRID + c;
        if (board[idx] > 0 && (line.length === 0 || board[idx] === board[line[line.length - 1]])) {
          line.push(idx);
        } else {
          if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]);
          line = board[idx] > 0 ? [idx] : [];
        }
      }
      if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]);
    }

    /* diagonal // */
    for (var start = 0; start < 2 * GRID - 1; start++) {
      var line = [];
      for (var r = 0; r < GRID; r++) {
        var c = start - r;
        if (c < 0 || c >= GRID) { if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]); line = []; continue; }
        var idx = r * GRID + c;
        if (board[idx] > 0 && (line.length === 0 || board[idx] === board[line[line.length - 1]])) {
          line.push(idx);
        } else {
          if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]);
          line = board[idx] > 0 ? [idx] : [];
        }
      }
      if (line.length >= MIN_LINE) for (var k = 0; k < line.length; k++) toRemove.push(line[k]);
    }

    /* deduplicate */
    var unique = [];
    var seen   = {};
    for (var i = 0; i < toRemove.length; i++) {
      if (!seen[toRemove[i]]) { seen[toRemove[i]] = true; unique.push(toRemove[i]); }
    }

    if (unique.length === 0) return false;

    /* animate pop */
    var cells = boardEl.querySelectorAll('.cell');
    for (var i = 0; i < unique.length; i++) {
      (function (idx) {
        var ball = cells[idx].querySelector('.ball');
        if (ball) {
          ball.classList.add('pop');
          setTimeout(function () {
            if (ball.parentNode) ball.parentNode.removeChild(ball);
          }, 300);
        }
        board[idx] = 0;
      })(unique[i]);
    }

    /* score */
    var pts = unique.length * 10 + Math.max(0, (unique.length - MIN_LINE)) * 5;
    score  += pts;
    scoreEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('cl_best', bestScore);
      bestEl.textContent = bestScore;
    }

    /* score pop at board center */
    var rect = boardEl.getBoundingClientRect();
    showScorePop('+' + pts, rect.left + rect.width / 2, rect.top + rect.height / 2);

    return true;
  }

  /* ---- SCORE POP ---- */
  function showScorePop(text, x, y) {
    var pop = document.createElement('div');
    pop.className   = 'score-pop';
    pop.textContent = text;
    pop.style.left  = (x - 30) + 'px';
    pop.style.top   = (y - 10) + 'px';
    document.body.appendChild(pop);
    setTimeout(function () { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 900);
  }

  /* ---- CLEAR PATH HINTS ---- */
  function clearPathHints() {
    var cells = boardEl.querySelectorAll('.cell');
    for (var i = 0; i < cells.length; i++) cells[i].classList.remove('path-hint', 'highlight');
  }

  /* ---- END GAME ---- */
  function endGame() {
    var best = parseInt(localStorage.getItem('cl_best') || '0', 10);
    document.getElementById('overlayMsg').textContent =
      'Skor: ' + score + '\nEn iyi: ' + best;
    overlay.classList.add('show');
  }

  /* ---- NEW GAME ---- */
  function newGame() {
    overlay.classList.remove('show');
    board    = [];
    selected = -1;
    score    = 0;
    scoreEl.textContent = '0';
    bestEl.textContent  = bestScore > 0 ? bestScore : '—';

    for (var i = 0; i < GRID * GRID; i++) board.push(0);

    buildBoard();
    genNext();
    placeNewBalls();
  }

  /* ---- EVENTS ---- */
  document.getElementById('newBtn').addEventListener('click', newGame);
  document.getElementById('overlayBtn').addEventListener('click', newGame);
  window.addEventListener('resize', function () {
    buildBoard();
    renderBoard();
  });

  /* ---- INIT ---- */
  newGame();
}());
</script>
