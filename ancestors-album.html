/* diff */
.diff-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
.diff-btn { background: #0a1018; color: #F6B45F; border: 1px solid #F6B45F; padding: 4px 14px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; }
.diff-btn.active { background: #F6B45F; color: #0F1318; border-color: #F6B45F; }

.info-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #0a1018; border-radius: 40px;
  padding: 7px 16px; margin-bottom: 14px;
}
.info-box { color: #F6B45F; font-weight: bold; font-size: 0.78rem; }
.info-box span { color: #eaf2fb; }
.new-btn { background: #F6B45F; border: none; font-weight: bold; padding: 5px 14px; border-radius: 40px; color: #0F1318; cursor: pointer; font-size: 0.78rem; }

/* timer */
.timer-wrap {
  display: flex; align-items: center; gap: 10px;
  background: #0a1018; border-radius: 40px;
  padding: 7px 16px; margin-bottom: 14px;
}
.timer-label { font-size: 0.7rem; color: #F6B45F; font-weight: bold; flex-shrink: 0; }
.timer-track { flex: 1; height: 7px; background: #1e2a3a; border-radius: 4px; overflow: hidden; }
.timer-fill  { height: 100%; background: #2ECC71; border-radius: 4px; transition: width 0.1s linear; }
.timer-val   { font-size: 0.78rem; color: #eaf2fb; font-weight: bold; flex-shrink: 0; width: 34px; text-align: right; }

/* grid */
.grid-wrap { background: #0a1018; border-radius: 28px; padding: 12px; margin-bottom: 12px; }
.grid { display: grid; gap: 10px; }

.card {
  aspect-ratio: 1;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s, background 0.15s;
  border: 2px solid #2a3a4a;
  position: relative;
  overflow: hidden;
}
.card-back {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #1e2a3a;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  color: #2a3a4a;
  border-radius: 16px;
  transition: opacity 0.2s;
}
.card-front {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  border-radius: 16px;
  opacity: 0;
  transition: opacity 0.2s;
  background: #252f3e;
}
.card.revealed .card-back  { opacity: 0; }
.card.revealed .card-front { opacity: 1; }
.card.matched  .card-front { background: rgba(46,204,113,0.15); }
.card.matched  { border-color: rgba(46,204,113,0.4); cursor: default; }
.card.wrong    { animation: wrongShake 0.35s ease-out; }
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-5px); }
  75%     { transform: translateX(5px); }
}
.card:active:not(.matched):not(.revealed) { transform: scale(0.95); }

/* score pop */
.score-pop {
  position: fixed;
  font-size: 1.1rem; font-weight: 900; color: #2ECC71;
  pointer-events: none; z-index: 200;
  animation: scorePop 0.7s ease-out forwards;
}
@keyframes scorePop {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}

/* message */
.msg-bar {
  text-align: center;
  font-size: 0.78rem;
  color: #6c8fb0;
  min-height: 20px;
  margin-bottom: 8px;
}

/* overlay */
.overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(15,19,24,0.93);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.overlay-box {
  background: #1e2a3a; border-radius: 40px;
  padding: 36px 40px; text-align: center;
  border: 2px solid #F6B45F; max-width: 300px; width: 90%;
}
.overlay-icon  { font-size: 3rem; margin-bottom: 10px; }
.overlay-title { font-size: 1.5rem; font-weight: bold; color: #F6B45F; letter-spacing: 2px; margin-bottom: 8px; }
.overlay-msg   { color: #eaf2fb; font-size: 0.85rem; margin-bottom: 18px; line-height: 1.8; }
.overlay-btn   { background: #F6B45F; border: none; font-weight: bold; padding: 10px 28px; border-radius: 40px; color: #0F1318; cursor: pointer; font-size: 0.9rem; }

.footer { text-align: center; font-size: 0.6rem; color: #6c8fb0; margin-top: 10px; }

<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">ANCESTORS' ALBUM</div>
      <div class="sub">SilverCompass · Nostaljik Hafıza</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="diff-row">
    <div class="diff-btn active" data-pairs="6">Kolay</div>
    <div class="diff-btn" data-pairs="8">Orta</div>
    <div class="diff-btn" data-pairs="10">Zor</div>
  </div>

  <div class="info-bar">
    <div class="info-box">🖼️ <span id="matchCount">0</span> / <span id="totalPairs">6</span></div>
    <div class="info-box">Skor: <span id="scoreNum">0</span></div>
    <button class="new-btn" id="newBtn">↺ Yeni</button>
  </div>

  <div class="timer-wrap">
    <div class="timer-label">⏱</div>
    <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="timer-val" id="timerVal">—</div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="msg-bar" id="msgBar">Eşleşen çiftleri bul · Anıları canlandır</div>

  <div class="footer">🏆 En iyi: <span id="bestNum">—</span></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon">📷</div>
    <div class="overlay-title" id="overlayTitle">ALBÜM TAMAMLANDI!</div>
    <div class="overlay-msg" id="overlayMsg"></div>
    <button class="overlay-btn" id="overlayBtn">Yeni Albüm</button>
  </div>
</div>

<script>
(function () {

  /* ---- NostaljikEşyalar ---- */
  var ALL_ITEMS = [
    { icon: '📻', name: 'Eski Radyo' },
    { icon: '📺', name: 'Tüplü TV' },
    { icon: '📞', name: 'Çevirmeli Tel.' },
    { icon: '⌛', name: 'Kum Saati' },
    { icon: '✒️', name: 'Dolma Kalem' },
    { icon: '📷', name: 'Film Makinesi' },
    { icon: '🎞️', name: 'Tepegöz' },
    { icon: '💿', name: 'Plak' },
    { icon: '🕯️', name: 'Mum' },
    { icon: '🗝️', name: 'Eski Anahtar' }
  ];

  /* ---- STATE ---- */
  var NUM_PAIRS    = 6;
  var deck         = [];
  var firstCard    = null;   /* { idx, el } */
  var lockBoard    = false;
  var matchCount   = 0;
  var score        = 0;
  var bestScore    = parseInt(localStorage.getItem('aa2_best') || '0', 10);
  var timeLeft     = 0;
  var totalTime    = 0;
  var timerInterval = null;
  var TIMES        = { 6: 60, 8: 90, 10: 120 };

  /* ---- ELEMENTS ---- */
  var gridEl       = document.getElementById('grid');
  var matchEl      = document.getElementById('matchCount');
  var totalEl      = document.getElementById('totalPairs');
  var scoreEl      = document.getElementById('scoreNum');
  var bestEl       = document.getElementById('bestNum');
  var timerFill    = document.getElementById('timerFill');
  var timerVal     = document.getElementById('timerVal');
  var msgBar       = document.getElementById('msgBar');
  var overlay      = document.getElementById('overlay');
  var diffBtns     = document.querySelectorAll('.diff-btn');

  bestEl.textContent = bestScore > 0 ? bestScore : '—';

  /* ---- DIFF ---- */
  for (var d = 0; d < diffBtns.length; d++) {
    diffBtns[d].addEventListener('click', function () {
      for (var i = 0; i < diffBtns.length; i++) diffBtns[i].classList.remove('active');
      this.classList.add('active');
      NUM_PAIRS = parseInt(this.getAttribute('data-pairs'), 10);
      newGame();
    });
  }

  /* ---- SHUFFLE ---- */
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  /* ---- BUILD DECK ---- */
  function buildDeck() {
    var items = shuffle(ALL_ITEMS.slice()).slice(0, NUM_PAIRS);
    var d = [];
    for (var i = 0; i < items.length; i++) {
      d.push({ id: i, icon: items[i].icon, name: items[i].name, matched: false });
      d.push({ id: i, icon: items[i].icon, name: items[i].name, matched: false });
    }
    return shuffle(d);
  }

  /* ---- RENDER GRID ---- */
  function renderGrid() {
    var cols = NUM_PAIRS <= 6 ? 4 : (NUM_PAIRS <= 8 ? 4 : 5);
    var wrap = document.querySelector('.grid-wrap');
    var available = wrap.offsetWidth - 24;
    var cellSize = Math.floor((available - (cols - 1) * 10) / cols);

    gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cellSize + 'px)';
    gridEl.style.gap = '10px';
    gridEl.innerHTML = '';

    for (var i = 0; i < deck.length; i++) {
      (function (idx) {
        var card = document.createElement('div');
        card.className = 'card' + (deck[idx].matched ? ' revealed matched' : '');
        card.style.width  = cellSize + 'px';
        card.style.height = cellSize + 'px';

        var back = document.createElement('div');
        back.className = 'card-back';
        back.textContent = '🏛️';

        var front = document.createElement('div');
        front.className = 'card-front';
        front.style.fontSize = Math.round(cellSize * 0.42) + 'px';
        front.textContent = deck[idx].icon;

        card.appendChild(back);
        card.appendChild(front);
        card.addEventListener('click', function () { onCardClick(idx, card); });
        gridEl.appendChild(card);
      })(i);
    }
  }

  /* ---- CARD CLICK ---- */
  function onCardClick(idx, cardEl) {
    if (lockBoard) return;
    if (deck[idx].matched) return;
    if (cardEl.classList.contains('revealed')) return;

    cardEl.classList.add('revealed');

    if (!firstCard) {
      firstCard = { idx: idx, el: cardEl };
      return;
    }

    /* second card */
    var second = { idx: idx, el: cardEl };
    lockBoard = true;

    if (deck[firstCard.idx].id === deck[second.idx].id) {
      /* MATCH */
      deck[firstCard.idx].matched = true;
      deck[second.idx].matched   = true;
      firstCard.el.classList.add('matched');
      second.el.classList.add('matched');

      matchCount++;
      matchEl.textContent = matchCount;
      var pts = Math.max(10, Math.round(timeLeft / totalTime * 50)) + 10;
      score += pts;
      scoreEl.textContent = score;
      setMsg('✓ Eşleşti! +' + pts);
      showScorePop('+' + pts);

      firstCard  = null;
      lockBoard  = false;

      if (matchCount === NUM_PAIRS) {
        clearInterval(timerInterval);
        saveBest();
        setTimeout(endGame, 400);
      }
    } else {
      /* NO MATCH */
      firstCard.el.classList.add('wrong');
      second.el.classList.add('wrong');
      setMsg('Eşleşmedi, tekrar dene…');

      var f = firstCard;
      var s = second;
      setTimeout(function () {
        f.el.classList.remove('revealed', 'wrong');
        s.el.classList.remove('revealed', 'wrong');
        firstCard = null;
        lockBoard = false;
      }, 900);
    }
  }

  /* ---- TIMER ---- */
  function startTimer() {
    clearInterval(timerInterval);
    timeLeft  = TIMES[NUM_PAIRS];
    totalTime = timeLeft;
    timerVal.textContent = timeLeft + 's';
    timerFill.style.width = '100%';
    timerFill.style.background = '#2ECC71';

    timerInterval = setInterval(function () {
      timeLeft--;
      var pct = (timeLeft / totalTime) * 100;
      timerFill.style.width = pct + '%';
      timerFill.style.background = timeLeft > totalTime * 0.4 ? '#2ECC71'
                                  : timeLeft > totalTime * 0.2 ? '#F6B45F' : '#E74C3C';
      timerVal.textContent = timeLeft + 's';
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        endGame(true);
      }
    }, 1000);
  }

  /* ---- HELPERS ---- */
  function setMsg(txt) {
    msgBar.textContent = txt;
  }

  function showScorePop(text) {
    var pop = document.createElement('div');
    pop.className = 'score-pop';
    pop.textContent = text;
    pop.style.left = (window.innerWidth / 2 - 25) + 'px';
    pop.style.top  = (window.innerHeight / 2 - 20) + 'px';
    document.body.appendChild(pop);
    setTimeout(function () { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 700);
  }

  function saveBest() {
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('aa2_best', bestScore);
      bestEl.textContent = bestScore;
    }
  }

  /* ---- END ---- */
  function endGame(timeout) {
    saveBest();
    document.getElementById('overlayTitle').textContent = timeout ? '⏰ SÜRE BİTTİ!' : '📷 ALBÜM TAMAMLANDI!';
    document.getElementById('overlayMsg').textContent =
      matchCount + ' / ' + NUM_PAIRS + ' çift bulundu\n' +
      'Skor: ' + score + '\nEn iyi: ' + bestScore;
    overlay.classList.add('show');
  }

  /* ---- NEW GAME ---- */
  function newGame() {
    clearInterval(timerInterval);
    overlay.classList.remove('show');
    deck       = buildDeck();
    firstCard  = null;
    lockBoard  = false;
    matchCount = 0;
    score      = 0;
    matchEl.textContent = '0';
    totalEl.textContent = NUM_PAIRS;
    scoreEl.textContent = '0';
    setMsg('Eşleşen çiftleri bul · Anıları canlandır');
    renderGrid();
    startTimer();
  }

  /* ---- EVENTS ---- */
  document.getElementById('newBtn').addEventListener('click', newGame);
  document.getElementById('overlayBtn').addEventListener('click', newGame);
  window.addEventListener('resize', function () { renderGrid(); });

  /* ---- INIT ---- */
  newGame();
}());
</script>

</body>
</html>
