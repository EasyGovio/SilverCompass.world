.info-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #0a1018; border-radius: 40px;
  padding: 7px 16px; margin-bottom: 14px;
}
.info-box { color: #F6B45F; font-weight: bold; font-size: 0.78rem; }
.info-box span { color: #eaf2fb; }
.new-btn { background: #F6B45F; border: none; font-weight: bold; padding: 5px 14px; border-radius: 40px; color: #0F1318; cursor: pointer; font-size: 0.78rem; }

/* BPM control */
.bpm-wrap {
  background: #0a1018;
  border-radius: 28px;
  padding: 14px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.bpm-btn {
  background: #1e2a3a;
  border: 2px solid #F6B45F;
  color: #F6B45F;
  width: 48px; height: 48px;
  border-radius: 50%;
  font-size: 1.5rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.bpm-btn:active { background: #F6B45F; color: #0F1318; }
.bpm-display { text-align: center; }
.bpm-value { font-size: 2.2rem; font-weight: 900; color: #F6B45F; line-height: 1; }
.bpm-label { font-size: 0.65rem; color: #6c8fb0; letter-spacing: 2px; }

/* Pulse circle */
.pulse-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
  position: relative;
}
.pulse-ring {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 3px solid rgba(246,180,95,0.3);
  pointer-events: none;
}
.pulse-ring.beat {
  animation: ringPulse 0.4s ease-out forwards;
}
@keyframes ringPulse {
  0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.8; border-color: rgba(246,180,95,0.6); }
  100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
}
.pulse-circle {
  width: 150px; height: 150px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(246,180,95,0.5), #1e2a3a);
  border: 3px solid #F6B45F;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  cursor: pointer;
  box-shadow: 0 0 24px rgba(246,180,95,0.2);
  transition: transform 0.06s, box-shadow 0.06s;
  position: relative; z-index: 2;
}
.pulse-circle:active { transform: scale(0.94); box-shadow: 0 0 10px rgba(246,180,95,0.15); }
.pulse-circle.beat-flash {
  animation: beatFlash 0.25s ease-out;
}
@keyframes beatFlash {
  0%   { box-shadow: 0 0 0 0 rgba(246,180,95,0.7); }
  50%  { box-shadow: 0 0 0 18px rgba(246,180,95,0); }
  100% { box-shadow: 0 0 24px rgba(246,180,95,0.2); }
}
.circle-icon { font-size: 2rem; margin-bottom: 4px; }
.circle-text { font-size: 0.72rem; letter-spacing: 2px; color: rgba(246,180,95,0.8); }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.stat-box {
  background: #0a1018;
  border-radius: 18px;
  padding: 10px 12px;
  text-align: center;
}
.stat-label { font-size: 0.62rem; color: #6c8fb0; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.stat-val   { font-size: 1.3rem; font-weight: 900; color: #F6B45F; font-variant-numeric: tabular-nums; }
.stat-val.green { color: #2ECC71; }

/* Progress dots */
.rounds-wrap { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
.round-dot { width: 9px; height: 9px; border-radius: 50%; background: #1e2a3a; border: 1px solid #2a3a4a; transition: background 0.2s; }
.round-dot.hit  { background: #2ECC71; border-color: #27AE60; }
.round-dot.miss { background: #E74C3C; border-color: #c0392b; }
.round-dot.curr { background: rgba(246,180,95,0.5); border-color: #F6B45F; }

/* Start btn */
.start-btn {
  display: block; width: 100%;
  background: #F6B45F; border: none;
  font-weight: bold; padding: 13px;
  border-radius: 40px; color: #0F1318;
  cursor: pointer; font-size: 1rem;
  transition: opacity 0.1s;
}
.start-btn.running { background: #2a3a4a; color: #F6B45F; border: 1px solid #F6B45F; }
.start-btn:active { opacity: 0.85; }

/* Overlay */
.overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(15,19,24,0.93);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.overlay-box {
  background: #1e2a3a; border-radius: 40px;
  padding: 36px 40px; text-align: center;
  border: 2px solid #F6B45F; max-width: 300px; width: 90%;
}
.overlay-icon  { font-size: 3rem; margin-bottom: 10px; }
.overlay-title { font-size: 1.5rem; font-weight: bold; color: #F6B45F; letter-spacing: 2px; margin-bottom: 8px; }
.overlay-rows  { margin: 12px 0 18px; }
.overlay-row   { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2a3a4a; font-size: 0.82rem; }
.overlay-row:last-child { border: none; }
.overlay-row .lbl { color: #6c8fb0; }
.overlay-row .val { color: #F6B45F; font-weight: bold; }
.overlay-btn { background: #F6B45F; border: none; font-weight: bold; padding: 10px 28px; border-radius: 40px; color: #0F1318; cursor: pointer; font-size: 0.9rem; }

.footer { text-align: center; font-size: 0.6rem; color: #6c8fb0; margin-top: 10px; }

<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">BIO-SYNC RHYTHM</div>
      <div class="sub">SilverCompass · El-Göz Koordinasyonu</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="info-bar">
    <div class="info-box">Tur: <span id="roundNum">0</span>/<span id="totalRounds">20</span></div>
    <div class="info-box">🏆 <span id="bestNum">—</span></div>
    <button class="new-btn" id="newBtn">↺ Yeni</button>
  </div>

  <div class="bpm-wrap">
    <button class="bpm-btn" id="bpmDown">−</button>
    <div class="bpm-display">
      <div class="bpm-value" id="bpmVal">60</div>
      <div class="bpm-label">BPM</div>
    </div>
    <button class="bpm-btn" id="bpmUp">+</button>
  </div>

  <div class="pulse-wrap">
    <div class="pulse-ring" id="pulseRing"></div>
    <div class="pulse-circle" id="pulseCircle">
      <div class="circle-icon">👆</div>
      <div class="circle-text">DOKUN</div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-label">Son Reaksiyon</div>
      <div class="stat-val" id="lastRT">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Ort. Reaksiyon</div>
      <div class="stat-val green" id="avgRT">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">İsabet</div>
      <div class="stat-val" id="hitCount">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Doğruluk</div>
      <div class="stat-val" id="accuracy">—</div>
    </div>
  </div>

  <div class="rounds-wrap" id="roundsWrap"></div>

<button class="start-btn" id="startBtn">▶ Metronomu Başlat</button>

  <div class="footer">Metronom atışına uygun dokun · 100ms tolerans</div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon">🎯</div>
    <div class="overlay-title">SEANS BİTTİ</div>
    <div class="overlay-rows" id="overlayRows"></div>
    <button class="overlay-btn" id="overlayBtn">Tekrar</button>
  </div>
</div>

<script>
(function () {

  /* ---- AUDIO — tek global instance ---- */
  var audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    return audioCtx;
  }
  function playTick(freq, dur) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    try {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq || 880;
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (dur || 0.12));
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + (dur || 0.12));
    } catch (e) {}
  }

  /* ---- STATE ---- */
  var bpm           = 60;
  var TOTAL_ROUNDS  = 20;
  var TOLERANCE_MS  = 120;
  var round         = 0;
  var hits          = 0;
  var attempts      = 0;
  var rtSums        = 0;
  var bestHits      = parseInt(localStorage.getItem('bsr_best') || '0', 10);
  var isRunning     = false;
  var expectedTime  = 0;
  var metInterval   = null;
  var roundResults  = [];

  /* ---- ELEMENTS ---- */
  var bpmValEl    = document.getElementById('bpmVal');
  var pulseCircle = document.getElementById('pulseCircle');
  var pulseRing   = document.getElementById('pulseRing');
  var startBtn    = document.getElementById('startBtn');
  var roundNumEl  = document.getElementById('roundNum');
  var totalRndEl  = document.getElementById('totalRounds');
  var bestEl      = document.getElementById('bestNum');
  var lastRTEl    = document.getElementById('lastRT');
  var avgRTEl     = document.getElementById('avgRT');
  var hitCountEl  = document.getElementById('hitCount');
  var accuracyEl  = document.getElementById('accuracy');
  var roundsWrap  = document.getElementById('roundsWrap');
  var overlay     = document.getElementById('overlay');

  bestEl.textContent     = bestHits > 0 ? bestHits : '—';
  totalRndEl.textContent = TOTAL_ROUNDS;

  /* ---- ROUNDS DOTS ---- */
  function buildDots() {
    roundsWrap.innerHTML = '';
    for (var i = 0; i < TOTAL_ROUNDS; i++) {
      var d = document.createElement('div');
      d.className = 'round-dot' + (i === 0 ? ' curr' : '');
      roundsWrap.appendChild(d);
    }
  }
  function updateDots() {
    var dots = roundsWrap.querySelectorAll('.round-dot');
    for (var i = 0; i < dots.length; i++) {
      dots[i].className = 'round-dot';
      if (i < roundResults.length) dots[i].classList.add(roundResults[i] ? 'hit' : 'miss');
      else if (i === roundResults.length && isRunning) dots[i].classList.add('curr');
    }
    roundNumEl.textContent = Math.min(round, TOTAL_ROUNDS);
  }

  /* ---- METRONOME BEAT ---- */
  function onBeat() {
    if (!isRunning) return;
    expectedTime = Date.now();
    playTick(880, 0.12);

    /* visual ring */
    pulseRing.classList.remove('beat');
    void pulseRing.getBoundingClientRect();
    pulseRing.classList.add('beat');

    /* circle flash */
    pulseCircle.classList.remove('beat-flash');
    void pulseCircle.getBoundingClientRect();
    pulseCircle.classList.add('beat-flash');
    setTimeout(function () { pulseCircle.classList.remove('beat-flash'); }, 250);

    round++;
    updateDots();

    if (round > TOTAL_ROUNDS) {
      stopMetronome();
      setTimeout(endGame, 300);
    }
  }

  /* ---- TAP ---- */
  function onTap() {
    if (!isRunning || expectedTime === 0) return;
    var now  = Date.now();
    var diff = Math.abs(now - expectedTime);
    attempts++;

    if (diff <= TOLERANCE_MS) {
      hits++;
      rtSums += diff;
      roundResults.push(true);
      lastRTEl.textContent = diff + 'ms';
      lastRTEl.className   = 'stat-val green';
    } else {
      roundResults.push(false);
      lastRTEl.textContent = diff + 'ms';
      lastRTEl.className   = 'stat-val';
    }

    hitCountEl.textContent = hits;
    if (hits > 0) avgRTEl.textContent = Math.round(rtSums / hits) + 'ms';
    accuracyEl.textContent = Math.round((hits / attempts) * 100) + '%';
    updateDots();

    /* prevent double-tap counting */
    expectedTime = 0;
  }

  /* ---- START / STOP ---- */
  function startMetronome() {
    getAudioCtx(); /* unlock audio on first user gesture */
    var intervalMs = Math.round(60000 / bpm);
    clearInterval(metInterval);
    isRunning = true;
    startBtn.textContent = '⏸ Durdur';
    startBtn.classList.add('running');
    metInterval = setInterval(onBeat, intervalMs);
  }

  function stopMetronome() {
    clearInterval(metInterval);
    isRunning = false;
    expectedTime = 0;
    startBtn.textContent = '▶ Metronomu Başlat';
    startBtn.classList.remove('running');
  }

  /* ---- END ---- */
  function endGame() {
    stopMetronome();
    if (hits > bestHits) {
      bestHits = hits;
      localStorage.setItem('bsr_best', bestHits);
      bestEl.textContent = bestHits;
    }
    var acc = attempts > 0 ? Math.round((hits / attempts) * 100) : 0;
    var avg = hits > 0 ? Math.round(rtSums / hits) : 0;
    var rating = acc >= 90 ? '⚡ Mükemmel' : acc >= 70 ? '🌟 Harika' : acc >= 50 ? '👍 İyi' : '💪 Pratik Yap';

    var rows = [
      ['İsabet', hits + ' / ' + TOTAL_ROUNDS],
      ['Doğruluk', acc + '%'],
      ['Ort. Reaksiyon', avg + 'ms'],
      ['Değerlendirme', rating],
      ['En İyi', bestHits + ' isabet']
    ];
    var html = '';
    for (var i = 0; i < rows.length; i++) {
      html += '<div class="overlay-row"><span class="lbl">' + rows[i][0] + '</span><span class="val">' + rows[i][1] + '</span></div>';
    }
    document.getElementById('overlayRows').innerHTML = html;
    overlay.classList.add('show');
  }

  /* ---- NEW GAME ---- */
  function newGame() {
    stopMetronome();
    overlay.classList.remove('show');
    round   = 0;
    hits    = 0;
    attempts = 0;
    rtSums  = 0;
    roundResults = [];
    expectedTime = 0;

    roundNumEl.textContent = '0';
    hitCountEl.textContent = '0';
    lastRTEl.textContent   = '—';
    lastRTEl.className     = 'stat-val';
    avgRTEl.textContent    = '—';
    accuracyEl.textContent = '—';
    buildDots();
  }

  /* ---- BPM ---- */
  function setBpm(v) {
    bpm = Math.min(180, Math.max(40, v));
    bpmValEl.textContent = bpm;
    if (isRunning) { stopMetronome(); startMetronome(); }
  }

  /* ---- EVENTS ---- */
  pulseCircle.addEventListener('click', onTap);
  pulseCircle.addEventListener('touchstart', function (e) { e.preventDefault(); onTap(); }, { passive: false });

  startBtn.addEventListener('click', function () {
    if (isRunning) stopMetronome();
    else startMetronome();
  });

  document.getElementById('bpmUp').addEventListener('click',   function () { setBpm(bpm + 5); });
  document.getElementById('bpmDown').addEventListener('click', function () { setBpm(bpm - 5); });
  document.getElementById('newBtn').addEventListener('click',  newGame);
  document.getElementById('overlayBtn').addEventListener('click', function () { overlay.classList.remove('show'); newGame(); });

  /* ---- INIT ---- */
  buildDots();
}());
</script>

</body>
</html>
