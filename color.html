<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Renk Eşleştirme | SilverCompass</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background: #1a3a5c;
      font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .game-container {
      max-width: 600px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 20px;
      border: 1px solid rgba(246,180,95,0.4);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 20px;
      color: #FFFFFF;
    }
    .logo { font-size: 1.4rem; font-weight: bold; }
    .logo span { color: #F6B45F; }
    .back-link { color: #F6B45F; text-decoration: none; font-size: 0.9rem; }
    .stats {
      display: flex;
      justify-content: space-between;
      background: rgba(0,0,0,0.3);
      padding: 10px 16px;
      border-radius: 60px;
      margin: 15px 0;
      color: #eaf2fb;
    }
    .stats div { background: #1a3a5c; padding: 4px 12px; border-radius: 40px; }
    button {
      background: #F6B45F;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    .target {
      width: 120px;
      height: 120px;
      border-radius: 30px;
      margin: 20px auto;
      border: 3px solid #FFFFFF;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px 0;
    }
    .card {
      aspect-ratio: 1 / 1;
      background: #eaf2fb;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.05s linear;
      border: 2px solid #b8d0e8;
    }
    .card:active { transform: scale(0.96); }
    .message {
      text-align: center;
      margin-top: 15px;
      padding: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      color: #eaf2fb;
    }
    @media (max-width: 550px) {
      .target { width: 80px; height: 80px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="logo">Silver<span>Compass</span></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>
  <div class="stats">
    <div>🎯 Skor: <span id="score">0</span></div>
    <div>⏱️ Süre: <span id="timer">00:00</span></div>
    <div>🏆 En İyi: <span id="bestScore">—</span></div>
    <button id="resetBtn">🔄 Sıfırla</button>
  </div>
  <div id="target" class="target"></div>
  <div id="cards" class="cards"></div>
  <div class="message" id="message">Hedef rengi bul!</div>
</div>
<script>
  var COLORS = ["#FF4136", "#0074D9", "#2ECC40", "#FFDC00", "#B10DC9", "#FF851B", "#7FDBFF", "#39CCCC", "#F012BE", "#01FF70"];
  var currentTarget = "";
  var score = 0;
  var timerSeconds = 0, timerInterval = null;
  var gameActive = true;
  var bestKey = "colorMatchBest";

  var targetDiv = document.getElementById("target");
  var cardsDiv = document.getElementById("cards");
  var scoreSpan = document.getElementById("score");
  var timerSpan = document.getElementById("timer");
  var bestSpan = document.getElementById("bestScore");
  var resetBtn = document.getElementById("resetBtn");
  var messageDiv = document.getElementById("message");

  function updateBestDisplay() {
    var best = localStorage.getItem(bestKey);
    bestSpan.innerText = best ? best : "—";
  }
  function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = null; }
  function startTimer() { stopTimer(); timerInterval = setInterval(function(){ if(gameActive){ timerSeconds++; updateTimerDisplay(); } }, 1000); }
  function updateTimerDisplay() { var m=Math.floor(timerSeconds/60), s=timerSeconds%60; timerSpan.innerText = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s); }

  function randomColor() {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  function nextRound() {
    currentTarget = randomColor();
    targetDiv.style.backgroundColor = currentTarget;
    var options = [currentTarget];
    while(options.length < 6) {
      var c = randomColor();
      if(options.indexOf(c) === -1) options.push(c);
    }
    for(var i=options.length-1;i>0;i--) { var j=Math.floor(Math.random()*(i+1)); var temp=options[i]; options[i]=options[j]; options[j]=temp; }
    cardsDiv.innerHTML = "";
    for(var k=0;k<options.length;k++) {
      var card = document.createElement("div");
      card.className = "card";
      card.style.backgroundColor = options[k];
      card.addEventListener("click", (function(color){ return function(){ checkAnswer(color); }; })(options[k]));
      cardsDiv.appendChild(card);
    }
  }

  function checkAnswer(selectedColor) {
    if(!gameActive) return;
    if(selectedColor === currentTarget) {
      score++;
      scoreSpan.innerText = score;
      messageDiv.innerText = "✓ Doğru! +1 puan";
      nextRound();
    } else {
      gameActive = false;
      stopTimer();
      messageDiv.innerText = "❌ Oyun bitti! Skorunuz: " + score + ". Yeniden başlatın.";
      var best = localStorage.getItem(bestKey);
      if(!best || score > parseInt(best)) {
        localStorage.setItem(bestKey, score);
        updateBestDisplay();
        messageDiv.innerText += " YENİ REKOR!";
      }
    }
  }

  function resetGame() {
    stopTimer();
    timerSeconds = 0;
    updateTimerDisplay();
    score = 0;
    scoreSpan.innerText = "0";
    gameActive = true;
    startTimer();
    nextRound();
    messageDiv.innerText = "Yeni oyun başladı. Hedef rengi bul!";
  }

  resetBtn.addEventListener("click", resetGame);
  resetGame();
  updateBestDisplay();
</script>
</body>
</html>
