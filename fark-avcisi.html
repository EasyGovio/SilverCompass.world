<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fark Avcısı | PACDI Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #04162E;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .game-container {
      max-width: 600px;
      width: 100%;
      background: rgba(4, 22, 46, 0.8);
      border-radius: 56px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(246, 180, 95, 0.3);
      text-align: center;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #F6B45F;
    }

    .sub {
      font-size: 0.62rem;
      color: #9bb7d4;
      margin-top: 2px;
    }

    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.78rem;
      background: #0a1018;
      padding: 5px 12px;
      border-radius: 40px;
    }

    .lang-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: flex-end;
    }

    .lang-btn {
      background: #0a1018;
      border: 1px solid #F6B45F;
      color: #F6B45F;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 30px;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #F6B45F;
      color: #04162E;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a1018;
      border-radius: 40px;
      padding: 7px 16px;
      margin-bottom: 14px;
    }

    .info-box {
      color: #F6B45F;
      font-weight: bold;
      font-size: 0.78rem;
    }
    .info-box span { color: #eaf2fb; }

    .new-btn {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 5px 14px;
      border-radius: 40px;
      color: #0F1318;
      cursor: pointer;
      font-size: 0.78rem;
    }

    .diff-options {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .diff-opt {
      background: #0a1018;
      border: 1px solid #F6B45F;
      color: #F6B45F;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .diff-opt.active {
      background: #F6B45F;
      color: #04162E;
    }

    .images-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      background: #0a1018;
      border-radius: 28px;
      padding: 16px;
    }

    .image-panel {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .image-panel canvas {
      width: 100%;
      background: #1e2a3a;
      border-radius: 20px;
      cursor: pointer;
    }

    .click-area {
      position: relative;
      cursor: pointer;
    }

    .feedback {
      margin: 12px 0;
      font-size: 0.9rem;
      font-weight: bold;
      min-height: 50px;
      color: #2ECC71;
    }
    .feedback.error { color: #E74C3C; }

    .progress-wrap {
      background: #0a1018;
      border-radius: 40px;
      padding: 6px 12px;
      margin-top: 8px;
      font-size: 0.7rem;
      color: #6c8fb0;
    }

    .hint-btn {
      background: #1e2a3a;
      border: 1px solid #F6B45F;
      color: #F6B45F;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }

    .footer {
      text-align: center;
      font-size: 0.6rem;
      color: #6c8fb0;
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div><div class="logo" id="gameTitle">FARK AVCISI</div><div class="sub" id="gameSub">Spot the Difference · Görsel Dikkat</div></div>
    <a href="index.html" class="back-link" id="backLink">← Geri</a>
  </div>
  <div class="lang-selector" id="langSelector">
    <button class="lang-btn active" data-lang="tr">TR</button>
    <button class="lang-btn" data-lang="de">DE</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>
  <div class="info-bar">
    <div class="info-box"><span id="scoreLabel">🎯 Bulunan:</span> <span id="scoreNum">0</span> / <span id="totalNum">5</span></div>
    <div class="info-box"><span id="bestLabel">🏆 En İyi:</span> <span id="bestNum">—</span></div>
    <button class="new-btn" id="resetBtn"><span id="resetText">↺ Yeniden</span></button>
  </div>

  <div class="diff-options">
    <div data-diff="easy" class="diff-opt active">Kolay (3 fark)</div>
    <div data-diff="medium" class="diff-opt">Orta (5 fark)</div>
    <div data-diff="hard" class="diff-opt">Zor (7 fark)</div>
  </div>

  <div class="images-container" id="imagesContainer">
    <div class="image-panel">
      <canvas id="canvasLeft" width="400" height="300" class="click-area"></canvas>
    </div>
    <div class="image-panel">
      <canvas id="canvasRight" width="400" height="300" class="click-area"></canvas>
    </div>
  </div>

  <div class="feedback" id="feedbackMsg"></div>
  <div class="progress-wrap" id="progressMsg">Farklı olan yerlere tıkla!</div>
  <div class="footer" id="footerText">İki resim arasındaki farkları bul.</div>
</div>

<script>
  (function() {
    var langData = {
      tr: {
        title: "FARK AVCISI", sub: "Spot the Difference · Görsel Dikkat", back: "← Geri",
        score: "🎯 Bulunan:", best: "🏆 En İyi:", reset: "↺ Yeniden",
        progress: "Farklı olan yerlere tıkla!", footer: "İki resim arasındaki farkları bul.",
        correct: "✅ Fark bulundu! +1 puan", wrong: "❌ Yanlış yer. Tekrar dene.",
        gameOver: "🎉 TEBRİKLER! Tüm farkları buldunuz!", newBest: " (YENİ REKOR!)"
      },
      de: {
        title: "FINDEN SIE DEN UNTERSCHIED", sub: "Visuelle Aufmerksamkeit", back: "← Zurück",
        score: "🎯 Gefunden:", best: "🏆 Beste:", reset: "↺ Neustart",
        progress: "Klicke auf die Unterschiede!", footer: "Finde die Unterschiede zwischen den Bildern.",
        correct: "✅ Unterschied gefunden! +1 Punkt", wrong: "❌ Falsche Stelle. Versuche es erneut.",
        gameOver: "🎉 GLÜCKWUNSCH! Alle Unterschiede gefunden!", newBest: " (NEUER REKORD!)"
      },
      en: {
        title: "SPOT THE DIFFERENCE", sub: "Visual Attention", back: "← Back",
        score: "🎯 Found:", best: "🏆 Best:", reset: "↺ Reset",
        progress: "Click on the differences!", footer: "Find the differences between the two images.",
        correct: "✅ Difference found! +1 point", wrong: "❌ Wrong spot. Try again.",
        gameOver: "🎉 CONGRATULATIONS! You found all differences!", newBest: " (NEW RECORD!)"
      }
    };

    var currentLang = "tr";
    var difficulty = "easy";
    var totalDiffs = { easy: 3, medium: 5, hard: 7 };
    var foundDiffs = 0;
    var bestScore = 0;
    var gameActive = true;
    var diffPositions = []; // { x, y, radius }
    var canvasLeft = document.getElementById('canvasLeft');
    var canvasRight = document.getElementById('canvasRight');
    var ctxLeft = canvasLeft.getContext('2d');
    var ctxRight = canvasRight.getContext('2d');

    var scoreSpan = document.getElementById('scoreNum');
    var totalSpan = document.getElementById('totalNum');
    var bestSpan = document.getElementById('bestNum');
    var feedbackDiv = document.getElementById('feedbackMsg');
    var resetBtn = document.getElementById('resetBtn');
    var langBtns = document.querySelectorAll('.lang-btn');
    var diffBtns = document.querySelectorAll('.diff-opt');
    var gameTitle = document.getElementById('gameTitle');
    var gameSub = document.getElementById('gameSub');
    var backLink = document.getElementById('backLink');
    var scoreLabel = document.getElementById('scoreLabel');
    var bestLabel = document.getElementById('bestLabel');
    var resetSpan = document.getElementById('resetText');
    var progressMsg = document.getElementById('progressMsg');
    var footerText = document.getElementById('footerText');

    function loadBest() { var s = localStorage.getItem('spotdiff_best_' + currentLang); bestScore = s ? parseInt(s) : 0; bestSpan.textContent = bestScore || '—'; }
    function saveBest() { if (foundDiffs > bestScore) { bestScore = foundDiffs; localStorage.setItem('spotdiff_best_' + currentLang, bestScore); bestSpan.textContent = bestScore; } }

    function updateLanguage() {
      var t = langData[currentLang];
      if (!t) return;
      gameTitle.innerText = t.title; gameSub.innerText = t.sub; backLink.innerText = t.back;
      scoreLabel.innerText = t.score; bestLabel.innerText = t.best; resetSpan.innerText = t.reset;
      progressMsg.innerText = t.progress; footerText.innerText = t.footer;
    }

    function setLanguage(lang) {
      currentLang = lang; updateLanguage(); loadBest();
      var btns = document.querySelectorAll('.lang-btn');
      for (var i = 0; i < btns.length; i++) {
        if (btns[i].getAttribute('data-lang') === lang) btns[i].classList.add('active');
        else btns[i].classList.remove('active');
      }
    }

    // Demo görsel çizimi (basit geometrik şekiller + rastgele farklar)
    function drawBaseImage(ctx, imgData) {
      var w = canvasLeft.width;
      var h = canvasLeft.height;
      ctx.fillStyle = '#1e2a3a';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#F6B45F';
      ctx.fillRect(50, 50, 80, 80);
      ctx.fillStyle = '#1ABC9C';
      ctx.beginPath();
      ctx.arc(200, 150, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#eaf2fb';
      ctx.fillRect(300, 200, 60, 60);
      ctx.fillStyle = '#F6B45F';
      ctx.beginPath();
      ctx.moveTo(100, 250);
      ctx.lineTo(130, 280);
      ctx.lineTo(70, 280);
      ctx.fill();
      if (imgData && imgData.diffs) {
        for (var i = 0; i < imgData.diffs.length; i++) {
          var d = imgData.diffs[i];
          if (d.type === 'fill') {
            ctx.fillStyle = d.color;
            ctx.fillRect(d.x - 15, d.y - 15, 30, 30);
          } else if (d.type === 'circle') {
            ctx.fillStyle = d.color;
            ctx.beginPath();
            ctx.arc(d.x, d.y, 12, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }

    function generateRandomDiffs(count) {
      var diffs = [];
      var positions = [];
      for (var i = 0; i < count; i++) {
        var x = 50 + Math.random() * (canvasLeft.width - 100);
        var y = 50 + Math.random() * (canvasLeft.height - 100);
        var type = Math.random() > 0.5 ? 'fill' : 'circle';
        var color = ['#E74C3C', '#3498DB', '#2ECC71', '#F6B45F'][Math.floor(Math.random() * 4)];
        diffs.push({ x: x, y: y, type: type, color: color });
        positions.push({ x: x, y: y, radius: 20 });
      }
      return { diffs: diffs, positions: positions };
    }

    function loadRound() {
      var total = totalDiffs[difficulty];
      totalSpan.innerText = total;
      foundDiffs = 0;
      scoreSpan.innerText = '0';
      gameActive = true;
      var generated = generateRandomDiffs(total);
      diffPositions = generated.positions;
      drawBaseImage(ctxLeft, null);
      drawBaseImage(ctxRight, generated);
      feedbackDiv.innerHTML = '';
    }

    function checkDifference(e, side) {
      if (!gameActive) return;
      var canvas = side === 'left' ? canvasLeft : canvasRight;
      var rect = canvas.getBoundingClientRect();
      var scaleX = canvas.width / rect.width;
      var scaleY = canvas.height / rect.height;
      var x = (e.offsetX || (e.clientX - rect.left)) * scaleX;
      var y = (e.offsetY || (e.clientY - rect.top)) * scaleY;
      var found = false;
      for (var i = 0; i < diffPositions.length; i++) {
        var pos = diffPositions[i];
        var dx = x - pos.x;
        var dy = y - pos.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < pos.radius) {
          found = true;
          diffPositions.splice(i, 1);
          break;
        }
      }
      if (found) {
        foundDiffs++;
        scoreSpan.innerText = foundDiffs;
        saveBest();
        var t = langData[currentLang];
        feedbackDiv.innerHTML = t.correct;
        feedbackDiv.style.color = '#2ECC71';
        if (foundDiffs === totalDiffs[difficulty]) {
          gameActive = false;
          var msg = t.gameOver;
          if (foundDiffs === totalDiffs[difficulty] && (bestScore === foundDiffs || foundDiffs > bestScore)) msg += t.newBest;
          feedbackDiv.innerHTML = msg;
        } else {
          // Fark bulunduğu yeri işaretle (basitçe çizimi güncelle)
          drawBaseImage(ctxRight, { diffs: diffPositions.map(function(p, idx) { return { x: p.x, y: p.y, type: 'fill', color: '#2ECC71' }; }) });
        }
      } else {
        var t = langData[currentLang];
        feedbackDiv.innerHTML = t.wrong;
        feedbackDiv.style.color = '#E74C3C';
        setTimeout(function() { if (gameActive) feedbackDiv.innerHTML = ''; }, 800);
      }
    }

    canvasLeft.addEventListener('click', function(e) { checkDifference(e, 'left'); });
    canvasRight.addEventListener('click', function(e) { checkDifference(e, 'right'); });

    function setDifficulty(diff) {
      difficulty = diff;
      for (var i = 0; i < diffBtns.length; i++) {
        var btn = diffBtns[i];
        if (btn.getAttribute('data-diff') === diff) btn.classList.add('active');
        else btn.classList.remove('active');
      }
      loadRound();
    }

    function resetGame() { setDifficulty(difficulty); }

    for (var i = 0; i < diffBtns.length; i++) {
      diffBtns[i].addEventListener('click', function() { var d = this.getAttribute('data-diff'); if (d !== difficulty) setDifficulty(d); });
    }
    resetBtn.addEventListener('click', resetGame);
    for (var i = 0; i < langBtns.length; i++) {
      langBtns[i].addEventListener('click', function() { var lang = this.getAttribute('data-lang'); if (lang !== currentLang) setLanguage(lang); });
    }
    setLanguage('tr'); loadBest(); setDifficulty('easy');
  })();
</script>
</body>
</html>
