<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Helix Jump · Zihin Egzersizi | SilverCompass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0F1318;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 550px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid #F6B45F40;
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #F6B45F;
    }
    .sub {
      font-size: 0.65rem;
      color: #b8d0e8;
    }
    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.8rem;
      background: #0a1018;
      padding: 4px 12px;
      border-radius: 40px;
    }
    .score-panel {
      display: flex;
      justify-content: space-between;
      background: #0a1018;
      border-radius: 60px;
      padding: 8px 16px;
      margin: 12px 0;
    }
    .score-box {
      background: #1e2a3a;
      padding: 4px 14px;
      border-radius: 40px;
      color: #F6B45F;
      font-weight: bold;
    }
    .score-box span { color: #eaf2fb; }
    button {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 40px;
      color: #0F1318;
      cursor: pointer;
    }
    canvas {
      display: block;
      margin: 12px auto;
      background: #0a1018;
      border-radius: 32px;
      width: 100%;
      aspect-ratio: 1 / 1;
      cursor: grab;
      touch-action: none;
    }
    .mobile-buttons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 12px;
    }
    .dir-btn {
      background: #F6B45F;
      width: 70px;
      padding: 8px 0;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      cursor: pointer;
      color: #0F1318;
    }
    .footer {
      margin-top: 12px;
      font-size: 0.6rem;
      color: #6c8fb0;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div><div class="logo">HELIX JUMP</div><div class="sub">SilverCompass · Zihin Egzersizi</div></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="score-panel">
    <div class="score-box">🎯 SKOR: <span id="currentScore">0</span></div>
    <div class="score-box">🏆 EN İYİ: <span id="bestScore">0</span></div>
    <button id="resetBtn">🔄 YENİ</button>
  </div>

  <canvas id="gameCanvas" width="500" height="500"></canvas>

  <div class="mobile-buttons">
    <div class="dir-btn" id="leftBtn">◀ SOL</div>
    <div class="dir-btn" id="rightBtn">SAĞ ▶</div>
  </div>
  <div class="footer">Fare veya parmak ile sola/sağa sürükle → platform döner</div>
</div>

<script>
  (function() {
    // ----- canvas ve context -----
    var canvas = document.getElementById("gameCanvas");
    var ctx = canvas.getContext("2d");
    var gameActive = true;
    var score = 0;
    var bestScore = 0;
    var animationId = null;
    
    // ----- top fizik -----
    var ball = {
      x: 0,
      y: 0,
      r: 12,
      vy: 0
    };
    
    // platform dönüşü (radyan)
    var rotation = 0;          // mevcut dönüş
    var targetRotation = 0;
    
    // ----- platformlar -----
    var platforms = [];
    var platformCount = 14;
    var platformRadius = 160;    // platform dairesinin yarıçapı
    var gapAngle = Math.PI / 2.5; // boşluk açısı (radyan)
    
    var canvasWidth = 500, canvasHeight = 500;
    var centerX = 250, centerY = 250;
    
    // ----- canvas boyutlandırma -----
    function resizeCanvas() {
      var rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      canvasWidth = canvas.width;
      canvasHeight = canvas.height;
      centerX = canvasWidth / 2;
      centerY = canvasHeight / 2;
      platformRadius = Math.min(canvasWidth, canvasHeight) * 0.32;
      initPlatforms();
      resetBall();
    }
    
    // ----- platformları oluştur (rastgele boşluk merkezi) -----
    function initPlatforms() {
      platforms = [];
      var startY = centerY - platformRadius - 30;
      for (var i = 0; i < platformCount; i++) {
        // rastgele boşluk merkezi (0 ile 2PI arası)
        var gapCenter = Math.random() * Math.PI * 2;
        platforms.push({
          y: startY + i * 42,
          gapCenter: gapCenter,
          gapHalf: gapAngle / 2,
          passed: false     // skor için bu platformdan geçti mi?
        });
      }
    }
    
    // ----- topu başlangıç konumuna koy -----
    function resetBall() {
      ball.x = centerX;
      ball.y = platforms[0].y - 20;
      ball.vy = 0;
      rotation = 0;
      targetRotation = 0;
    }
    
    // ----- döndürme -----
    function rotatePlatform(delta) {
      targetRotation += delta;
      // sınırlama yok, sürekli dönebilir
    }
    
    // ----- çarpışma ve fizik güncellemesi -----
    function updatePhysics() {
      if (!gameActive) return;
      
      // yerçekimi
      ball.vy += 0.4;
      ball.y += ball.vy;
      
      // dönüşü yumuşak geçişle uygula
      rotation += (targetRotation - rotation) * 0.15;
      var rot = rotation;
      
      // topun x konumu dönüş açısına göre (dairenin üzerinde)
      var radius = platformRadius + 6;
      var desiredX = centerX + Math.sin(rot) * radius;
      ball.x += (desiredX - ball.x) * 0.25;
      
      // yatay sınırlar (platform dışına çıkmasın)
      var minX = centerX - platformRadius - 8;
      var maxX = centerX + platformRadius + 8;
      if (ball.x - ball.r < minX) ball.x = minX + ball.r;
      if (ball.x + ball.r > maxX) ball.x = maxX - ball.r;
      
      // platform çarpışma kontrolü (top aşağı düşerken)
      var collided = false;
      for (var i = 0; i < platforms.length; i++) {
        var p = platforms[i];
        // top platform hizasında ve aşağı yönde hareket ediyorsa
        if (ball.vy > 0 && ball.y + ball.r >= p.y && ball.y - ball.r <= p.y + 6) {
          // topun açısını hesapla (x eksenine göre)
          var dx = ball.x - centerX;
          var angle = Math.atan2(0, dx);  // yatay eksen
          var angleNorm = (angle + Math.PI * 2) % (Math.PI * 2);
          
          var gapStart = (p.gapCenter - p.gapHalf + Math.PI * 2) % (Math.PI * 2);
          var gapEnd = (p.gapCenter + p.gapHalf + Math.PI * 2) % (Math.PI * 2);
          
          var insideGap = false;
          if (gapStart < gapEnd) {
            if (angleNorm > gapStart && angleNorm < gapEnd) insideGap = true;
          } else {
            if (angleNorm > gapStart || angleNorm < gapEnd) insideGap = true;
          }
          
          if (insideGap) {
            // boşluk: çarpma yok, top düşmeye devam eder (hiçbir şey yapma)
          } else {
            // platforma çarptı: topu platformun üstüne yerleştir ve zıplat
            ball.y = p.y - ball.r;
            ball.vy = -4.6;
            collided = true;
            // skor: sadece ilk kez geçişte +1
            if (!p.passed) {
              p.passed = true;
              score++;
              document.getElementById("currentScore").innerText = score;
              if (score > bestScore) {
                bestScore = score;
                document.getElementById("bestScore").innerText = bestScore;
                localStorage.setItem("helix_best", bestScore);
              }
            }
            break; // sadece bir platforma çarpabilir
          }
        }
      }
      
      // oyun bitiş: top ekran altına düştüyse veya en alt platformun altına indiyse
      if (ball.y + ball.r > canvasHeight + 50) {
        gameActive = false;
        if (animationId) cancelAnimationFrame(animationId);
        showGameOver();
      }
    }
    
    // ----- oyun bitiş ekranı -----
    function showGameOver() {
      var overlay = document.createElement('div');
      overlay.style.position = 'fixed';
      overlay.style.top = '0';
      overlay.style.left = '0';
      overlay.style.width = '100%';
      overlay.style.height = '100%';
      overlay.style.background = 'rgba(15,19,24,0.95)';
      overlay.style.display = 'flex';
      overlay.style.alignItems = 'center';
      overlay.style.justifyContent = 'center';
      overlay.style.zIndex = '1000';
      overlay.style.backdropFilter = 'blur(4px)';
      overlay.innerHTML = '<div style="background:#1e2a3a; border-radius:48px; padding:32px; text-align:center; width:260px; border:2px solid #F6B45F;"><h2 style="color:#F6B45F;">💥 OYUN BİTTİ</h2><p style="color:white; margin:16px 0;">Skor: ' + score + '</p><button id="restartGameBtn" style="background:#F6B45F; border:none; padding:8px 20px; border-radius:40px; font-weight:bold;">YENİDEN BAŞLA</button></div>';
      document.body.appendChild(overlay);
      document.getElementById('restartGameBtn').addEventListener('click', function() {
        overlay.remove();
        resetGame();
      });
    }
    
    // ----- çizim -----
    function draw() {
      if (!ctx) return;
      ctx.clearRect(0, 0, canvasWidth, canvasHeight);
      ctx.fillStyle = "#0a1018";
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      
      // platformları çiz
      for (var i = 0; i < platforms.length; i++) {
        var p = platforms[i];
        // platform dairesi
        ctx.beginPath();
        ctx.arc(centerX, p.y, platformRadius, 0, Math.PI * 2);
        ctx.strokeStyle = "#F6B45F";
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.fillStyle = "#1e2a3a";
        ctx.fill();
        // boşluk çizgisi (kırmızı)
        ctx.beginPath();
        ctx.arc(centerX, p.y, platformRadius - 3, p.gapCenter - p.gapHalf, p.gapCenter + p.gapHalf);
        ctx.strokeStyle = "#E74C3C";
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      
      // top
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = "#F6B45F";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r - 3, 0, Math.PI * 2);
      ctx.fillStyle = "#ffdf99";
      ctx.fill();
      
      // skor
      ctx.font = "bold 22px system-ui";
      ctx.fillStyle = "#F6B45F";
      ctx.fillText("⚡ " + score, 20, 50);
    }
    
    // ----- ana döngü -----
    function gameLoop() {
      if (!gameActive) return;
      updatePhysics();
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }
    
    // ----- oyunu sıfırla -----
    function resetGame() {
      if (animationId) cancelAnimationFrame(animationId);
      gameActive = true;
      score = 0;
      document.getElementById("currentScore").innerText = "0";
      var saved = localStorage.getItem("helix_best");
      bestScore = saved ? parseInt(saved, 10) : 0;
      document.getElementById("bestScore").innerText = bestScore;
      initPlatforms();
      resetBall();
      targetRotation = 0;
      rotation = 0;
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }
    
    // ----- event listeners (butonlar ve sürükleme) -----
    var leftBtn = document.getElementById("leftBtn");
    var rightBtn = document.getElementById("rightBtn");
    
    function onLeft() { rotatePlatform(-0.3); }
    function onRight() { rotatePlatform(0.3); }
    
    leftBtn.addEventListener("click", onLeft);
    rightBtn.addEventListener("click", onRight);
    leftBtn.addEventListener("touchstart", function(e) { e.preventDefault(); onLeft(); });
    rightBtn.addEventListener("touchstart", function(e) { e.preventDefault(); onRight(); });
    
    // sürükleme ile döndürme
    var dragStartX = 0;
    var dragging = false;
    
    canvas.addEventListener("mousedown", function(e) {
      dragStartX = e.clientX;
      dragging = true;
      canvas.style.cursor = "grabbing";
    });
    canvas.addEventListener("touchstart", function(e) {
      dragStartX = e.touches[0].clientX;
      dragging = true;
    });
    window.addEventListener("mousemove", function(e) {
      if (!dragging) return;
      var delta = e.clientX - dragStartX;
      if (Math.abs(delta) > 3) {
        rotatePlatform(delta * 0.008);
        dragStartX = e.clientX;
      }
    });
    window.addEventListener("touchmove", function(e) {
      if (!dragging) return;
      var delta = e.touches[0].clientX - dragStartX;
      if (Math.abs(delta) > 3) {
        rotatePlatform(delta * 0.008);
        dragStartX = e.touches[0].clientX;
        e.preventDefault();
      }
    });
    window.addEventListener("mouseup", function() {
      dragging = false;
      canvas.style.cursor = "grab";
    });
    window.addEventListener("touchend", function() { dragging = false; });
    canvas.style.cursor = "grab";
    
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    
    // ----- başlangıç -----
    window.addEventListener("resize", function() {
      resizeCanvas();
      resetGame();
    });
    resizeCanvas();
    resetGame();
  })();
</script>
</body>
</html>
