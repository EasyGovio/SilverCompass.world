<!DOCTYPE html>

<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Helix Jump · Zihin Egzersizi | SilverCompass</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0F1318;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 460px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid rgba(246,180,95,0.25);
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }
    .logo { font-size: 1.4rem; font-weight: bold; color: #F6B45F; }
    .sub  { font-size: 0.62rem; color: #b8d0e8; }
    .back-link {
      color: #F6B45F; text-decoration: none; font-weight: bold;
      font-size: 0.78rem; background: #0a1018;
      padding: 4px 12px; border-radius: 40px;
    }
    .score-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a1018;
      border-radius: 60px;
      padding: 7px 14px;
      margin: 10px 0;
    }
    .score-box {
      background: #1e2a3a;
      padding: 4px 12px;
      border-radius: 40px;
      color: #F6B45F;
      font-weight: bold;
      font-size: 0.8rem;
    }
    .score-box span { color: #eaf2fb; }
    .ctrl-btn {
      background: #F6B45F; border: none; font-weight: bold;
      padding: 5px 14px; border-radius: 40px;
      color: #0F1318; cursor: pointer; font-size: 0.8rem;
    }
    canvas {
      display: block;
      margin: 10px auto;
      border-radius: 24px;
      background: #0a1018;
      touch-action: none;
      cursor: grab;
      width: 100%;
      aspect-ratio: 3 / 5;
    }
    .mobile-buttons {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 10px;
    }
    .dir-btn {
      background: #F6B45F;
      width: 80px;
      padding: 10px 0;
      border-radius: 60px;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      color: #0F1318;
    }
    .footer { margin-top: 10px; font-size: 0.58rem; color: #6c8fb0; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">HELIX JUMP</div>
      <div class="sub">SilverCompass · Zihin Egzersizi</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="score-panel">
    <div class="score-box">🎯 <span id="currentScore">0</span></div>
    <div class="score-box">🏆 <span id="bestScore">0</span></div>
    <button class="ctrl-btn" id="resetBtn">↺ YENİ</button>
  </div>

<canvas id="gameCanvas"></canvas>

  <div class="mobile-buttons">
    <div class="dir-btn" id="leftBtn">◀ SOL</div>
    <div class="dir-btn" id="rightBtn">SAĞ ▶</div>
  </div>
  <div class="footer">Parmağını sürükle → helix döner · Top boşluktan geçsin</div>
</div>

<script>
(function () {
  /* ---- canvas setup ---- */
  var canvas = document.getElementById("gameCanvas");
  var ctx    = canvas.getContext("2d");
  var W, H, CX, CY, RADIUS, THICK;

  function resizeCanvas() {
    var rect = canvas.getBoundingClientRect();
    W  = canvas.width  = Math.round(rect.width);
    H  = canvas.height = Math.round(rect.height);
    CX = W / 2;
    RADIUS = W * 0.34;
    THICK  = Math.max(14, W * 0.045);
  }

  /* ---- game state ---- */
  var PLAT_COUNT   = 10;
  var PLAT_SPACING = 0;   /* set in init */
  var GAP_FRAC     = 0.28; /* fraction of full circle that is open */

  var platforms    = [];
  var helixAngle   = 0;     /* current world rotation of the helix */
  var targetAngle  = 0;

  var ball = { y: 0, vy: 0, r: 0 };
  var score        = 0;
  var bestScore    = parseInt(localStorage.getItem("helix_best") || "0", 10);
  var gameActive   = false;
  var rafId        = null;

  /* ---- init ---- */
  function initGame() {
    resizeCanvas();
    PLAT_SPACING = H / (PLAT_COUNT + 1);
    ball.r  = Math.max(10, W * 0.038);

    platforms = [];
    for (var i = 0; i < PLAT_COUNT; i++) {
      /* gapStart: random angle in [0, 2π) */
      platforms.push({
        y:        PLAT_SPACING * (i + 1),
        gapStart: Math.random() * Math.PI * 2,
        passed:   false
      });
    }

    /* ball starts above first platform */
    ball.y  = platforms[0].y - ball.r - 6;
    ball.vy = 0;

    helixAngle  = 0;
    targetAngle = 0;
    score       = 0;
    document.getElementById("currentScore").innerText = "0";
    document.getElementById("bestScore").innerText    = bestScore;
    gameActive  = true;
  }

  /* ---- physics ---- */
  var GRAVITY  = 0.45;
  var BOUNCE   = -5.2;
  var GAP_ANG  = Math.PI * 2 * GAP_FRAC;

  function update() {
    if (!gameActive) return;

    /* smooth rotation */
    helixAngle += (targetAngle - helixAngle) * 0.14;

    /* gravity */
    ball.vy += GRAVITY;
    ball.y  += ball.vy;

    /* collision with each platform */
    for (var i = 0; i < PLAT_COUNT; i++) {
      var p = platforms[i];
      /* only check when ball moving downward and near platform */
      if (ball.vy <= 0) continue;
      if (ball.y + ball.r < p.y - THICK / 2) continue;
      if (ball.y - ball.r > p.y + THICK / 2) continue;

      /* ball is in vertical range — is it over a solid segment? */
      /* The gap rotates with helixAngle.
         Effective gap start in world space = p.gapStart + helixAngle  */
      var gapStart = (p.gapStart + helixAngle) % (Math.PI * 2);
      if (gapStart < 0) gapStart += Math.PI * 2;
      var gapEnd   = (gapStart + GAP_ANG) % (Math.PI * 2);

      /* Ball is at CX (always, because it just falls straight down).
         We need the angular position of CX relative to platform center.
         For a straight-down ball sitting at the center horizontally,
         it will hit the TOP of the ring — angle = -π/2 (270°) = 3π/2  */
      var ballAngle = Math.PI * 1.5; /* 270° = top of circle in canvas coords */

      var inGap = false;
      if (gapEnd > gapStart) {
        inGap = (ballAngle >= gapStart && ballAngle <= gapEnd);
      } else {
        /* gap wraps around 0 */
        inGap = (ballAngle >= gapStart || ballAngle <= gapEnd);
      }

      if (!inGap) {
        /* solid hit — bounce */
        ball.y  = p.y - ball.r - THICK / 2;
        ball.vy = BOUNCE;
        if (!p.passed) {
          p.passed = true;
          score++;
          document.getElementById("currentScore").innerText = score;
          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem("helix_best", bestScore);
            document.getElementById("bestScore").innerText = bestScore;
          }
        }
        break;
      }
      /* else: gap — let ball through, mark passed */
      if (!p.passed && ball.y - ball.r > p.y) {
        p.passed = true;
        score++;
        document.getElementById("currentScore").innerText = score;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem("helix_best", bestScore);
          document.getElementById("bestScore").innerText = bestScore;
        }
      }
    }

    /* fell off bottom */
    if (ball.y - ball.r > H + 20) {
      gameActive = false;
      setTimeout(showGameOver, 150);
    }
  }

  /* ---- draw ---- */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    /* dark bg already from CSS; draw subtle cylinder guide */
    ctx.beginPath();
    ctx.arc(CX, H / 2, RADIUS, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(246,180,95,0.06)";
    ctx.lineWidth   = THICK;
    ctx.stroke();

    /* platforms */
    for (var i = 0; i < PLAT_COUNT; i++) {
      var p = platforms[i];

      var gapStart = (p.gapStart + helixAngle) % (Math.PI * 2);
      if (gapStart < 0) gapStart += Math.PI * 2;
      var gapEnd = (gapStart + GAP_ANG) % (Math.PI * 2);

      /* solid arc = complement of gap */
      var solidStart = gapEnd;
      var solidEnd   = gapStart;

      /* color: passed = dimmer */
      var col = p.passed ? "rgba(246,180,95,0.35)" : "#F6B45F";

      ctx.beginPath();
      ctx.arc(CX, p.y, RADIUS, solidStart, solidEnd, false);
      ctx.strokeStyle = col;
      ctx.lineWidth   = THICK;
      ctx.lineCap     = "butt";
      ctx.stroke();

      /* gap danger highlight */
      ctx.beginPath();
      ctx.arc(CX, p.y, RADIUS, gapStart, gapEnd, false);
      ctx.strokeStyle = "rgba(231,76,60,0.55)";
      ctx.lineWidth   = THICK;
      ctx.lineCap     = "butt";
      ctx.stroke();
    }

    /* ball */
    ctx.beginPath();
    ctx.arc(CX, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = "#F6B45F";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(CX - ball.r * 0.28, ball.y - ball.r * 0.28, ball.r * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.45)";
    ctx.fill();
  }

  function loop() {
    if (!gameActive) return;
    update();
    draw();
    rafId = requestAnimationFrame(loop);
  }

  /* ---- game over ---- */
  function showGameOver() {
    var overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,19,24,0.93);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px);";
    overlay.innerHTML = '<div style="background:#1e2a3a;border-radius:40px;padding:36px 40px;text-align:center;border:2px solid #F6B45F;max-width:280px;width:90%;">'
      + '<div style="font-size:2.4rem;margin-bottom:8px;">💥</div>'
      + '<h2 style="color:#F6B45F;letter-spacing:2px;margin-bottom:12px;">OYUN BİTTİ</h2>'
      + '<p style="color:#eaf2fb;margin-bottom:20px;font-size:0.9rem;">Skor: <strong style="color:#F6B45F;">' + score + '</strong></p>'
      + '<button id="goBtn" style="background:#F6B45F;border:none;padding:10px 28px;border-radius:40px;font-weight:bold;font-size:0.9rem;cursor:pointer;">YENİDEN BAŞLA</button>'
      + '</div>';
    document.body.appendChild(overlay);
    document.getElementById("goBtn").addEventListener("click", function () {
      overlay.remove();
      resetGame();
    });
  }

  function resetGame() {
    if (rafId) cancelAnimationFrame(rafId);
    initGame();
    loop();
  }

  /* ---- rotation input ---- */
  function rotateBy(delta) {
    targetAngle += delta;
  }

  /* buttons */
  document.getElementById("leftBtn").addEventListener("touchstart",  function (e) { e.preventDefault(); rotateBy(-0.32); });
  document.getElementById("rightBtn").addEventListener("touchstart", function (e) { e.preventDefault(); rotateBy(0.32); });
  document.getElementById("leftBtn").addEventListener("click",  function () { rotateBy(-0.32); });
  document.getElementById("rightBtn").addEventListener("click", function () { rotateBy(0.32); });

  /* drag on canvas */
  var dragX = null;
  canvas.addEventListener("mousedown",  function (e) { dragX = e.clientX; });
  canvas.addEventListener("touchstart", function (e) { dragX = e.touches[0].clientX; }, { passive: true });

  canvas.addEventListener("mousemove", function (e) {
    if (dragX === null || !(e.buttons & 1)) { dragX = null; return; }
    var dx = e.clientX - dragX;
    if (Math.abs(dx) > 3) { rotateBy(dx * 0.009); dragX = e.clientX; }
  });
  canvas.addEventListener("touchmove", function (e) {
    if (dragX === null) return;
    var dx = e.touches[0].clientX - dragX;
    if (Math.abs(dx) > 3) { rotateBy(dx * 0.009); dragX = e.touches[0].clientX; }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("mouseup",   function () { dragX = null; });
  canvas.addEventListener("touchend",  function () { dragX = null; });

  document.getElementById("resetBtn").addEventListener("click", resetGame);
  window.addEventListener("resize", resetGame);

  /* ---- start ---- */
  resetGame();
}());
</script>

</body>
</html>
