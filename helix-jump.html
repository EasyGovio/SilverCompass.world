<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Helix Jump · Zihin Egzersizi | SilverCompass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0d2137;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .game-container {
      max-width: 500px;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border-radius: 48px;
      padding: 16px 16px 20px;
      backdrop-filter: blur(2px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid rgba(246,180,95,0.3);
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #F6B45F;
    }
    .sub {
      font-size: 0.65rem;
      color: #9bb7d4;
    }
    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.8rem;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 40px;
    }
    .score-panel {
      display: flex;
      justify-content: space-between;
      background: #0a1f32;
      border-radius: 60px;
      padding: 8px 16px;
      margin: 12px 0;
      border: 1px solid #F6B45F30;
    }
    .score-box {
      background: #04162E;
      padding: 3px 14px;
      border-radius: 40px;
      color: #F6B45F;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .score-box span {
      color: white;
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 12px 0;
    }
    button {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 40px;
      color: #1a3a5c;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: 0.05s linear;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    button:active {
      transform: scale(0.96);
    }
    canvas {
      display: block;
      margin: 10px auto;
      background: #0a1f32;
      border-radius: 32px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.3);
      width: 100%;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      touch-action: none;
    }
    .mobile-buttons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 12px;
    }
    .dir-btn {
      background: #F6B45F;
      width: 65px;
      padding: 8px 0;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
      cursor: pointer;
    }
    .footer {
      margin-top: 12px;
      font-size: 0.6rem;
      color: #6c8fb0;
    }
    @media (max-width: 550px) {
      .dir-btn { width: 55px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">HELIX JUMP</div>
      <div class="sub">SilverCompass · Zihin Egzersizi</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="score-panel">
    <div class="score-box">🎯 SKOR: <span id="currentScore">0</span></div>
    <div class="score-box">🏆 EN İYİ: <span id="bestScore">0</span></div>
    <button id="resetBtn">🔄 YENİ</button>
  </div>

  <canvas id="gameCanvas" width="500" height="500"></canvas>

  <div class="mobile-buttons">
    <div class="dir-btn" id="leftBtn">◀ SOL</div>
    <div class="dir-btn" id="rightBtn">SAĞ ▶</div>
  </div>
  <div class="footer">topu boşluktan kaçırmak için sola/sağa yönlendir</div>
</div>

<script>
  // -------------------- HELIX JUMP (ES5) DÜZELTİLMİŞ --------------------
  var canvas = document.getElementById("gameCanvas");
  var ctx = canvas.getContext("2d");
  
  var gameActive = true;
  var score = 0;
  var bestScore = 0;
  var animationId = null;
  
  // Top
  var ball = {
    x: 0,
    y: 0,
    radius: 12,
    vy: 0,
    targetX: 0
  };
  
  var platforms = [];
  var platformCount = 12;
  var platformSpacing = 45;
  var platformWidth = 90;
  var platformGap = 45;
  var centerX = 0;
  
  var GRAVITY = 0.38;
  var GROUND_Y = 0;
  var canvasWidth = 500, canvasHeight = 500;
  
  function resizeCanvas() {
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    canvasWidth = canvas.width;
    canvasHeight = canvas.height;
    centerX = canvasWidth / 2;
    GROUND_Y = canvasHeight - 30;
    initPlatforms();
    resetBallPosition();
  }
  
  // topun ilk konumu (en üstteki platformun üzerinde)
  function resetBallPosition() {
    if (platforms.length > 0) {
      var topPlatform = platforms[0];
      ball.y = topPlatform.y - ball.radius - 2;
      ball.x = centerX;
      ball.targetX = centerX;
      ball.vy = 0;
    } else {
      ball.y = canvasHeight - 100;
      ball.x = centerX;
      ball.targetX = centerX;
      ball.vy = 0;
    }
  }
  
  function initPlatforms() {
    platforms = [];
    var startY = canvasHeight - 70;
    for (var i = 0; i < platformCount; i++) {
      var yPos = startY - (i * platformSpacing);
      var gapDirection = Math.random() < 0.5 ? -1 : 1;
      var gapPos = centerX + (gapDirection * (platformWidth / 2 - platformGap / 2));
      var gapStart = gapPos - platformGap/2;
      var gapEnd = gapPos + platformGap/2;
      platforms.push({
        y: yPos,
        gapStart: gapStart,
        gapEnd: gapEnd,
        width: platformWidth,
        gapX: gapPos
      });
    }
  }
  
  function scrollPlatforms(deltaY) {
    for (var i = 0; i < platforms.length; i++) {
      platforms[i].y += deltaY;
    }
    // en alttaki platform ekran altına geçince en üste taşı
    for (var i = 0; i < platforms.length; i++) {
      if (platforms[i].y > canvasHeight + 80) {
        var highestY = platforms[0].y;
        for (var j = 1; j < platforms.length; j++) {
          if (platforms[j].y < highestY) highestY = platforms[j].y;
        }
        platforms[i].y = highestY - platformSpacing;
        var gapDirection = Math.random() < 0.5 ? -1 : 1;
        var gapPos = centerX + (gapDirection * (platformWidth / 2 - platformGap / 2));
        platforms[i].gapStart = gapPos - platformGap/2;
        platforms[i].gapEnd = gapPos + platformGap/2;
        platforms[i].gapX = gapPos;
      }
    }
  }
  
  function moveBall(direction) {
    if (!gameActive) return;
    var step = 24;
    ball.targetX += direction * step;
    var minX = centerX - platformWidth/2 + ball.radius;
    var maxX = centerX + platformWidth/2 - ball.radius;
    if (ball.targetX < minX) ball.targetX = minX;
    if (ball.targetX > maxX) ball.targetX = maxX;
  }
  
  function updatePhysics() {
    if (!gameActive) return;
    
    ball.vy += GRAVITY;
    ball.y += ball.vy;
    
    // yatay yumuşak geçiş
    var dx = ball.targetX - ball.x;
    ball.x += dx * 0.25;
    
    // sınırlar
    if (ball.x - ball.radius < 0) ball.x = ball.radius;
    if (ball.x + ball.radius > canvasWidth) ball.x = canvasWidth - ball.radius;
    
    var collided = false;
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      var ballBottom = ball.y + ball.radius;
      var platformTop = p.y - 6;
      var platformBottom = p.y + 10;
      
      // top aşağı iniyor ve platform hizasında
      if (ball.vy > 0 && ballBottom >= platformTop && ball.y - ball.radius <= platformBottom) {
        // boşluk kontrolü
        var isInGap = (ball.x + ball.radius > p.gapStart && ball.x - ball.radius < p.gapEnd);
        if (!isInGap) {
          // platforma çarptı
          ball.y = platformTop - ball.radius;
          ball.vy = -4.5;
          collided = true;
          score++;
          document.getElementById("currentScore").innerText = score;
          if (score > bestScore) {
            bestScore = score;
            document.getElementById("bestScore").innerText = bestScore;
            localStorage.setItem("helix_best", bestScore);
          }
          // platformları hafifçe yukarı kaydır (topun yükselmesiyle)
          var scrollAmount = -3.2;
          scrollPlatforms(scrollAmount);
          ball.y += scrollAmount;
          break;
        }
      }
    }
    
    // oyun bitiş: top yere düştü veya ekran altına geçti
    if (ball.y + ball.radius > GROUND_Y + 20) {
      gameActive = false;
      if (animationId) cancelAnimationFrame(animationId);
      showGameOver();
    }
  }
  
  function showGameOver() {
    var overlay = document.createElement('div');
    overlay.className = 'game-overlay';
    overlay.style.position = 'fixed';
    overlay.style.top = '0';
    overlay.style.left = '0';
    overlay.style.width = '100%';
    overlay.style.height = '100%';
    overlay.style.background = 'rgba(13,33,55,0.95)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = '1000';
    overlay.style.backdropFilter = 'blur(4px)';
    overlay.innerHTML = '<div class="modal" style="background:#0a1f32; border-radius:56px; padding:32px; text-align:center; width:260px; border:2px solid #F6B45F;"><h2 style="color:#F6B45F;">💥 OYUN BİTTİ</h2><p style="color:white;">Skor: ' + score + '</p><button id="restartGameBtn" style="background:#F6B45F; border:none; padding:8px 20px; border-radius:40px; font-weight:bold; margin-top:16px;">YENİDEN BAŞLA</button></div>';
    document.body.appendChild(overlay);
    var restartBtnModal = document.getElementById('restartGameBtn');
    restartBtnModal.addEventListener('click', function() {
      overlay.remove();
      resetGame();
    });
    restartBtnModal.addEventListener('touchstart', function(e) {
      e.preventDefault();
      overlay.remove();
      resetGame();
    });
  }
  
  function draw() {
    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    var grad = ctx.createLinearGradient(0, 0, 0, canvasHeight);
    grad.addColorStop(0, "#0a1f32");
    grad.addColorStop(1, "#04162E");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      if (p.y + 20 < 0 || p.y - 30 > canvasHeight) continue;
      ctx.fillStyle = "#F6B45F";
      ctx.shadowBlur = 0;
      // sol parça
      var leftWidth = p.gapStart - (centerX - platformWidth/2);
      if (leftWidth > 0) {
        ctx.fillRect(centerX - platformWidth/2, p.y - 6, leftWidth, 14);
      }
      // sağ parça
      var rightStart = p.gapEnd;
      var rightWidth = (centerX + platformWidth/2) - rightStart;
      if (rightWidth > 0) {
        ctx.fillRect(rightStart, p.y - 6, rightWidth, 14);
      }
      ctx.strokeStyle = "#d4af37";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(centerX - platformWidth/2, p.y - 6, platformWidth, 14);
      // boşluk işareti
      ctx.fillStyle = "#E74C3C";
      ctx.font = "bold 14px system-ui";
      ctx.fillText("⬇️", p.gapX - 8, p.y + 2);
    }
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fillStyle = "#F6B45F";
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius-3, 0, Math.PI*2);
    ctx.fillStyle = "#ffdf99";
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = "bold 18px system-ui";
    ctx.fillStyle = "#F6B45F";
    ctx.fillText("⚡ " + score, 15, 45);
  }
  
  function gameLoop() {
    if (!gameActive) return;
    updatePhysics();
    draw();
    animationId = requestAnimationFrame(gameLoop);
  }
  
  function resetGame() {
    if (animationId) cancelAnimationFrame(animationId);
    gameActive = true;
    score = 0;
    document.getElementById("currentScore").innerText = "0";
    var savedBest = localStorage.getItem("helix_best");
    if (savedBest !== null) bestScore = parseInt(savedBest, 10);
    else bestScore = 0;
    document.getElementById("bestScore").innerText = bestScore;
    initPlatforms();
    resetBallPosition();
    draw();
    animationId = requestAnimationFrame(gameLoop);
  }
  
  function attachEvents() {
    var leftBtn = document.getElementById("leftBtn");
    var rightBtn = document.getElementById("rightBtn");
    leftBtn.addEventListener("click", function() { moveBall(-1); });
    leftBtn.addEventListener("touchstart", function(e) { e.preventDefault(); moveBall(-1); });
    rightBtn.addEventListener("click", function() { moveBall(1); });
    rightBtn.addEventListener("touchstart", function(e) { e.preventDefault(); moveBall(1); });
    
    window.addEventListener("keydown", function(e) {
      if (e.key === "ArrowLeft") { e.preventDefault(); moveBall(-1); }
      if (e.key === "ArrowRight") { e.preventDefault(); moveBall(1); }
    });
    
    document.getElementById("resetBtn").addEventListener("click", function() {
      if (animationId) cancelAnimationFrame(animationId);
      resetGame();
    });
  }
  
  window.addEventListener("resize", function() {
    resizeCanvas();
    resetGame();
  });
  
  resizeCanvas();
  attachEvents();
  resetGame();
</script>
</body>
</html>
