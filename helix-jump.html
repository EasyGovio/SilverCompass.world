<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Helix Jump · Zihin Egzersizi | SilverCompass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0F1318;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 500px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid #F6B45F40;
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #F6B45F;
    }
    .sub {
      font-size: 0.65rem;
      color: #b8d0e8;
    }
    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.8rem;
      background: #0a1018;
      padding: 4px 12px;
      border-radius: 40px;
    }
    .score-panel {
      display: flex;
      justify-content: space-between;
      background: #0a1018;
      border-radius: 60px;
      padding: 8px 16px;
      margin: 12px 0;
    }
    .score-box {
      background: #1e2a3a;
      padding: 4px 14px;
      border-radius: 40px;
      color: #F6B45F;
      font-weight: bold;
    }
    .score-box span { color: #eaf2fb; }
    button {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 40px;
      color: #0F1318;
      cursor: pointer;
    }
    canvas {
      display: block;
      margin: 12px auto;
      background: #0a1018;
      border-radius: 32px;
      width: 100%;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      touch-action: none;
    }
    .mobile-buttons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 12px;
    }
    .dir-btn {
      background: #F6B45F;
      width: 70px;
      padding: 8px 0;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      cursor: pointer;
      color: #0F1318;
    }
    .footer {
      margin-top: 12px;
      font-size: 0.6rem;
      color: #6c8fb0;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div><div class="logo">HELIX JUMP</div><div class="sub">SilverCompass · Zihin Egzersizi</div></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="score-panel">
    <div class="score-box">🎯 SKOR: <span id="currentScore">0</span></div>
    <div class="score-box">🏆 EN İYİ: <span id="bestScore">0</span></div>
    <button id="resetBtn">🔄 YENİ</button>
  </div>

  <canvas id="gameCanvas" width="500" height="500"></canvas>

  <div class="mobile-buttons">
    <div class="dir-btn" id="leftBtn">◀ SOL</div>
    <div class="dir-btn" id="rightBtn">SAĞ ▶</div>
  </div>
  <div class="footer">Fare veya parmak ile sola/sağa sürükle → top döner ve düşer</div>
</div>

<script>
  (function() {
    var canvas = document.getElementById("gameCanvas");
    var ctx = canvas.getContext("2d");
    var gameActive = true;
    var score = 0;
    var bestScore = 0;
    var animationId = null;
    
    // top
    var ball = { x: 0, y: 0, r: 12, vx: 0, vy: 0 };
    var targetAngle = 0;      // hedef dönüş açısı (radyan)
    var currentAngle = 0;
    
    // platformlar
    var platforms = [];
    var platformCount = 14;
    var baseY = 0;
    var platformRadius = 180;   // yarıçap (piksel)
    var gapAngle = Math.PI / 3;  // boşluk açısı (60 derece)
    
    var canvasWidth = 500, canvasHeight = 500;
    var centerX = 250, centerY = 250;
    
    function resizeCanvas() {
      var rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      canvasWidth = canvas.width;
      canvasHeight = canvas.height;
      centerX = canvasWidth / 2;
      centerY = canvasHeight / 2;
      platformRadius = Math.min(canvasWidth, canvasHeight) * 0.35;
      initPlatforms();
      resetBallPosition();
    }
    
    function initPlatforms() {
      platforms = [];
      var startY = centerY - platformRadius - 20;
      for (var i = 0; i < platformCount; i++) {
        var gapDir = (Math.random() < 0.5) ? -1 : 1;
        var gapCenter = gapDir * (Math.PI / 2 + Math.random() * 0.8);
        platforms.push({
          y: startY + i * 38,
          gapCenter: gapCenter,
          gapHalf: gapAngle / 2,
          passed: false
        });
      }
    }
    
    function resetBallPosition() {
      ball.x = centerX;
      ball.y = platforms[0].y - 28;
      ball.vx = 0;
      ball.vy = 0;
      currentAngle = 0;
      targetAngle = 0;
    }
    
    function rotatePlatform(angleDelta) {
      targetAngle += angleDelta;
      // sınırla
      if (targetAngle > Math.PI * 2) targetAngle -= Math.PI * 2;
      if (targetAngle < 0) targetAngle += Math.PI * 2;
    }
    
    function updatePhysics() {
      if (!gameActive) return;
      
      // yerçekimi
      ball.vy += 0.35;
      ball.y += ball.vy;
      
      // yatay hareket (dönüşe bağlı)
      currentAngle += (targetAngle - currentAngle) * 0.2;
      var rot = currentAngle;
      // topu dairesel yörüngede tut (x, platform yarıçapına göre)
      var radius = platformRadius + 8;
      var desiredX = centerX + Math.sin(rot) * radius;
      ball.x += (desiredX - ball.x) * 0.3;
      
      // platform çarpışma kontrolü
      var collided = false;
      for (var i = 0; i < platforms.length; i++) {
        var p = platforms[i];
        if (ball.y + ball.r >= p.y && ball.y - ball.r <= p.y + 8 && ball.vy > 0) {
          // topun açısını hesapla
          var dx = ball.x - centerX;
          var dy = 0;
          var angle = Math.atan2(dy, dx);
          var angleNorm = (angle + Math.PI * 2) % (Math.PI * 2);
          var gapStart = (p.gapCenter - p.gapHalf + Math.PI * 2) % (Math.PI * 2);
          var gapEnd = (p.gapCenter + p.gapHalf + Math.PI * 2) % (Math.PI * 2);
          var insideGap = false;
          if (gapStart < gapEnd) {
            if (angleNorm > gapStart && angleNorm < gapEnd) insideGap = true;
          } else {
            if (angleNorm > gapStart || angleNorm < gapEnd) insideGap = true;
          }
          if (insideGap) {
            // boşluk: çarpma yok, düşmeye devam
          } else {
            // platforma çarptı: zıpla
            ball.y = p.y - ball.r;
            ball.vy = -4.2;
            collided = true;
            if (!p.passed) {
              p.passed = true;
              score++;
              document.getElementById("currentScore").innerText = score;
              if (score > bestScore) {
                bestScore = score;
                document.getElementById("bestScore").innerText = bestScore;
                localStorage.setItem("helix_best", bestScore);
              }
            }
            break;
          }
        }
      }
      
      // oyun bitiş (top ekran altına düşerse)
      if (ball.y + ball.r > canvasHeight + 30) {
        gameActive = false;
        if (animationId) cancelAnimationFrame(animationId);
        showGameOver();
      }
      
      // topun yatay sınırları
      var minX = centerX - platformRadius - 5;
      var maxX = centerX + platformRadius + 5;
      if (ball.x - ball.r < minX) ball.x = minX + ball.r;
      if (ball.x + ball.r > maxX) ball.x = maxX - ball.r;
    }
    
    function showGameOver() {
      var overlay = document.createElement('div');
      overlay.style.position = 'fixed';
      overlay.style.top = '0';
      overlay.style.left = '0';
      overlay.style.width = '100%';
      overlay.style.height = '100%';
      overlay.style.background = 'rgba(15,19,24,0.95)';
      overlay.style.display = 'flex';
      overlay.style.alignItems = 'center';
      overlay.style.justifyContent = 'center';
      overlay.style.zIndex = '1000';
      overlay.style.backdropFilter = 'blur(4px)';
      overlay.innerHTML = '<div style="background:#1e2a3a; border-radius:48px; padding:32px; text-align:center; width:260px; border:2px solid #F6B45F;"><h2 style="color:#F6B45F;">💥 OYUN BİTTİ</h2><p style="color:white; margin:16px 0;">Skor: ' + score + '</p><button id="restartGameBtn" style="background:#F6B45F; border:none; padding:8px 20px; border-radius:40px; font-weight:bold;">YENİDEN BAŞLA</button></div>';
      document.body.appendChild(overlay);
      document.getElementById('restartGameBtn').addEventListener('click', function() {
        overlay.remove();
        resetGame();
      });
    }
    
    function draw() {
      if (!ctx) return;
      ctx.clearRect(0, 0, canvasWidth, canvasHeight);
      // arkaplan
      ctx.fillStyle = "#0a1018";
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      
      // platformları çiz
      for (var i = 0; i < platforms.length; i++) {
        var p = platforms[i];
        ctx.beginPath();
        ctx.arc(centerX, p.y, platformRadius, 0, Math.PI * 2);
        ctx.strokeStyle = "#F6B45F";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "#1e2a3a";
        ctx.fill();
        // boşluğu göster (kırmızı)
        var gapStart = p.gapCenter - p.gapHalf;
        var gapEnd = p.gapCenter + p.gapHalf;
        ctx.beginPath();
        ctx.arc(centerX, p.y, platformRadius - 2, gapStart, gapEnd);
        ctx.strokeStyle = "#E74C3C";
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      
      // topu çiz
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = "#F6B45F";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r - 3, 0, Math.PI * 2);
      ctx.fillStyle = "#ffdf99";
      ctx.fill();
      
      // skor gösterge
      ctx.font = "bold 20px system-ui";
      ctx.fillStyle = "#F6B45F";
      ctx.fillText("⚡ " + score, 20, 50);
    }
    
    function gameLoop() {
      if (!gameActive) return;
      updatePhysics();
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }
    
    function resetGame() {
      if (animationId) cancelAnimationFrame(animationId);
      gameActive = true;
      score = 0;
      document.getElementById("currentScore").innerText = "0";
      var saved = localStorage.getItem("helix_best");
      bestScore = saved ? parseInt(saved, 10) : 0;
      document.getElementById("bestScore").innerText = bestScore;
      initPlatforms();
      resetBallPosition();
      targetAngle = 0;
      currentAngle = 0;
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }
    
    // event listeners
    var leftBtn = document.getElementById("leftBtn");
    var rightBtn = document.getElementById("rightBtn");
    leftBtn.addEventListener("click", function() { rotatePlatform(-0.25); });
    leftBtn.addEventListener("touchstart", function(e) { e.preventDefault(); rotatePlatform(-0.25); });
    rightBtn.addEventListener("click", function() { rotatePlatform(0.25); });
    rightBtn.addEventListener("touchstart", function(e) { e.preventDefault(); rotatePlatform(0.25); });
    
    // fare / parmak sürükleme
    var dragStartX = 0;
    canvas.addEventListener("mousedown", function(e) { dragStartX = e.clientX; });
    canvas.addEventListener("touchstart", function(e) { dragStartX = e.touches[0].clientX; });
    canvas.addEventListener("mousemove", function(e) {
      if (e.buttons !== 1) return;
      var delta = e.clientX - dragStartX;
      if (Math.abs(delta) > 5) {
        rotatePlatform(delta * 0.008);
        dragStartX = e.clientX;
      }
    });
    canvas.addEventListener("touchmove", function(e) {
      var delta = e.touches[0].clientX - dragStartX;
      if (Math.abs(delta) > 5) {
        rotatePlatform(delta * 0.008);
        dragStartX = e.touches[0].clientX;
        e.preventDefault();
      }
    });
    
    document.getElementById("resetBtn").addEventListener("click", function() { resetGame(); });
    
    window.addEventListener("resize", function() { resizeCanvas(); resetGame(); });
    resizeCanvas();
    resetGame();
  })();
</script>
</body>
</html>
