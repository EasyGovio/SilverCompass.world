<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mahjong | SilverCompass</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background: #1a3a5c;
      font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .game-container {
      max-width: 750px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 20px;
      border: 1px solid rgba(246,180,95,0.4);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 20px;
      color: #FFFFFF;
    }
    .logo { font-size: 1.4rem; font-weight: bold; }
    .logo span { color: #F6B45F; }
    .back-link { color: #F6B45F; text-decoration: none; font-size: 0.9rem; }
    .stats {
      display: flex;
      justify-content: space-between;
      background: rgba(0,0,0,0.3);
      padding: 10px 16px;
      border-radius: 60px;
      margin: 15px 0;
      color: #eaf2fb;
    }
    .stats div { background: #1a3a5c; padding: 4px 12px; border-radius: 40px; }
    button {
      background: #F6B45F;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin: 20px 0;
    }
    .tile {
      aspect-ratio: 1 / 1;
      background: #eaf2fb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: #1a3a5c;
      cursor: pointer;
      box-shadow: 0 3px 0 #b8d0e8;
      transition: 0.05s linear;
    }
    .tile.selected {
      background: #F6B45F;
      color: #1a3a5c;
      transform: scale(0.97);
    }
    .tile.removed {
      visibility: hidden;
      pointer-events: none;
      box-shadow: none;
    }
    .message {
      text-align: center;
      margin-top: 15px;
      padding: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      color: #eaf2fb;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }
    @media (max-width: 550px) {
      .tile { font-size: 1rem; }
      .board { gap: 4px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="logo">Silver<span>Compass</span></div>
    <a href="index.html" class="back-link">вҶҗ Geri</a>
  </div>
  <div class="stats">
    <div>рҹҖ„ Kalan: <span id="remaining">48</span></div>
    <div>вҸұпёҸ SГјre: <span id="timer">00:00</span></div>
    <div>рҹҸҶ En Д°yi: <span id="bestScore">вҖ”</span></div>
    <button id="resetBtn">рҹ”„ SДұfДұrla</button>
  </div>
  <div id="board" class="board"></div>
  <div class="action-buttons">
    <button id="undoBtn">вҶ©пёҸ Geri Al</button>
  </div>
  <div class="message" id="message">EЕҹleЕҹen Г§iftleri seГ§.</div>
</div>
<script>
  var SYMBOLS = ['рҹҗ¶','рҹҗұ','рҹҗӯ','рҹҗ№','рҹҗ°','рҹҰҠ','рҹҗ»','рҹҗј','рҹҗЁ','рҹҗё','рҹҗ’','рҹҗ”','рҹҗ§','рҹҗҰ','рҹҗҙ','рҹҗә','рҹҰҒ','рҹҗ®','рҹҗ·','рҹҗҷ','рҹҰӢ','рҹҗҹ','рҹҗ ','рҹҗЎ'];
  var BOARD_ROWS = 4, BOARD_COLS = 8;
  var tiles = [];        // each tile: { symbol, removed, id }
  var selectedIndex = null;
  var moveHistory = [];  // store { index, symbol }
  var timerSeconds = 0, timerInterval = null;
  var gameActive = true;
  var bestKey = "mahjongBest";

  var boardDiv = document.getElementById("board");
  var remainingSpan = document.getElementById("remaining");
  var timerSpan = document.getElementById("timer");
  var bestSpan = document.getElementById("bestScore");
  var resetBtn = document.getElementById("resetBtn");
  var undoBtn = document.getElementById("undoBtn");
  var messageDiv = document.getElementById("message");

  function updateBestDisplay() {
    var best = localStorage.getItem(bestKey);
    bestSpan.innerText = best ? best : "вҖ”";
  }

  function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = null; }
  function startTimer() { stopTimer(); timerInterval = setInterval(function(){ if(gameActive){ timerSeconds++; updateTimer(); } }, 1000); }
  function updateTimer() { var m=Math.floor(timerSeconds/60), s=timerSeconds%60; timerSpan.innerText = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s); }

  function shuffleArray(arr) {
    for(var i=arr.length-1;i>0;i--) { var j=Math.floor(Math.random()*(i+1)); var temp=arr[i]; arr[i]=arr[j]; arr[j]=temp; }
    return arr;
  }

  function initTiles() {
    var total = BOARD_ROWS * BOARD_COLS;
    var pairCount = total / 2;
    var selectedSymbols = [];
    for(var i=0; i<pairCount; i++) selectedSymbols.push(SYMBOLS[i % SYMBOLS.length]);
    var allSymbols = selectedSymbols.concat(selectedSymbols);
    allSymbols = shuffleArray(allSymbols);
    tiles = [];
    for(var i=0; i<total; i++) tiles.push({ symbol: allSymbols[i], removed: false, id: i });
    moveHistory = [];
  }

  function canMatch(idx1, idx2) {
    if(idx1 === idx2) return false;
    var t1 = tiles[idx1], t2 = tiles[idx2];
    if(t1.removed || t2.removed) return false;
    if(t1.symbol !== t2.symbol) return false;
    // Basit baДҹlantДұ kontrolГј (yatay/dikey hizasДұz, sadece aynДұ sembol)
    return true;
  }

  function removePair(idx1, idx2) {
    tiles[idx1].removed = true;
    tiles[idx2].removed = true;
    moveHistory.push({ idx1: idx1, idx2: idx2, symbol: tiles[idx1].symbol });
    renderBoard();
    checkWin();
  }

  function checkWin() {
    var remaining = 0;
    for(var i=0;i<tiles.length;i++) if(!tiles[i].removed) remaining++;
    remainingSpan.innerText = remaining;
    if(remaining === 0) {
      gameActive = false;
      stopTimer();
      messageDiv.innerText = "рҹҺү TEBRД°KLER! TГјm taЕҹlarДұ temizlediniz! рҹҺү";
      var best = localStorage.getItem(bestKey);
      if(!best || timerSeconds < parseInt(best)) {
        localStorage.setItem(bestKey, timerSeconds);
        updateBestDisplay();
        messageDiv.innerText += " YENД° REKOR!";
      }
    } else {
      messageDiv.innerText = "Bir Г§ift seГ§in.";
    }
  }

  function handleTileClick(idx) {
    if(tiles[idx].removed) return;
    if(selectedIndex === null) {
      selectedIndex = idx;
      renderBoard();
      messageDiv.innerText = "Д°kinci taЕҹДұ seГ§.";
    } else {
      if(canMatch(selectedIndex, idx)) {
        removePair(selectedIndex, idx);
        selectedIndex = null;
      } else {
        messageDiv.innerText = "вқҢ Bu taЕҹlar eЕҹleЕҹmiyor! Tekrar dene.";
        selectedIndex = null;
      }
      renderBoard();
    }
  }

  function undo() {
    if(moveHistory.length === 0) { messageDiv.innerText = "Geri alДұnacak hamle yok."; return; }
    var last = moveHistory.pop();
    tiles[last.idx1].removed = false;
    tiles[last.idx2].removed = false;
    selectedIndex = null;
    renderBoard();
    checkWin();
    messageDiv.innerText = "Hamle geri alДұndДұ.";
  }

  function renderBoard() {
    boardDiv.innerHTML = "";
    for(var i=0;i<tiles.length;i++) {
      var tile = tiles[i];
      var tileDiv = document.createElement("div");
      tileDiv.className = "tile";
      if(tile.removed) tileDiv.classList.add("removed");
      if(selectedIndex === i) tileDiv.classList.add("selected");
      if(!tile.removed) tileDiv.innerText = tile.symbol;
      tileDiv.addEventListener("click", (function(idx){ return function(){ handleTileClick(idx); }; })(i));
      boardDiv.appendChild(tileDiv);
    }
    var remaining = 0;
    for(var j=0;j<tiles.length;j++) if(!tiles[j].removed) remaining++;
    remainingSpan.innerText = remaining;
  }

  function resetGame() {
    stopTimer();
    timerSeconds = 0;
    updateTimer();
    initTiles();
    selectedIndex = null;
    gameActive = true;
    renderBoard();
    startTimer();
    messageDiv.innerText = "Yeni oyun baЕҹladДұ.";
  }

  resetBtn.addEventListener("click", resetGame);
  undoBtn.addEventListener("click", undo);
  initTiles();
  renderBoard();
  startTimer();
  updateBestDisplay();
</script>
</body>
</html>
