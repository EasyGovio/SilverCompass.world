<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kart Eşleştirme | Hafıza Oyunu</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            background: linear-gradient(145deg, #071626 0%, #0a1f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .game-container {
            max-width: 700px;
            width: 100%;
            background: linear-gradient(135deg, #fffaf0, #fdf4e0);
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .header {
            background: #0a2a3b;
            padding: 18px 24px;
            text-align: center;
            border-bottom: 3px solid #e6b422;
        }
        .header h2 { color: #ffdf8c; font-size: 1.8rem; }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #1f2f3a;
            margin: 16px 20px;
            padding: 10px 20px;
            border-radius: 60px;
            color: #f7ecc7;
        }
        .stat { background: #00000055; padding: 4px 16px; border-radius: 40px; }
        button {
            background: #e6b422;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 20px;
            justify-items: center;
        }
        .card {
            aspect-ratio: 1 / 1;
            width: 100%;
            background: #1e3a5f;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f2a3b;
            transition: 0.1s linear;
            color: #ffdf8c;
            font-weight: bold;
        }
        .card.flipped, .card.matched {
            background: #e6b422;
            color: #0a2a3b;
            box-shadow: 0 2px 0 #8b5a2b;
            transform: translateY(2px);
            cursor: default;
        }
        .card.matched { opacity: 0.6; cursor: default; background: #c5851a; }
        .message {
            text-align: center;
            margin: 10px 20px 20px;
            background: #ebdfbd;
            padding: 8px;
            border-radius: 60px;
            font-weight: bold;
        }
        @media (max-width: 500px) { .grid { gap: 8px; } .card { font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header"><h2>🃟 Kart Eşleştirme</h2></div>
    <div class="stats">
        <div class="stat">🔁 Hamle: <span id="moves">0</span></div>
        <div class="stat">⏱️ Süre: <span id="timer">00:00</span></div>
        <button id="resetBtn">🔄 Yeni Oyun</button>
    </div>
    <div id="grid" class="grid"></div>
    <div id="message" class="message">Kartlara tıkla ve çiftleri bul!</div>
</div>
<script>
    const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
    let cards = [];
    let flippedCards = [];
    let lockBoard = false;
    let moves = 0;
    let timerSeconds = 0;
    let timerInterval = null;
    let matchedCount = 0;
    const gridEl = document.getElementById('grid');
    const movesEl = document.getElementById('moves');
    const timerEl = document.getElementById('timer');
    const resetBtn = document.getElementById('resetBtn');
    const messageEl = document.getElementById('message');

    function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = null; }
    function startTimer() { if(timerInterval) stopTimer(); timerInterval = setInterval(() => { timerSeconds++; updateTimer(); }, 1000); }
    function updateTimer() { let m = Math.floor(timerSeconds/60), s = timerSeconds%60; timerEl.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }

    function initGame() {
        let doubled = [...emojis, ...emojis];
        for (let i = doubled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [doubled[i], doubled[j]] = [doubled[j], doubled[i]]; }
        cards = doubled.map((emoji, idx) => ({ id: idx, emoji: emoji, flipped: false, matched: false }));
        flippedCards = [];
        lockBoard = false;
        moves = 0;
        matchedCount = 0;
        movesEl.innerText = moves;
        stopTimer(); timerSeconds = 0; updateTimer(); startTimer();
        renderBoard();
        messageEl.innerText = "Kartlara tıkla ve çiftleri bul!";
    }

    function renderBoard() {
        gridEl.innerHTML = '';
        cards.forEach((card, idx) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            if (card.flipped || card.matched) cardDiv.classList.add('flipped');
            if (card.matched) cardDiv.classList.add('matched');
            cardDiv.innerText = (card.flipped || card.matched) ? card.emoji : '?';
            cardDiv.addEventListener('click', () => onCardClick(idx));
            gridEl.appendChild(cardDiv);
        });
    }

    function onCardClick(idx) {
        if (lockBoard) return;
        if (cards[idx].matched) return;
        if (cards[idx].flipped) return;
        if (flippedCards.length === 2) return;
        cards[idx].flipped = true;
        renderBoard();
        flippedCards.push(idx);
        if (flippedCards.length === 2) {
            moves++;
            movesEl.innerText = moves;
            checkMatch();
        }
    }

    function checkMatch() {
        const [i1, i2] = flippedCards;
        if (cards[i1].emoji === cards[i2].emoji) {
            cards[i1].matched = true;
            cards[i2].matched = true;
            cards[i1].flipped = false;
            cards[i2].flipped = false;
            matchedCount += 2;
            flippedCards = [];
            renderBoard();
            if (matchedCount === cards.length) {
                stopTimer();
                messageEl.innerText = "🎉 TEBRİKLER! Tüm çiftleri buldunuz! 🎉";
            }
        } else {
            lockBoard = true;
            setTimeout(() => {
                cards[i1].flipped = false;
                cards[i2].flipped = false;
                flippedCards = [];
                lockBoard = false;
                renderBoard();
            }, 800);
        }
    }

    resetBtn.addEventListener('click', () => { initGame(); });
    initGame();
</script>
</body>
</html>
