<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kart Eşleştirme | SilverCompass</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body { background: #f0e4ce; font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .game-container { max-width: 650px; width: 100%; background: #fffaf2; border-radius: 48px; padding: 24px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); border: 1px solid #e6d5b8; text-align: center; }
    .header { display: flex; justify-content: space-between; margin-bottom: 20px; color: #1a3a5c; }
    .logo { font-size: 1.4rem; font-weight: bold; } .logo span { color: #d4af37; }
    .back-link { color: #d4af37; text-decoration: none; font-weight: bold; }
    .stats { display: flex; justify-content: space-between; background: #e6d5b8; padding: 10px; border-radius: 60px; margin: 15px 0; flex-wrap: wrap; gap: 8px; }
    .stats div { background: #fffaf2; padding: 4px 12px; border-radius: 40px; color: #1a3a5c; font-weight: bold; }
    button { background: #d4af37; border: none; padding: 6px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; color: #1a3a5c; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
    .card { aspect-ratio: 1/1; background: #1a3a5c; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.1); color: #d4af37; transition: 0.1s; }
    .card.flipped, .card.matched { background: #d4af37; color: #1a3a5c; transform: scale(0.97); }
    .card.matched { opacity: 0.6; cursor: default; background: #e6d5b8; }
    .message { margin-top: 15px; padding: 8px; background: #e6d5b8; border-radius: 40px; color: #1a3a5c; font-weight: bold; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header"><div class="logo">Silver<span>Compass</span></div><a href="index.html" class="back-link">← Geri</a></div>
  <div class="stats"><div>🔁 Hamle: <span id="moves">0</span></div><div>⏱️ Süre: <span id="timer">00:00</span></div><div>🏆 En İyi: <span id="bestScore">—</span></div><button id="resetBtn">Yeni Oyun</button></div>
  <div id="grid" class="grid"></div>
  <div class="message" id="message">Kartlara tıkla ve çiftleri bul!</div>
</div>
<script>
  var emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
  var cards = [], flippedCards = [], lockBoard = false, moves = 0, timerSeconds = 0, timerInterval = null, matchedCount = 0, gameActive = true, bestKey = "memoryBest";
  function updateBestDisplay() { var b=localStorage.getItem(bestKey); document.getElementById("bestScore").innerText=b?b:"—"; }
  function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
  function startTimer() { stopTimer(); timerInterval=setInterval(function(){ if(gameActive){ timerSeconds++; var m=Math.floor(timerSeconds/60), s=timerSeconds%60; document.getElementById("timer").innerText=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s); } },1000); }
  function initGame() { var doubled = emojis.concat(emojis); for(var i=doubled.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var temp=doubled[i]; doubled[i]=doubled[j]; doubled[j]=temp; } cards = doubled.map(function(emoji,idx){ return { id:idx, emoji:emoji, flipped:false, matched:false }; }); flippedCards=[]; lockBoard=false; moves=0; matchedCount=0; document.getElementById("moves").innerText=moves; renderBoard(); if(timerSeconds===0) startTimer(); }
  function renderBoard() { var container=document.getElementById("grid"); container.innerHTML=""; for(var i=0;i<cards.length;i++){ var cardDiv=document.createElement("div"); cardDiv.className="card"; if(cards[i].flipped||cards[i].matched) cardDiv.classList.add("flipped"); if(cards[i].matched) cardDiv.classList.add("matched"); cardDiv.innerText=(cards[i].flipped||cards[i].matched)?cards[i].emoji:"?"; cardDiv.addEventListener("click",(function(idx){ return function(){ onCardClick(idx); }; })(i)); container.appendChild(cardDiv); } }
  function onCardClick(idx){ if(lockBoard) return; if(cards[idx].matched) return; if(cards[idx].flipped) return; if(flippedCards.length===2) return; cards[idx].flipped=true; renderBoard(); flippedCards.push(idx); if(flippedCards.length===2){ moves++; document.getElementById("moves").innerText=moves; checkMatch(); } }
  function checkMatch(){ var i1=flippedCards[0], i2=flippedCards[1]; if(cards[i1].emoji===cards[i2].emoji){ cards[i1].matched=true; cards[i2].matched=true; cards[i1].flipped=false; cards[i2].flipped=false; matchedCount+=2; flippedCards=[]; renderBoard(); if(matchedCount===cards.length){ gameActive=false; stopTimer(); var best=localStorage.getItem(bestKey); if(!best||timerSeconds<parseInt(best)){ localStorage.setItem(bestKey,timerSeconds); updateBestDisplay(); document.getElementById("message").innerHTML="🎉 MÜKEMMEL! YENİ REKOR! 🎉"; } else document.getElementById("message").innerHTML="🎉 TEBRİKLER! Oyunu tamamladın!"; } } else { lockBoard=true; setTimeout(function(){ cards[i1].flipped=false; cards[i2].flipped=false; flippedCards=[]; lockBoard=false; renderBoard(); },800); } }
  function resetGame(){ stopTimer(); timerSeconds=0; document.getElementById("timer").innerText="00:00"; gameActive=true; initGame(); }
  document.getElementById("resetBtn").addEventListener("click",resetGame); initGame(); updateBestDisplay();
</script>
</body>
</html>
