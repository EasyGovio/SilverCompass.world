<!DOCTYPE html>

<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Merge · Zihin Egzersizi | SilverCompass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0F1318;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 480px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 20px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid rgba(246,180,95,0.25);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: bold;
      color: #F6B45F;
    }
    .sub {
      font-size: 0.65rem;
      color: #b8d0e8;
    }
    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.8rem;
      background: #0a1018;
      padding: 5px 12px;
      border-radius: 40px;
    }
    .score-panel {
      display: flex;
      justify-content: space-between;
      background: #0a1018;
      border-radius: 60px;
      padding: 8px 16px;
      margin: 10px 0;
      gap: 8px;
    }
    .score-box {
      background: #1e2a3a;
      padding: 4px 14px;
      border-radius: 40px;
      color: #F6B45F;
      font-weight: bold;
      font-size: 0.82rem;
    }
    .score-box span { color: #eaf2fb; }
    .board-size {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
    }
    .size-btn {
      background: #0a1018;
      color: #F6B45F;
      border: 1px solid #F6B45F;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .size-btn.active {
      background: #F6B45F;
      color: #0F1318;
      border: none;
    }
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 10px 0;
    }
    .ctrl-btn {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 40px;
      color: #0F1318;
      font-size: 0.82rem;
      cursor: pointer;
    }
    /* Grid wrapper — fixed square */
    .grid-wrap {
      background: #0a1018;
      border-radius: 28px;
      padding: 10px;
      margin: 12px 0;
    }
    .grid {
      display: grid;
      gap: 8px;
    }
    .cell {
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #0F1318;
      background: #2a3a4a;
      transition: transform 0.08s ease;
      /* width/height set by JS */
    }
    .cell[data-value="2"]    { background: #fdf0d8; color: #1e2a3a; }
    .cell[data-value="4"]    { background: #fae6b3; color: #1e2a3a; }
    .cell[data-value="8"]    { background: #F6B45F; color: #0F1318; }
    .cell[data-value="16"]   { background: #f0a030; color: white; }
    .cell[data-value="32"]   { background: #e88820; color: white; }
    .cell[data-value="64"]   { background: #e07010; color: white; }
    .cell[data-value="128"]  { background: #e8c84a; color: #0F1318; }
    .cell[data-value="256"]  { background: #d9b83a; color: #0F1318; }
    .cell[data-value="512"]  { background: #c9a828; color: white; }
    .cell[data-value="1024"] { background: #b88e18; color: white; }
    .cell[data-value="2048"] { background: #a67c08; color: white; }
    .cell[data-value="4096"] { background: #7B5EA7; color: white; }
    @keyframes pop {
      0%   { transform: scale(0.75); }
      60%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .cell-pop { animation: pop 0.15s ease-out forwards; }
    .footer {
      text-align: center;
      margin-top: 8px;
      font-size: 0.6rem;
      color: #6c8fb0;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">MERGE</div>
      <div class="sub">SilverCompass · Zihin Egzersizi</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="score-panel">
    <div class="score-box">🎯 SKOR: <span id="currentScore">0</span></div>
    <div class="score-box">🏆 EN İYİ: <span id="bestScore">0</span></div>
  </div>

  <div class="board-size">
    <div data-size="4" class="size-btn active">4×4</div>
    <div data-size="5" class="size-btn">5×5</div>
    <div data-size="6" class="size-btn">6×6</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="undoBtn">↩ GERİ AL</button>
    <button class="ctrl-btn" id="resetBtn">↺ SIFIRLA</button>
  </div>

  <div class="grid-wrap">
    <div id="gridContainer" class="grid"></div>
  </div>

  <div class="footer">← ↑ ↓ → veya kaydır · Birleştir</div>
</div>

<script>
(function () {
  var boardSize = 4;
  var grid = [];
  var score = 0;
  var bestScore = 0;
  var history = null;

  var container   = document.getElementById("gridContainer");
  var scoreSpan   = document.getElementById("currentScore");
  var bestSpan    = document.getElementById("bestScore");
  var resetBtn    = document.getElementById("resetBtn");
  var undoBtn     = document.getElementById("undoBtn");
  var sizeBtns    = document.querySelectorAll(".size-btn");

  /* ---------- helpers ---------- */
  function loadBest() {
    var v = localStorage.getItem("merge_best_" + boardSize);
    bestScore = v ? parseInt(v, 10) : 0;
    bestSpan.innerText = bestScore;
  }
  function saveBest() {
    if (score > bestScore) {
      bestScore = score;
      bestSpan.innerText = bestScore;
      localStorage.setItem("merge_best_" + boardSize, bestScore);
    }
  }
  function emptyGrid() {
    var g = [];
    for (var i = 0; i < boardSize; i++) {
      g[i] = [];
      for (var j = 0; j < boardSize; j++) g[i][j] = 0;
    }
    return g;
  }
  function addTile() {
    var empty = [];
    for (var i = 0; i < boardSize; i++)
      for (var j = 0; j < boardSize; j++)
        if (grid[i][j] === 0) empty.push([i, j]);
    if (!empty.length) return false;
    var p = empty[Math.floor(Math.random() * empty.length)];
    grid[p[0]][p[1]] = Math.random() < 0.9 ? 2 : 4;
    return p;
  }
  function copyGrid(g) {
    var c = [];
    for (var i = 0; i < boardSize; i++) c[i] = g[i].slice();
    return c;
  }
  function saveState() {
    history = { grid: copyGrid(grid), score: score };
  }

  /* ---------- cell size ---------- */
  function calcCellSize() {
    var wrap     = document.querySelector(".grid-wrap");
    var available = wrap.offsetWidth - 20;          /* padding 10px each side */
    var gap      = 8;
    var size     = Math.floor((available - gap * (boardSize - 1)) / boardSize);
    return Math.max(size, 40);
  }

  /* ---------- render ---------- */
  function renderBoard(newPos) {
    var cellSize = calcCellSize();
    var gap      = 8;
    var fontSize = Math.max(Math.floor(cellSize * 0.32), 10);

    container.style.gridTemplateColumns = "repeat(" + boardSize + ", " + cellSize + "px)";
    container.style.gap = gap + "px";
    container.innerHTML = "";

    for (var i = 0; i < boardSize; i++) {
      for (var j = 0; j < boardSize; j++) {
        var val  = grid[i][j];
        var cell = document.createElement("div");
        cell.className = "cell";
        cell.style.width    = cellSize + "px";
        cell.style.height   = cellSize + "px";
        cell.style.fontSize = fontSize + "px";

        /* shrink font for large numbers */
        if (val >= 1000) cell.style.fontSize = Math.floor(fontSize * 0.72) + "px";
        if (val >= 10000) cell.style.fontSize = Math.floor(fontSize * 0.56) + "px";

        if (val !== 0) {
          cell.setAttribute("data-value", val);
          cell.innerText = val;
          if (newPos && newPos[0] === i && newPos[1] === j) {
            cell.classList.add("cell-pop");
          }
        }
        container.appendChild(cell);
      }
    }
  }

  /* ---------- slide logic ---------- */
  function slideRow(row) {
    var arr = [];
    var i;
    for (i = 0; i < row.length; i++) if (row[i]) arr.push(row[i]);
    var gained = 0;
    for (i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1]) {
        arr[i] *= 2;
        gained += arr[i];
        arr.splice(i + 1, 1);
      }
    }
    while (arr.length < boardSize) arr.push(0);
    return { row: arr, gained: gained };
  }

  function move(dir) {
    var oldGrid   = copyGrid(grid);
    var oldScore  = score;
    var moved     = false;
    var gained    = 0;
    var i, j, res, col;

    if (dir === "left") {
      for (i = 0; i < boardSize; i++) {
        res = slideRow(grid[i]);
        for (j = 0; j < boardSize; j++) if (grid[i][j] !== res.row[j]) moved = true;
        grid[i] = res.row;
        gained += res.gained;
      }
    } else if (dir === "right") {
      for (i = 0; i < boardSize; i++) {
        res = slideRow(grid[i].slice().reverse());
        res.row.reverse();
        for (j = 0; j < boardSize; j++) if (grid[i][j] !== res.row[j]) moved = true;
        grid[i] = res.row;
        gained += res.gained;
      }
    } else if (dir === "up") {
      for (j = 0; j < boardSize; j++) {
        col = [];
        for (i = 0; i < boardSize; i++) col.push(grid[i][j]);
        res = slideRow(col);
        for (i = 0; i < boardSize; i++) {
          if (grid[i][j] !== res.row[i]) moved = true;
          grid[i][j] = res.row[i];
        }
        gained += res.gained;
      }
    } else if (dir === "down") {
      for (j = 0; j < boardSize; j++) {
        col = [];
        for (i = boardSize - 1; i >= 0; i--) col.push(grid[i][j]);
        res = slideRow(col);
        for (i = boardSize - 1; i >= 0; i--) {
          if (grid[i][j] !== res.row[boardSize - 1 - i]) moved = true;
          grid[i][j] = res.row[boardSize - 1 - i];
        }
        gained += res.gained;
      }
    }

    if (!moved) return;
    saveState();
    score += gained;
    scoreSpan.innerText = score;
    saveBest();
    var newPos = addTile();
    renderBoard(newPos);
    if (isGameOver()) setTimeout(showGameOver, 200);
  }

  function isGameOver() {
    var i, j;
    for (i = 0; i < boardSize; i++)
      for (j = 0; j < boardSize; j++)
        if (grid[i][j] === 0) return false;
    for (i = 0; i < boardSize; i++)
      for (j = 0; j < boardSize - 1; j++)
        if (grid[i][j] === grid[i][j + 1]) return false;
    for (i = 0; i < boardSize - 1; i++)
      for (j = 0; j < boardSize; j++)
        if (grid[i][j] === grid[i + 1][j]) return false;
    return true;
  }

  function showGameOver() {
    var overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,19,24,0.93);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px);";
    overlay.innerHTML = '<div style="background:#1e2a3a;border-radius:40px;padding:36px 40px;text-align:center;border:2px solid #F6B45F;max-width:280px;width:90%;">'
      + '<div style="font-size:2.5rem;margin-bottom:8px;">🏁</div>'
      + '<h2 style="color:#F6B45F;letter-spacing:2px;margin-bottom:12px;">OYUN BİTTİ</h2>'
      + '<p style="color:#eaf2fb;margin-bottom:20px;font-size:0.9rem;">Skor: <strong style="color:#F6B45F;">' + score + '</strong></p>'
      + '<button id="goBtn" style="background:#F6B45F;border:none;padding:10px 28px;border-radius:40px;font-weight:bold;font-size:0.9rem;cursor:pointer;">YENİDEN BAŞLA</button>'
      + '</div>';
    document.body.appendChild(overlay);
    document.getElementById("goBtn").addEventListener("click", function () {
      overlay.remove();
      resetGame();
    });
  }

  function resetGame() {
    grid  = emptyGrid();
    score = 0;
    scoreSpan.innerText = 0;
    history = null;
    addTile();
    addTile();
    renderBoard(null);
  }

  function undoMove() {
    if (!history) return;
    grid  = history.grid;
    score = history.score;
    scoreSpan.innerText = score;
    history = null;
    renderBoard(null);
  }

  function setBoardSize(newSize) {
    boardSize = newSize;
    sizeBtns[0].className = "size-btn" + (newSize === 4 ? " active" : "");
    sizeBtns[1].className = "size-btn" + (newSize === 5 ? " active" : "");
    sizeBtns[2].className = "size-btn" + (newSize === 6 ? " active" : "");
    loadBest();
    resetGame();
  }

  /* ---------- input ---------- */
  window.addEventListener("keydown", function (e) {
    var map = { ArrowLeft:"left", ArrowRight:"right", ArrowUp:"up", ArrowDown:"down" };
    if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  });

  var tx = 0, ty = 0;
  container.addEventListener("touchstart", function (e) {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  });
  container.addEventListener("touchend", function (e) {
    var dx = e.changedTouches[0].clientX - tx;
    var dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? "right" : "left");
    else move(dy > 0 ? "down" : "up");
  });

  resetBtn.addEventListener("click", resetGame);
  undoBtn.addEventListener("click", undoMove);
  for (var i = 0; i < sizeBtns.length; i++) {
    sizeBtns[i].addEventListener("click", function () {
      var s = parseInt(this.getAttribute("data-size"), 10);
      if (s !== boardSize) setBoardSize(s);
    });
  }

  window.addEventListener("resize", function () { renderBoard(null); });

  loadBest();
  resetGame();
}());
</script>

</body>
</html>
