<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Merge · Zihin Egzersizi | SilverCompass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0F1318;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 600px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 20px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid #F6B45F40;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: bold;
      color: #F6B45F;
    }
    .sub {
      font-size: 0.7rem;
      color: #b8d0e8;
    }
    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.85rem;
      background: #0a1018;
      padding: 5px 12px;
      border-radius: 40px;
    }
    .score-panel {
      display: flex;
      justify-content: space-between;
      background: #0a1018;
      border-radius: 60px;
      padding: 8px 18px;
      margin: 12px 0;
      flex-wrap: wrap;
      gap: 10px;
    }
    .score-box {
      background: #1e2a3a;
      padding: 4px 16px;
      border-radius: 40px;
      color: #F6B45F;
      font-weight: bold;
    }
    .score-box span {
      color: #eaf2fb;
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 12px 0;
    }
    button {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 6px 18px;
      border-radius: 40px;
      color: #0F1318;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .board-size {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 12px 0;
    }
    .size-btn {
      background: #0a1018;
      color: #F6B45F;
      border: 1px solid #F6B45F;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .size-btn.active {
      background: #F6B45F;
      color: #0F1318;
      border: none;
    }
    .grid {
      display: grid;
      gap: 10px;
      background: #0a1018;
      border-radius: 32px;
      padding: 16px;
      margin: 16px 0;
      justify-content: center;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background: #2a3a4a;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.5rem;
      transition: 0.05s linear;
      color: #0F1318;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.2);
    }
    .cell[data-value="2"] { background: #fdf0d8; color: #1e2a3a; }
    .cell[data-value="4"] { background: #fae6b3; color: #1e2a3a; }
    .cell[data-value="8"] { background: #F6B45F; color: #0F1318; }
    .cell[data-value="16"] { background: #f0a030; color: white; }
    .cell[data-value="32"] { background: #e88820; color: white; }
    .cell[data-value="64"] { background: #e07010; color: white; }
    .cell[data-value="128"] { background: #e8c84a; color: #0F1318; }
    .cell[data-value="256"] { background: #d9b83a; color: #0F1318; }
    .cell[data-value="512"] { background: #c9a828; color: white; }
    .cell[data-value="1024"] { background: #b88e18; color: white; }
    .cell[data-value="2048"] { background: #a67c08; color: white; }
    @keyframes pop {
      0% { transform: scale(0.85); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }
    .cell-new {
      animation: pop 0.1s ease-out;
    }
    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 0.65rem;
      color: #6c8fb0;
    }
    @media (max-width: 550px) {
      .cell { font-size: 1rem; }
      .grid { gap: 6px; padding: 10px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div><div class="logo">MERGE</div><div class="sub">SilverCompass · Zihin Egzersizi</div></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="score-panel">
    <div class="score-box">🎯 SKOR: <span id="currentScore">0</span></div>
    <div class="score-box">🏆 EN İYİ: <span id="bestScore">0</span></div>
  </div>

  <div class="board-size">
    <div data-size="4" class="size-btn active">4x4</div>
    <div data-size="5" class="size-btn">5x5</div>
    <div data-size="6" class="size-btn">6x6</div>
  </div>

  <div class="controls">
    <button id="undoBtn">↩️ GERİ AL</button>
    <button id="resetBtn">🔄 SIFIRLA</button>
  </div>

  <div id="gridContainer" class="grid"></div>
  <div class="footer">← ↑ ↓ → veya kaydır → birleştir</div>
</div>

<script>
  (function() {
    var boardSize = 4;
    var grid = [];
    var score = 0;
    var bestScore = 0;
    var history = null;
    
    var container = document.getElementById("gridContainer");
    var currentScoreSpan = document.getElementById("currentScore");
    var bestScoreSpan = document.getElementById("bestScore");
    var resetBtn = document.getElementById("resetBtn");
    var undoBtn = document.getElementById("undoBtn");
    var sizeBtns = document.querySelectorAll(".size-btn");
    
    function loadBestScore() {
      var saved = localStorage.getItem("merge_best");
      bestScore = saved ? parseInt(saved, 10) : 0;
      bestScoreSpan.innerText = bestScore;
    }
    function updateBestScore() {
      if (score > bestScore) {
        bestScore = score;
        bestScoreSpan.innerText = bestScore;
        localStorage.setItem("merge_best", bestScore);
      }
    }
    
    function initEmptyGrid() {
      var newGrid = [];
      for (var i = 0; i < boardSize; i++) {
        newGrid[i] = [];
        for (var j = 0; j < boardSize; j++) newGrid[i][j] = 0;
      }
      return newGrid;
    }
    
    function addRandomTile() {
      var empty = [];
      for (var i = 0; i < boardSize; i++) {
        for (var j = 0; j < boardSize; j++) {
          if (grid[i][j] === 0) empty.push({x: i, y: j});
        }
      }
      if (empty.length === 0) return false;
      var rand = Math.floor(Math.random() * empty.length);
      var pos = empty[rand];
      var val = Math.random() < 0.9 ? 2 : 4;
      grid[pos.x][pos.y] = val;
      return true;
    }
    
    function saveState() {
      var copy = [];
      for (var i = 0; i < boardSize; i++) copy[i] = grid[i].slice();
      history = { grid: copy, score: score };
    }
    
    function undoMove() {
      if (!history) return;
      grid = history.grid;
      score = history.score;
      currentScoreSpan.innerText = score;
      renderBoard(false);
      history = null;
    }
    
    function move(direction) {
      var oldGrid = [];
      for (var i = 0; i < boardSize; i++) oldGrid[i] = grid[i].slice();
      var oldScore = score;
      var moved = false;
      var addedScore = 0;
      
      // left
      if (direction === 'left') {
        for (var row = 0; row < boardSize; row++) {
          var newRow = [];
          for (var col = 0; col < boardSize; col++) {
            if (grid[row][col] !== 0) newRow.push(grid[row][col]);
          }
          for (var k = 0; k < newRow.length - 1; k++) {
            if (newRow[k] === newRow[k+1]) {
              newRow[k] *= 2;
              addedScore += newRow[k];
              newRow.splice(k+1, 1);
            }
          }
          while (newRow.length < boardSize) newRow.push(0);
          for (var c = 0; c < boardSize; c++) {
            if (grid[row][c] !== newRow[c]) moved = true;
            grid[row][c] = newRow[c];
          }
        }
      }
      // right
      else if (direction === 'right') {
        for (var row = 0; row < boardSize; row++) {
          var newRow = [];
          for (var col = boardSize-1; col >= 0; col--) {
            if (grid[row][col] !== 0) newRow.push(grid[row][col]);
          }
          for (var k = 0; k < newRow.length - 1; k++) {
            if (newRow[k] === newRow[k+1]) {
              newRow[k] *= 2;
              addedScore += newRow[k];
              newRow.splice(k+1, 1);
            }
          }
          while (newRow.length < boardSize) newRow.push(0);
          newRow.reverse();
          for (var c = 0; c < boardSize; c++) {
            if (grid[row][c] !== newRow[c]) moved = true;
            grid[row][c] = newRow[c];
          }
        }
      }
      // up
      else if (direction === 'up') {
        for (var col = 0; col < boardSize; col++) {
          var newCol = [];
          for (var row = 0; row < boardSize; row++) {
            if (grid[row][col] !== 0) newCol.push(grid[row][col]);
          }
          for (var k = 0; k < newCol.length - 1; k++) {
            if (newCol[k] === newCol[k+1]) {
              newCol[k] *= 2;
              addedScore += newCol[k];
              newCol.splice(k+1, 1);
            }
          }
          while (newCol.length < boardSize) newCol.push(0);
          for (var r = 0; r < boardSize; r++) {
            if (grid[r][col] !== newCol[r]) moved = true;
            grid[r][col] = newCol[r];
          }
        }
      }
      // down
      else if (direction === 'down') {
        for (var col = 0; col < boardSize; col++) {
          var newCol = [];
          for (var row = boardSize-1; row >= 0; row--) {
            if (grid[row][col] !== 0) newCol.push(grid[row][col]);
          }
          for (var k = 0; k < newCol.length - 1; k++) {
            if (newCol[k] === newCol[k+1]) {
              newCol[k] *= 2;
              addedScore += newCol[k];
              newCol.splice(k+1, 1);
            }
          }
          while (newCol.length < boardSize) newCol.push(0);
          newCol.reverse();
          for (var r = 0; r < boardSize; r++) {
            if (grid[r][col] !== newCol[r]) moved = true;
            grid[r][col] = newCol[r];
          }
        }
      }
      
      if (moved) {
        saveState();
        score += addedScore;
        currentScoreSpan.innerText = score;
        updateBestScore();
        addRandomTile();
        renderBoard(true);
        if (isGameOver()) showGameOver();
      }
    }
    
    function isGameOver() {
      for (var i = 0; i < boardSize; i++) {
        for (var j = 0; j < boardSize; j++) {
          if (grid[i][j] === 0) return false;
        }
      }
      for (var i = 0; i < boardSize; i++) {
        for (var j = 0; j < boardSize - 1; j++) {
          if (grid[i][j] === grid[i][j+1]) return false;
        }
      }
      for (var i = 0; i < boardSize - 1; i++) {
        for (var j = 0; j < boardSize; j++) {
          if (grid[i][j] === grid[i+1][j]) return false;
        }
      }
      return true;
    }
    
    function showGameOver() {
      var overlay = document.createElement('div');
      overlay.style.position = 'fixed';
      overlay.style.top = '0';
      overlay.style.left = '0';
      overlay.style.width = '100%';
      overlay.style.height = '100%';
      overlay.style.background = 'rgba(15,19,24,0.95)';
      overlay.style.display = 'flex';
      overlay.style.alignItems = 'center';
      overlay.style.justifyContent = 'center';
      overlay.style.zIndex = '1000';
      overlay.style.backdropFilter = 'blur(4px)';
      overlay.innerHTML = '<div style="background:#1e2a3a; border-radius:48px; padding:32px; text-align:center; width:260px; border:2px solid #F6B45F;"><h2 style="color:#F6B45F;">🏁 OYUN BİTTİ</h2><p style="color:white; margin:16px 0;">Skor: ' + score + '</p><button id="restartGameBtn" style="background:#F6B45F; border:none; padding:8px 20px; border-radius:40px; font-weight:bold;">YENİDEN BAŞLA</button></div>';
      document.body.appendChild(overlay);
      document.getElementById('restartGameBtn').addEventListener('click', function() {
        overlay.remove();
        resetGame();
      });
    }
    
    function renderBoard(animate) {
      container.style.gridTemplateColumns = 'repeat(' + boardSize + ', 1fr)';
      container.innerHTML = '';
      for (var i = 0; i < boardSize; i++) {
        for (var j = 0; j < boardSize; j++) {
          var val = grid[i][j];
          var cell = document.createElement('div');
          cell.className = 'cell';
          if (val !== 0) {
            cell.setAttribute('data-value', val);
            cell.innerText = val;
          } else {
            cell.setAttribute('data-value', '0');
            cell.innerText = '';
          }
          if (animate && val !== 0) {
            cell.classList.add('cell-new');
            setTimeout(function(el) { el.classList.remove('cell-new'); }.bind(null, cell), 150);
          }
          container.appendChild(cell);
        }
      }
    }
    
    function resetGame() {
      grid = initEmptyGrid();
      addRandomTile();
      addRandomTile();
      score = 0;
      currentScoreSpan.innerText = score;
      history = null;
      renderBoard(false);
    }
    
    function setBoardSize(newSize) {
      boardSize = newSize;
      resetGame();
      for (var i = 0; i < sizeBtns.length; i++) {
        var btn = sizeBtns[i];
        var sz = parseInt(btn.getAttribute('data-size'), 10);
        if (sz === boardSize) btn.classList.add('active');
        else btn.classList.remove('active');
      }
    }
    
    // Keyboard and touch
    function handleKey(e) {
      var key = e.key;
      if (key === 'ArrowLeft') { e.preventDefault(); move('left'); }
      else if (key === 'ArrowRight') { e.preventDefault(); move('right'); }
      else if (key === 'ArrowUp') { e.preventDefault(); move('up'); }
      else if (key === 'ArrowDown') { e.preventDefault(); move('down'); }
    }
    
    var touchStartX = 0, touchStartY = 0;
    function handleTouchStart(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
    function handleTouchEnd(e) {
      var diffX = e.changedTouches[0].clientX - touchStartX;
      var diffY = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) return;
      if (Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > 0) move('right');
        else move('left');
      } else {
        if (diffY > 0) move('down');
        else move('up');
      }
    }
    
    window.addEventListener('keydown', handleKey);
    container.addEventListener('touchstart', handleTouchStart);
    container.addEventListener('touchend', handleTouchEnd);
    resetBtn.addEventListener('click', resetGame);
    undoBtn.addEventListener('click', undoMove);
    for (var i = 0; i < sizeBtns.length; i++) {
      sizeBtns[i].addEventListener('click', function() {
        var newSize = parseInt(this.getAttribute('data-size'), 10);
        if (newSize !== boardSize) setBoardSize(newSize);
      });
    }
    
    loadBestScore();
    setBoardSize(4);
  })();
</script>
</body>
</html>
