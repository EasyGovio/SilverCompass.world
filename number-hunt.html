/* diff */
.diff-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
.diff-btn {
  background: #0a1018; color: #F6B45F;
  border: 1px solid #F6B45F;
  padding: 4px 14px; border-radius: 40px;
  font-size: 0.75rem; cursor: pointer;
}
.diff-btn.active { background: #F6B45F; color: #0F1318; border-color: #F6B45F; }

/* info */
.info-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #0a1018; border-radius: 40px;
  padding: 7px 16px; margin-bottom: 14px;
}
.info-box { color: #F6B45F; font-weight: bold; font-size: 0.78rem; }
.info-box span { color: #eaf2fb; }
.new-btn {
  background: #F6B45F; border: none; font-weight: bold;
  padding: 5px 14px; border-radius: 40px;
  color: #0F1318; cursor: pointer; font-size: 0.78rem;
}

/* target display */
.target-wrap {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 12px;
}
.target-label { font-size: 0.75rem; color: #6c8fb0; letter-spacing: 1px; }
.target-num {
  font-size: 2.8rem; font-weight: 900;
  color: #F6B45F;
  font-variant-numeric: tabular-nums;
  min-width: 70px; text-align: center;
  line-height: 1;
  transition: transform 0.15s, color 0.15s;
}
.target-num.pulse {
  animation: tPulse 0.2s ease-out;
}
@keyframes tPulse {
  0%   { transform: scale(1.4); color: #2ECC71; }
  100% { transform: scale(1);   color: #F6B45F; }
}

/* timer bar */
.timer-wrap {
  background: #0a1018; border-radius: 40px;
  padding: 8px 16px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.timer-label { font-size: 0.72rem; color: #F6B45F; font-weight: bold; flex-shrink: 0; }
.timer-track { flex: 1; height: 8px; background: #1e2a3a; border-radius: 4px; overflow: hidden; }
.timer-fill  { height: 100%; background: #2ECC71; border-radius: 4px; transition: width 0.1s linear, background 0.3s; width: 100%; }
.timer-val   { font-size: 0.82rem; font-weight: bold; color: #eaf2fb; flex-shrink: 0; width: 38px; text-align: right; font-variant-numeric: tabular-nums; }

/* field */
.field-wrap {
  background: #0a1018;
  border-radius: 28px;
  padding: 10px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.field {
  position: relative;
  width: 100%;
}
.num-bubble {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.08s, opacity 0.15s;
  border: 2px solid transparent;
  background: #1e2a3a;
  color: #eaf2fb;
}
.num-bubble:active { transform: scale(0.88); }
.num-bubble.found {
  background: #2ECC71 !important;
  color: #0F1318 !important;
  border-color: #27AE60 !important;
  pointer-events: none;
  animation: foundPop 0.25s ease-out forwards;
}
.num-bubble.wrong-tap {
  animation: wrongShake 0.3s ease-out;
}
@keyframes foundPop {
  0%   { transform: scale(1.3); }
  60%  { transform: scale(0.9); }
  100% { transform: scale(1); opacity: 0.5; }
}
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-6px); }
  75%     { transform: translateX(6px); }
}

/* score pop */
.score-pop {
  position: fixed;
  font-size: 1.1rem; font-weight: 900;
  color: #2ECC71;
  pointer-events: none;
  z-index: 200;
  animation: scorePop 0.7s ease-out forwards;
}
@keyframes scorePop {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
}

/* overlay */
.overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(15,19,24,0.93);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.overlay-box {
  background: #1e2a3a; border-radius: 40px;
  padding: 36px 40px; text-align: center;
  border: 2px solid #F6B45F; max-width: 300px; width: 90%;
}
.overlay-icon  { font-size: 3rem; margin-bottom: 10px; }
.overlay-title { font-size: 1.5rem; font-weight: bold; color: #F6B45F; letter-spacing: 2px; margin-bottom: 8px; }
.overlay-msg   { color: #eaf2fb; font-size: 0.85rem; margin-bottom: 18px; line-height: 1.8; }
.overlay-btn {
  background: #F6B45F; border: none; font-weight: bold;
  padding: 10px 28px; border-radius: 40px;
  color: #0F1318; cursor: pointer; font-size: 0.9rem;
}

.footer { text-align: center; font-size: 0.6rem; color: #6c8fb0; margin-top: 10px; }

<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">NUMBER HUNT</div>
      <div class="sub">SilverCompass · Seçici Dikkat</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="diff-row">
    <div class="diff-btn active" data-diff="easy">Kolay</div>
    <div class="diff-btn" data-diff="medium">Orta</div>
    <div class="diff-btn" data-diff="hard">Zor</div>
  </div>

  <div class="info-bar">
    <div class="info-box">Skor: <span id="scoreNum">0</span></div>
    <div class="info-box">🏆 <span id="bestNum">—</span></div>
    <button class="new-btn" id="newBtn">↺ Yeni</button>
  </div>

  <div class="target-wrap">
    <div class="target-label">Bul:</div>
    <div class="target-num" id="targetNum">—</div>
    <div class="target-label" id="remainLabel"></div>
  </div>

  <div class="timer-wrap">
    <div class="timer-label">⏱</div>
    <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
    <div class="timer-val"  id="timerVal">60s</div>
  </div>

  <div class="field-wrap">
    <div class="field" id="field"></div>
  </div>

  <div class="footer">Sayıları küçükten büyüğe sırayla bul · Hızlı ol!</div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon" id="overlayIcon">⏰</div>
    <div class="overlay-title" id="overlayTitle">SÜRE BİTTİ!</div>
    <div class="overlay-msg"   id="overlayMsg"></div>
    <button class="overlay-btn" id="overlayBtn">Tekrar Oyna</button>
  </div>
</div>

<script>
(function () {

  /* ---- CONFIG ---- */
  var DIFF = 'easy';
  var CONFIGS = {
    easy:   { count: 16, timeLimit: 60, bubbleMin: 44, bubbleMax: 54, fontSize: 18 },
    medium: { count: 25, timeLimit: 60, bubbleMin: 38, bubbleMax: 48, fontSize: 15 },
    hard:   { count: 36, timeLimit: 60, bubbleMin: 32, bubbleMax: 40, fontSize: 13 }
  };

  /* ---- STATE ---- */
  var numbers      = [];   /* sorted list 1..count */
  var nextTarget   = 1;
  var score        = 0;
  var bestScore    = 0;
  var timeLeft     = 60;
  var totalTime    = 60;
  var timerInterval = null;
  var gameActive   = false;
  var wrongPenalty = 0;

  /* ---- ELEMENTS ---- */
  var fieldEl   = document.getElementById('field');
  var targetEl  = document.getElementById('targetNum');
  var remainEl  = document.getElementById('remainLabel');
  var timerFill = document.getElementById('timerFill');
  var timerVal  = document.getElementById('timerVal');
  var scoreEl   = document.getElementById('scoreNum');
  var bestEl    = document.getElementById('bestNum');
  var overlay   = document.getElementById('overlay');
  var diffBtns  = document.querySelectorAll('.diff-btn');

  /* ---- BEST SCORE ---- */
  function bestKey() { return 'nh_best_' + DIFF; }
  function loadBest() {
    var v = parseInt(localStorage.getItem(bestKey()) || '0', 10);
    bestScore = v;
    bestEl.textContent = v > 0 ? v : '—';
  }
  function saveBest() {
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem(bestKey(), score);
      bestEl.textContent = score;
    }
  }

  /* ---- FIELD SIZE ---- */
  function getFieldSize() {
    var wrap = document.querySelector('.field-wrap');
    var w    = wrap.offsetWidth - 20;
    return { w: w, h: Math.max(w * 1.1, 320) };
  }

  /* ---- PLACE BUBBLES ---- */
  function buildField() {
    var cfg  = CONFIGS[DIFF];
    var fs   = getFieldSize();
    var count = cfg.count;
    var bMin  = cfg.bubbleMin;
    var bMax  = cfg.bubbleMax;

    fieldEl.style.height = fs.h + 'px';
    fieldEl.innerHTML    = '';

    /* shuffle numbers 1..count */
    numbers = [];
    for (var i = 1; i <= count; i++) numbers.push(i);
    shuffle(numbers);

    /* place without overlap — simple grid + jitter */
    var cols   = Math.ceil(Math.sqrt(count * fs.w / fs.h));
    var rows   = Math.ceil(count / cols);
    var cellW  = fs.w / cols;
    var cellH  = fs.h / rows;

    var positions = [];
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        positions.push({ cx: (c + 0.5) * cellW, cy: (r + 0.5) * cellH });
      }
    }
    shuffle(positions);

    for (var i = 0; i < count; i++) {
      var num  = numbers[i];
      var bSize = bMin + Math.floor(Math.random() * (bMax - bMin + 1));
      var pos  = positions[i];
      var x    = Math.max(bSize / 2, Math.min(fs.w - bSize / 2, pos.cx + (Math.random() - 0.5) * cellW * 0.5));
      var y    = Math.max(bSize / 2, Math.min(fs.h - bSize / 2, pos.cy + (Math.random() - 0.5) * cellH * 0.5));

      /* color variety based on value */
      var hue = Math.round((num / count) * 200 + 200); /* blue → purple range */
      var bg  = 'hsl(' + hue + ',30%,22%)';
      var border = 'hsl(' + hue + ',40%,40%)';

      (function (n, bsz, px, py, bg_, bd_) {
        var bubble = document.createElement('div');
        bubble.className = 'num-bubble';
        bubble.textContent = n;
        bubble.style.width      = bsz + 'px';
        bubble.style.height     = bsz + 'px';
        bubble.style.left       = (px - bsz / 2) + 'px';
        bubble.style.top        = (py - bsz / 2) + 'px';
        bubble.style.fontSize   = cfg.fontSize + 'px';
        bubble.style.background = bg_;
        bubble.style.borderColor = bd_;
        bubble.setAttribute('data-num', n);

        bubble.addEventListener('click', function (e) { onBubbleClick(n, bubble, e); });
        fieldEl.appendChild(bubble);
      })(num, bSize, x, y, bg, border);
    }
  }

  /* ---- SHUFFLE ---- */
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
  }

  /* ---- BUBBLE CLICK ---- */
  function onBubbleClick(num, el, e) {
    if (!gameActive) return;
    if (num === nextTarget) {
      /* correct */
      el.classList.add('found');
      var pts = Math.max(10, 20 - wrongPenalty);
      score += pts;
      wrongPenalty = 0;
      scoreEl.textContent = score;
      showScorePop('+' + pts, e.clientX, e.clientY);

      nextTarget++;
      var cfg = CONFIGS[DIFF];
      if (nextTarget > cfg.count) {
        /* all found — bonus time left */
        score += Math.round(timeLeft * 2);
        scoreEl.textContent = score;
        endGame(true);
        return;
      }
      updateTarget();
    } else {
      /* wrong */
      wrongPenalty = Math.min(wrongPenalty + 2, 10);
      el.classList.add('wrong-tap');
      timeLeft = Math.max(0, timeLeft - 2); /* -2s penalty */
      setTimeout(function () { el.classList.remove('wrong-tap'); }, 300);
    }
  }

  /* ---- SCORE POP ---- */
  function showScorePop(text, x, y) {
    var pop = document.createElement('div');
    pop.className   = 'score-pop';
    pop.textContent = text;
    pop.style.left  = (x - 20) + 'px';
    pop.style.top   = (y - 20) + 'px';
    document.body.appendChild(pop);
    setTimeout(function () { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 700);
  }

  /* ---- UPDATE TARGET ---- */
  function updateTarget() {
    targetEl.textContent = nextTarget;
    targetEl.classList.remove('pulse');
    void targetEl.getBoundingClientRect();
    targetEl.classList.add('pulse');
    setTimeout(function () { targetEl.classList.remove('pulse'); }, 200);

    var cfg = CONFIGS[DIFF];
    remainEl.textContent = (cfg.count - nextTarget + 1) + ' kaldı';
  }

  /* ---- TIMER ---- */
  function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(function () {
      timeLeft -= 0.1;
      if (timeLeft <= 0) { timeLeft = 0; }
      var pct = (timeLeft / totalTime) * 100;
      timerFill.style.width = pct + '%';
      timerFill.style.background = timeLeft > 20 ? '#2ECC71' : timeLeft > 10 ? '#F6B45F' : '#E74C3C';
      timerVal.textContent  = Math.ceil(timeLeft) + 's';
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        endGame(false);
      }
    }, 100);
  }

  /* ---- END GAME ---- */
  function endGame(allFound) {
    clearInterval(timerInterval);
    gameActive = false;
    saveBest();

    var cfg  = CONFIGS[DIFF];
    var found = nextTarget - 1;
    var best = parseInt(localStorage.getItem(bestKey()) || '0', 10);

    document.getElementById('overlayIcon').textContent  = allFound ? '🏆' : '⏰';
    document.getElementById('overlayTitle').textContent = allFound ? 'TÜMÜNÜ BULDU!' : 'SÜRE BİTTİ!';
    document.getElementById('overlayMsg').textContent   =
      found + '/' + cfg.count + ' sayı bulundu\n' +
      'Skor: ' + score + '\n' +
      'En iyi: ' + Math.max(score, best);
    overlay.classList.add('show');
  }

  /* ---- NEW GAME ---- */
  function newGame() {
    clearInterval(timerInterval);
    overlay.classList.remove('show');

    var cfg   = CONFIGS[DIFF];
    totalTime = cfg.timeLimit;
    timeLeft  = cfg.timeLimit;
    nextTarget = 1;
    score     = 0;
    wrongPenalty = 0;
    gameActive   = true;

    scoreEl.textContent = '0';
    timerFill.style.width = '100%';
    timerFill.style.background = '#2ECC71';
    timerVal.textContent = cfg.timeLimit + 's';

    loadBest();
    buildField();
    updateTarget();
    startTimer();
  }

  /* ---- EVENTS ---- */
  document.getElementById('newBtn').addEventListener('click', newGame);
  document.getElementById('overlayBtn').addEventListener('click', newGame);

  for (var i = 0; i < diffBtns.length; i++) {
    diffBtns[i].addEventListener('click', function () {
      for (var j = 0; j < diffBtns.length; j++) diffBtns[j].classList.remove('active');
      this.classList.add('active');
      DIFF = this.getAttribute('data-diff');
      newGame();
    });
  }

  window.addEventListener('resize', function () { if (gameActive) buildField(); });

  /* ---- INIT ---- */
  newGame();
}());
</script>

</body>
