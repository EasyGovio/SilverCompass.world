<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sayı Dizisi | SilverCompass</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body { background: #f0e4ce; font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .game-container { max-width: 550px; width: 100%; background: #fffaf2; border-radius: 48px; padding: 24px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); border: 1px solid #e6d5b8; text-align: center; }
    .header { display: flex; justify-content: space-between; margin-bottom: 20px; color: #1a3a5c; }
    .logo { font-size: 1.4rem; font-weight: bold; } .logo span { color: #d4af37; }
    .back-link { color: #d4af37; text-decoration: none; font-weight: bold; }
    .stats { display: flex; justify-content: space-between; background: #e6d5b8; padding: 10px; border-radius: 60px; margin: 15px 0; flex-wrap: wrap; gap: 8px; }
    .stats div { background: #fffaf2; padding: 4px 12px; border-radius: 40px; color: #1a3a5c; font-weight: bold; }
    button { background: #d4af37; border: none; padding: 6px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; color: #1a3a5c; margin: 5px; }
    .sequence-box { font-size: 2.5rem; letter-spacing: 12px; background: #e6d5b8; padding: 30px; border-radius: 30px; margin: 20px 0; color: #1a3a5c; font-weight: bold; }
    input { padding: 12px; font-size: 1.2rem; text-align: center; border-radius: 60px; border: 2px solid #d4af37; width: 80%; margin: 15px 0; background: #fffaf2; color: #1a3a5c; }
    .message { margin-top: 20px; padding: 8px; background: #e6d5b8; border-radius: 40px; color: #1a3a5c; font-weight: bold; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header"><div class="logo">Silver<span>Compass</span></div><a href="index.html" class="back-link">← Geri</a></div>
  <div class="stats"><div>📏 Uzunluk: <span id="length">1</span></div><div>🏆 En Uzun: <span id="bestScore">—</span></div><button id="resetBtn">Yeni Oyun</button></div>
  <div id="sequenceDisplay" class="sequence-box">???</div>
  <input type="text" id="userInput" placeholder="Diziyi boşlukla ayırarak girin (örn: 3 5 1)">
  <button id="submitBtn">Kontrol Et</button>
  <div class="message" id="message">Diziyi izle ve hatırla!</div>
</div>
<script>
  var currentSequence = [], currentLength = 1, maxLength = 0, gameActive = true, showing = false, timeoutId = null, bestKey = "numbersBest";
  function updateBestDisplay() { var b=localStorage.getItem(bestKey); document.getElementById("bestScore").innerText=b?b:"—"; }
  function saveBest() { if(currentLength-1 > maxLength) maxLength = currentLength-1; var best = localStorage.getItem(bestKey); if(!best || maxLength > parseInt(best)) { localStorage.setItem(bestKey, maxLength); updateBestDisplay(); } }
  function generateRandomSequence(len) { var arr=[]; for(var i=0;i<len;i++) arr.push(Math.floor(Math.random()*9)+1); return arr; }
  function showSequence() { if(timeoutId) clearTimeout(timeoutId); showing=true; document.getElementById("sequenceDisplay").innerText = currentSequence.join(" "); timeoutId = setTimeout(function(){ document.getElementById("sequenceDisplay").innerText = "???"; showing=false; document.getElementById("message").innerText = "Şimdi diziyi aynen gir (boşlukla ayırarak)"; timeoutId=null; }, 2000); }
  function nextRound() { currentLength++; document.getElementById("length").innerText = currentLength; currentSequence = generateRandomSequence(currentLength); showSequence(); }
  function checkAnswer() { if(showing) { document.getElementById("message").innerText = "Lütfen dizinin gösterilmesini bekle."; return; } var input = document.getElementById("userInput").value.trim().split(/\s+/).map(Number); if(input.length !== currentSequence.length) { document.getElementById("message").innerText = "Yanlış uzunluk! ("+currentSequence.length+" sayı girmelisiniz)"; return; } var correct = true; for(var i=0;i<input.length;i++) if(input[i] !== currentSequence[i]) correct=false; if(correct) { document.getElementById("message").innerText = "Doğru! Sonraki tur..."; document.getElementById("userInput").value = ""; if(currentLength > maxLength) maxLength = currentLength; saveBest(); nextRound(); } else { gameActive=false; saveBest(); document.getElementById("message").innerHTML = "❌ Oyun bitti! En uzun doğru dizi uzunluğu: "+maxLength; document.getElementById("submitBtn").disabled = true; } }
  function resetGame() { if(timeoutId) clearTimeout(timeoutId); gameActive=true; currentLength=1; maxLength=0; document.getElementById("length").innerText="1"; currentSequence = generateRandomSequence(1); showSequence(); document.getElementById("userInput").value=""; document.getElementById("submitBtn").disabled = false; updateBestDisplay(); document.getElementById("message").innerText = "Yeni oyun! Diziyi izle."; }
  document.getElementById("submitBtn").addEventListener("click", checkAnswer); document.getElementById("resetBtn").addEventListener("click", resetGame); resetGame();
</script>
</body>
</html>
