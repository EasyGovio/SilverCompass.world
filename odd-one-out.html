.diff-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
.diff-btn { background: #0a1018; color: #F6B45F; border: 1px solid #F6B45F; padding: 4px 14px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; }
.diff-btn.active { background: #F6B45F; color: #0F1318; border-color: #F6B45F; }

.info-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #0a1018; border-radius: 40px;
  padding: 7px 16px; margin-bottom: 12px;
}
.info-box { color: #F6B45F; font-weight: bold; font-size: 0.78rem; }
.info-box span { color: #eaf2fb; }
.new-btn { background: #F6B45F; border: none; font-weight: bold; padding: 5px 14px; border-radius: 40px; color: #0F1318; cursor: pointer; font-size: 0.78rem; }

.timer-wrap {
  display: flex; align-items: center; gap: 10px;
  background: #0a1018; border-radius: 40px;
  padding: 7px 16px; margin-bottom: 14px;
}
.timer-label { font-size: 0.7rem; color: #F6B45F; font-weight: bold; flex-shrink: 0; }
.timer-track { flex: 1; height: 7px; background: #1e2a3a; border-radius: 4px; overflow: hidden; }
.timer-fill  { height: 100%; background: #2ECC71; border-radius: 4px; transition: width 0.1s linear; }
.timer-val   { font-size: 0.78rem; color: #eaf2fb; font-weight: bold; width: 34px; text-align: right; }

/* round dots */
.rounds-wrap { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
.round-dot { width: 10px; height: 10px; border-radius: 50%; background: #1e2a3a; border: 1px solid #2a3a4a; transition: background 0.2s; }
.round-dot.ok   { background: #2ECC71; border-color: #27AE60; }
.round-dot.fail { background: #E74C3C; border-color: #c0392b; }
.round-dot.curr { background: rgba(246,180,95,0.5); border-color: #F6B45F; }

/* grid */
.grid-wrap { background: #0a1018; border-radius: 28px; padding: 14px; margin-bottom: 14px; }
.grid { display: grid; gap: 10px; justify-content: center; }
.item {
  background: #1e2a3a;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.08s, background 0.1s;
  border: 2px solid transparent;
}
.item:active { transform: scale(0.93); }
.item.correct-flash { animation: correctFlash 0.35s ease-out forwards; }
.item.wrong-flash   { animation: wrongFlash  0.35s ease-out forwards; }
@keyframes correctFlash {
  0%   { background: #2ECC71; border-color: #27AE60; }
  100% { background: #1e2a3a; border-color: transparent; }
}
@keyframes wrongFlash {
  0%   { background: #E74C3C; border-color: #c0392b; }
  100% { background: #1e2a3a; border-color: transparent; }
}

/* message */
.msg-bar { text-align: center; font-size: 0.8rem; color: #6c8fb0; min-height: 20px; margin-bottom: 4px; }

/* overlay */
.overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(15,19,24,0.93);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: all; }

<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">ODD ONE OUT</div>
      <div class="sub">SilverCompass · Ayırıcı Dikkat</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="diff-row">
    <div class="diff-btn active" data-diff="easy">Kolay</div>
    <div class="diff-btn" data-diff="medium">Orta</div>
    <div class="diff-btn" data-diff="hard">Zor</div>
  </div>

  <div class="info-bar">
    <div class="info-box">Skor: <span id="scoreNum">0</span></div>
    <div class="info-box">🏆 <span id="bestNum">—</span></div>
    <button class="new-btn" id="newBtn">↺ Yeni</button>
  </div>

  <div class="timer-wrap">
    <div class="timer-label">⏱</div>
    <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="timer-val" id="timerVal">30s</div>
  </div>

  <div class="rounds-wrap" id="roundsWrap"></div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="msg-bar" id="msgBar">Farklı olanı bul!</div>

  <div class="footer">Aralarından farklı olanı seç · Hızlı ol!</div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon">🔍</div>
    <div class="overlay-title" id="overlayTitle">OYUN BİTTİ</div>
    <div class="overlay-rows" id="overlayRows"></div>
    <button class="overlay-btn" id="overlayBtn">Tekrar Oyna</button>
  </div>
</div>

<script>
(function () {

  /* ---- KATEGORİLER ---- */
  var CATS = [
    ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🦆','🦉','🐺'],
    ['🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🍒','🥝','🍑','🍍','🥭','🍅','🫐','🥥','🍈','🍏','🍄','🥑'],
    ['🚗','🚕','🚙','🚌','🚎','🏎','🚓','🚑','🚒','🚐','🚚','🚛','🚜','🚲','🛵','🏍','✈️','🚀','⛵','🚤'],
    ['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🎱','🏓','🏸','🥊','🎿','⛷','🏂','🤸','🏊','🚴','🤼','🥋','🎯'],
    ['🎸','🎹','🎺','🎻','🥁','🎷','🎤','🎧','🎵','🎶','🎼','🎙','📻','🔔','🎈','🎉','🎊','🎭','🎬','🎮']
  ];

  /* ---- CONFIG ---- */
  var DIFF = 'easy';
  var CONFIGS = {
    easy:   { gridSize: 4, rounds: 8,  timeLimit: 30 },
    medium: { gridSize: 6, rounds: 12, timeLimit: 25 },
    hard:   { gridSize: 9, rounds: 16, timeLimit: 20 }
  };

  /* ---- STATE ---- */
  var score        = 0;
  var bestScore    = parseInt(localStorage.getItem('oo3_best') || '0', 10);
  var round        = 0;
  var correct      = 0;
  var wrong        = 0;
  var timeLeft     = 30;
  var totalTime    = 30;
  var timerInterval = null;
  var gameActive   = false;
  var oddIndex     = -1;
  var roundResults = [];
  var locked       = false;

  /* ---- ELEMENTS ---- */
  var gridEl      = document.getElementById('grid');
  var scoreEl     = document.getElementById('scoreNum');
  var bestEl      = document.getElementById('bestNum');
  var timerFill   = document.getElementById('timerFill');
  var timerVal    = document.getElementById('timerVal');
  var msgBar      = document.getElementById('msgBar');
  var roundsWrap  = document.getElementById('roundsWrap');
  var overlay     = document.getElementById('overlay');
  var diffBtns    = document.querySelectorAll('.diff-btn');

  bestEl.textContent = bestScore > 0 ? bestScore : '—';

  /* ---- DIFF ---- */
  for (var d = 0; d < diffBtns.length; d++) {
    diffBtns[d].addEventListener('click', function () {
      for (var i = 0; i < diffBtns.length; i++) diffBtns[i].classList.remove('active');
      this.classList.add('active');
      DIFF = this.getAttribute('data-diff');
      newGame();
    });
  }

  /* ---- ROUNDS DOTS ---- */
  function buildDots() {
    roundsWrap.innerHTML = '';
    var cfg = CONFIGS[DIFF];
    for (var i = 0; i < cfg.rounds; i++) {
      var d = document.createElement('div');
      d.className = 'round-dot' + (i === 0 ? ' curr' : '');
      roundsWrap.appendChild(d);
    }
  }
  function updateDots() {
    var dots = roundsWrap.querySelectorAll('.round-dot');
    for (var i = 0; i < dots.length; i++) {
      dots[i].className = 'round-dot';
      if (i < roundResults.length) dots[i].classList.add(roundResults[i] ? 'ok' : 'fail');
      else if (i === roundResults.length) dots[i].classList.add('curr');
    }
  }

  /* ---- GENERATE ROUND ---- */
  function generateRound() {
    if (!gameActive) return;
    locked = false;
    var cfg      = CONFIGS[DIFF];
    var gridSize = cfg.gridSize;

    /* pick two different emojis from same category */
    var cat      = CATS[Math.floor(Math.random() * CATS.length)];
    var idx1     = Math.floor(Math.random() * cat.length);
    var idx2     = idx1;
    while (idx2 === idx1) idx2 = Math.floor(Math.random() * cat.length);
    var common   = cat[idx1];
    var odd      = cat[idx2];

    var items = [];
    for (var i = 0; i < gridSize; i++) items.push(common);
    oddIndex = Math.floor(Math.random() * gridSize);
    items[oddIndex] = odd;

    renderGrid(items, gridSize);
  }

  /* ---- RENDER GRID ---- */
  function renderGrid(items, gridSize) {
    var cols     = Math.round(Math.sqrt(gridSize));
    var wrap     = document.querySelector('.grid-wrap');
    var available = wrap.offsetWidth - 28;
    var cellSize = Math.floor((available - (cols - 1) * 10) / cols);
    cellSize     = Math.max(cellSize, 48);
    var fontSize = Math.round(cellSize * 0.52);

    gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cellSize + 'px)';
    gridEl.style.gap = '10px';
    gridEl.innerHTML = '';

    for (var i = 0; i < items.length; i++) {
      (function (idx) {
        var item = document.createElement('div');
        item.className  = 'item';
        item.textContent = items[idx];
        item.style.width    = cellSize + 'px';
        item.style.height   = cellSize + 'px';
        item.style.fontSize = fontSize + 'px';
        item.addEventListener('click', function () { onItemClick(idx, item); });
        gridEl.appendChild(item);
      })(i);
    }
  }

  /* ---- ITEM CLICK ---- */
  function onItemClick(idx, itemEl) {
    if (!gameActive || locked) return;
    locked = true;

    var cfg = CONFIGS[DIFF];
    var isCorrect = (idx === oddIndex);

    if (isCorrect) {
      correct++;
      roundResults.push(true);
      var pts = 10 + Math.floor(round / 3) * 2;
      score += pts;
      scoreEl.textContent = score;
      saveBest();
      msgBar.textContent = '✓ Doğru! +' + pts;
      msgBar.style.color = '#2ECC71';
      itemEl.classList.add('correct-flash');
    } else {
      wrong++;
      roundResults.push(false);
      score = Math.max(0, score - 5);
      scoreEl.textContent = score;
      msgBar.textContent = '✕ Yanlış! -5 puan';
      msgBar.style.color = '#E74C3C';
      itemEl.classList.add('wrong-flash');
      /* flash correct answer */
      var allItems = gridEl.querySelectorAll('.item');
      allItems[oddIndex].classList.add('correct-flash');
    }

    round++;
    updateDots();

    if (round >= cfg.rounds) {
      setTimeout(endGame, 600);
    } else {
      setTimeout(function () {
        msgBar.style.color = '#6c8fb0';
        generateRound();
      }, 700);
    }
  }

  /* ---- TIMER ---- */
  function startTimer() {
    clearInterval(timerInterval);
    var cfg   = CONFIGS[DIFF];
    timeLeft  = cfg.timeLimit;
    totalTime = timeLeft;
    timerFill.style.width      = '100%';
    timerFill.style.background = '#2ECC71';
    timerVal.textContent       = timeLeft + 's';

    timerInterval = setInterval(function () {
      timeLeft--;
      var pct = (timeLeft / totalTime) * 100;
      timerFill.style.width      = pct + '%';
      timerFill.style.background = timeLeft > totalTime * 0.5 ? '#2ECC71'
                                  : timeLeft > totalTime * 0.25 ? '#F6B45F' : '#E74C3C';
      timerVal.textContent = timeLeft + 's';
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        gameActive = false;
        endGame();
      }
    }, 1000);
  }

  /* ---- END ---- */
  function endGame() {
    clearInterval(timerInterval);
    gameActive = false;
    saveBest();

    var acc = round > 0 ? Math.round((correct / round) * 100) : 0;
    var rows = [
      ['Doğru', correct + ' / ' + round],
      ['Yanlış', wrong + ''],
      ['Doğruluk', acc + '%'],
      ['Skor', score + ''],
      ['En İyi', bestScore + '']
    ];
    var html = '';
    for (var i = 0; i < rows.length; i++) {
      html += '<div class="overlay-row"><span class="lbl">' + rows[i][0] + '</span><span class="val">' + rows[i][1] + '</span></div>';
    }
    document.getElementById('overlayTitle').textContent = acc >= 80 ? 'HARIKA!' : 'OYUN BİTTİ';
    document.getElementById('overlayRows').innerHTML    = html;
    overlay.classList.add('show');
  }

  /* ---- SAVE BEST ---- */
  function saveBest() {
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('oo3_best', bestScore);
      bestEl.textContent = bestScore;
    }
  }

  /* ---- NEW GAME ---- */
  function newGame() {
    clearInterval(timerInterval);
    overlay.classList.remove('show');
    score        = 0;
    round        = 0;
    correct      = 0;
    wrong        = 0;
    roundResults = [];
    gameActive   = true;
    locked       = false;
    scoreEl.textContent = '0';
    msgBar.textContent  = 'Farklı olanı bul!';
    msgBar.style.color  = '#6c8fb0';
    buildDots();
    startTimer();
    generateRound();
  }

  /* ---- EVENTS ---- */
  document.getElementById('newBtn').addEventListener('click', newGame);
  document.getElementById('overlayBtn').addEventListener('click', newGame);
  window.addEventListener('resize', function () { if (gameActive) generateRound(); });

  /* ---- INIT ---- */
  newGame();
}());
</script>

</body>
</html>
