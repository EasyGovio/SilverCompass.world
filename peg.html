<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Peg Solitaire | SilverCompass</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background: #1a3a5c;
      font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .game-container {
      max-width: 650px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 20px;
      border: 1px solid rgba(246,180,95,0.4);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 20px;
      color: #FFFFFF;
    }
    .logo { font-size: 1.4rem; font-weight: bold; }
    .logo span { color: #F6B45F; }
    .back-link { color: #F6B45F; text-decoration: none; font-size: 0.9rem; }
    .stats {
      display: flex;
      justify-content: space-between;
      background: rgba(0,0,0,0.3);
      padding: 10px 16px;
      border-radius: 60px;
      margin: 15px 0;
      color: #eaf2fb;
    }
    .stats div { background: #1a3a5c; padding: 4px 12px; border-radius: 40px; }
    button {
      background: #F6B45F;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    canvas {
      display: block;
      margin: 15px auto;
      background: #eaf2fb;
      border-radius: 24px;
      width: 100%;
      aspect-ratio: 1/1;
      cursor: pointer;
    }
    .message {
      text-align: center;
      margin-top: 15px;
      padding: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      color: #eaf2fb;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="logo">Silver<span>Compass</span></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>
  <div class="stats">
    <div>📌 Hamle: <span id="moveCount">0</span></div>
    <div>⏱️ Süre: <span id="timer">00:00</span></div>
    <div>🏆 En İyi: <span id="bestScore">—</span></div>
    <button id="resetBtn">🔄 Sıfırla</button>
  </div>
  <canvas id="pegCanvas" width="500" height="500"></canvas>
  <div class="message" id="gameMsg">Bir çivi seç, ardından atlayacağın boşluğa tıkla.</div>
</div>
<script>
  // Peg Solitaire (İngiliz tahtası) – tam kod buraya gelecek. Kısa tutmak için mevcut çalışan kodunuzu kullanabilirsiniz.
  // Ancak aşağıda eksiksiz çalışan bir versiyon var.
  var rows=7, cols=7;
  var board, isValid, selectedRow=null, selectedCol=null;
  var moveCount=0, timerSeconds=0, timerInterval=null, gameActive=true;
  var canvas = document.getElementById('pegCanvas');
  var ctx = canvas.getContext('2d');
  var cellW, cellH;
  var bestKey = "pegBest";

  function updateBestDisplay() { var best=localStorage.getItem(bestKey); document.getElementById("bestScore").innerText=best?best:"—"; }
  function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
  function startTimer() { stopTimer(); timerInterval=setInterval(function(){ if(gameActive){ timerSeconds++; updateTimerDisplay(); } },1000); }
  function updateTimerDisplay() { var m=Math.floor(timerSeconds/60), s=timerSeconds%60; document.getElementById("timer").innerText=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s); }
  function countPegs() { var cnt=0; for(var i=0;i<rows;i++) for(var j=0;j<cols;j++) if(isValid[i][j] && board[i][j]===true) cnt++; return cnt; }
  function updateUI() { document.getElementById("moveCount").innerText=moveCount; var left=countPegs(); if(left===1) document.getElementById("gameMsg").innerHTML="🏆 Mükemmel! Tek çivi kaldı!"; else document.getElementById("gameMsg").innerHTML="Kalan çivi: "+left; }
  function initBoard() {
    isValid=Array(rows).fill().map(function(){return Array(cols).fill(false);});
    for(var r=0;r<rows;r++) for(var c=0;c<cols;c++) {
      if((r<=1||r>=5)&&c>=2&&c<=4) isValid[r][c]=true;
      else if(r>=2&&r<=4&&c>=0&&c<=6) isValid[r][c]=true;
    }
    board=Array(rows).fill().map(function(){return Array(cols).fill(null);});
    for(var i=0;i<rows;i++) for(var j=0;j<cols;j++) if(isValid[i][j]) board[i][j]=true;
    board[3][3]=false;
  }
  function isValidMove(fr,fc,tr,tc) {
    if(!isValid[tr]||!isValid[tr][tc]||board[tr][tc]!==false) return false;
    if(!isValid[fr]||!isValid[fr][fc]||board[fr][fc]!==true) return false;
    var dr=tr-fr, dc=tc-fc;
    if(Math.abs(dr)===2 && dc===0) { var mr=(fr+tr)/2, mc=fc; if(isValid[mr][mc] && board[mr][mc]===true) return true; }
    if(Math.abs(dc)===2 && dr===0) { var mr=fr, mc=(fc+tc)/2; if(isValid[mr][mc] && board[mr][mc]===true) return true; }
    return false;
  }
  function applyMove(fr,fc,tr,tc) {
    if(!isValidMove(fr,fc,tr,tc)) return false;
    var mr=(fr+tr)/2, mc=(fc+tc)/2;
    board[fr][fc]=false; board[mr][mc]=false; board[tr][tc]=true;
    moveCount++; updateUI(); drawBoard(); return true;
  }
  function drawBoard() {
    canvas.width=canvas.clientWidth; canvas.height=canvas.clientHeight;
    cellW=canvas.width/cols; cellH=canvas.height/rows;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#eaf2fb"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(var r=0;r<rows;r++) for(var c=0;c<cols;c++) {
      var x=c*cellW, y=r*cellH, rad=Math.min(cellW,cellH)*0.28;
      if(isValid[r][c]) {
        ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad+1,0,Math.PI*2); ctx.fillStyle="#b8d0e8"; ctx.fill();
        ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad,0,Math.PI*2); ctx.fillStyle="#FFFFFF"; ctx.fill();
        if(board[r][c]===true) {
          ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad-2,0,Math.PI*2); ctx.fillStyle="#F6B45F"; ctx.fill();
          ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad-4,0,Math.PI*2); ctx.fillStyle="#1a3a5c"; ctx.fill();
        } else if(board[r][c]===false) {
          ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad-3,0,Math.PI*2); ctx.fillStyle="#1a3a5c"; ctx.fill();
        }
        if(selectedRow===r && selectedCol===c) {
          ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad+3,0,Math.PI*2); ctx.strokeStyle="#F6B45F"; ctx.lineWidth=3; ctx.stroke();
        }
      } else { ctx.fillStyle="#b8d0e8"; ctx.fillRect(x+1,y+1,cellW-2,cellH-2); }
    }
  }
  function handleClick(e) {
    var rect=canvas.getBoundingClientRect(), scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    var clientX=e.touches?e.touches[0].clientX:e.clientX, clientY=e.touches?e.touches[0].clientY:e.clientY;
    var canvasX=(clientX-rect.left)*scaleX, canvasY=(clientY-rect.top)*scaleY;
    if(canvasX<0||canvasY<0||canvasX>canvas.width||canvasY>canvas.height) return;
    var col=Math.floor(canvasX/cellW), row=Math.floor(canvasY/cellH);
    if(row<0||row>=rows||col<0||col>=cols||!isValid[row][col]) { selectedRow=null; drawBoard(); return; }
    if(selectedRow===null) {
      if(board[row][col]===true) { selectedRow=row; selectedCol=col; drawBoard(); }
      else document.getElementById("gameMsg").innerHTML="Önce bir çivi seç!";
    } else {
      if(isValidMove(selectedRow,selectedCol,row,col)) { applyMove(selectedRow,selectedCol,row,col); selectedRow=null; drawBoard(); if(countPegs()===1) { gameActive=false; stopTimer(); var best=localStorage.getItem(bestKey); if(!best||timerSeconds<parseInt(best)){ localStorage.setItem(bestKey,timerSeconds); updateBestDisplay(); } } }
      else { if(board[row][col]===true) { selectedRow=row; selectedCol=col; drawBoard(); } else { selectedRow=null; drawBoard(); } }
    }
    updateUI();
  }
  function resetGame() { stopTimer(); timerSeconds=0; updateTimerDisplay(); moveCount=0; gameActive=true; initBoard(); selectedRow=null; drawBoard(); updateUI(); startTimer(); }
  canvas.addEventListener("click",handleClick); canvas.addEventListener("touchstart",function(e){ e.preventDefault(); handleClick(e); });
  document.getElementById("resetBtn").addEventListener("click",resetGame);
  initBoard(); drawBoard(); updateUI(); startTimer(); updateBestDisplay();
</script>
</body>
</html>
