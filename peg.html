    <title>Peg Solitaire | SilverCompass Edition</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:linear-gradient(145deg,#071626 0%,#0a1f2e 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; font-family:'Segoe UI','Roboto',system-ui,sans-serif; padding:20px; }
        .game-card { max-width:750px; width:100%; background:linear-gradient(135deg,#fffaf0 0%,#fdf4e0 100%); border-radius:48px; box-shadow:0 25px 45px rgba(0,0,0,0.5),inset 0 1px 2px rgba(255,255,200,0.6); overflow:hidden; }
        .game-header { background:linear-gradient(95deg,#0a2a3b,#123d52); padding:18px 24px; text-align:center; border-bottom:3px solid #e6b422; }
        .game-header h1 { color:#ffdf8c; font-size:2rem; letter-spacing:2px; text-shadow:0 2px 5px #00000030; font-weight:600; }
        .game-header p { color:#b9d9e8; font-size:0.85rem; margin-top:6px; }
        .select-area { padding:16px 24px 8px; background:#f3ecd8; border-bottom:1px solid #e2d4b9; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
        .select-label { font-weight:bold; color:#1e4a6e; background:#e9dfc3; padding:6px 14px; border-radius:50px; font-size:0.9rem; }
        select { flex:2; min-width:180px; background:#1f2e3b; color:#ffeaac; border:1px solid #e6b422; border-radius:60px; padding:10px 18px; font-weight:bold; font-size:0.9rem; cursor:pointer; outline:none; }
        .canvas-container { padding:16px 24px 8px; background:#eedecc; }
        canvas { display:block; margin:0 auto; background:#dbbc8c; border-radius:36px; box-shadow:inset 0 0 0 4px #a47148,0 12px 24px rgba(0,0,0,0.3); width:100%; height:auto; cursor:pointer; }
        .stats-panel { display:flex; justify-content:space-between; align-items:center; background:#1f2f3a; margin:12px 24px 8px; padding:10px 16px; border-radius:80px; color:#f7ecc7; box-shadow:inset 0 1px 3px #ffffff30,0 4px 8px #00000030; flex-wrap:wrap; gap:8px; }
        .stat { background:#00000055; padding:5px 14px; border-radius:50px; font-weight:bold; font-size:1.1rem; display:flex; align-items:baseline; gap:6px; }
        .stat span:first-child { font-size:0.8rem; font-weight:normal; letter-spacing:1px; }
        .btn-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:8px 24px 12px; }
        button { border:none; font-weight:bold; font-size:0.95rem; padding:8px 18px; border-radius:40px; cursor:pointer; transition:0.07s linear; font-family:inherit; }
        #resetBtn { background:#e6b422; color:#0a2a3b; box-shadow:0 3px 0 #8b5a2b; transform:translateY(-2px); }
        #resetBtn:active { transform:translateY(2px); box-shadow:none; }
        #undoBtn { background:#2a6496; color:#fff; box-shadow:0 3px 0 #1a3a5c; transform:translateY(-2px); }
        #undoBtn:active { transform:translateY(2px); box-shadow:none; }
        #undoBtn:disabled { background:#5a7a8a; color:#aaa; box-shadow:none; transform:none; cursor:default; }
        #hintBtn { background:#2d7a4f; color:#fff; box-shadow:0 3px 0 #1a4a30; transform:translateY(-2px); }
        #hintBtn:active { transform:translateY(2px); box-shadow:none; }
        .best-scores { background:#1f2f3a; margin:0 24px 8px; padding:8px 20px; border-radius:20px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
        .best-item { background:#00000055; padding:4px 14px; border-radius:50px; font-size:0.8rem; color:#ffdf8c; }
        .best-item span { color:#b9d9e8; margin-right:4px; }
        .message-area { text-align:center; margin:0 24px 24px; background:#ebdfbd; padding:8px; border-radius:60px; font-weight:bold; color:#1e4a6e; font-size:0.85rem; border:1px solid #cfbc8a; }
        @media(max-width:550px) { .stat{font-size:0.9rem;padding:3px 10px;} .game-header h1{font-size:1.5rem;} button{padding:6px 12px;font-size:0.85rem;} }
    </style>
</head>

<div class="select-area">
    <div class="select-label">🎯 Tahta</div>
    <select id="boardSelect"></select>
</div>

<div class="stats-panel">

</div>

<script>
const BOARD_DEFS = {
    "English":      { rows:7,cols:7,startEmpty:[3,3],shape:(r,c)=>((r<=1||r>=5)&&c>=2&&c<=4)||(r>=2&&r<=4&&c>=0&&c<=6) },
    "French":       { rows:7,cols:7,startEmpty:[3,3],shape:(r,c)=>(r===0||r===6)&&c>=2&&c<=4?true:(r===1||r===5)&&c>=1&&c<=5?true:r>=2&&r<=4&&c>=0&&c<=6 },
    "European 37":  { rows:7,cols:7,startEmpty:[3,3],shape:(r,c)=>Math.abs(r-3)+Math.abs(c-3)<=3 },
    "Square 16":    { rows:4,cols:4,startEmpty:[1,1],shape:()=>true },
    "Square 25":    { rows:5,cols:5,startEmpty:[2,2],shape:()=>true },
    "Square 36":    { rows:6,cols:6,startEmpty:[2,3],shape:()=>true },
    "Trapezoid":    { rows:5,cols:7,startEmpty:[2,3],shape:(r,c)=>r===0?c>=2&&c<=4:r===1?c>=1&&c<=5:r>=2&&c>=0&&c<=6 },
    "Rhombus":      { rows:7,cols:7,startEmpty:[3,3],shape:(r,c)=>Math.abs(r-3)+Math.abs(c-3)<=3 },
    "Snowflake":    { rows:7,cols:7,startEmpty:[3,3],shape:(r,c)=>(r===0||r===6)&&c===3?true:(r===1||r===5)&&c>=1&&c<=5?true:r>=2&&r<=4&&c>=0&&c<=6 },
    "Wiegleb":      { rows:7,cols:7,startEmpty:[3,3],shape:(r,c)=>(r===0||r===6)&&c>=2&&c<=4?true:(r===1||r===5)&&c>=1&&c<=5?true:r>=2&&r<=4&&c>=0&&c<=6 }
};

let currentId="English", rows, cols, board, isValid;
let selectedRow=null, selectedCol=null;
let moveCount=0, timerSeconds=0, timerInterval=null;
let history=[], hintMove=null;

const canvas=document.getElementById('pegCanvas');
const ctx=canvas.getContext('2d');
let cellW, cellH;

// --- TIMER ---
function stopTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
function startTimer(){ stopTimer(); timerInterval=setInterval(()=>{ timerSeconds++; updateTimerDisplay(); },1000); }
function updateTimerDisplay(){ let m=Math.floor(timerSeconds/60),s=timerSeconds%60; document.getElementById('timerDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }

// --- PAWN SAYIMI ---
function countPegs(){ let n=0; for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(isValid[r][c]&&board[r][c]) n++; return n; }

// --- EN İYİ SKOR (localStorage) ---
function getBestKey(id){ return 'peg_best_'+id; }
function getBest(id){ try{ let v=localStorage.getItem(getBestKey(id)); return v?JSON.parse(v):null; }catch(e){ return null; } }
function saveBest(id,pegs,moves,secs){ try{ let cur=getBest(id); if(!cur || pegs<cur.pegs || (pegs===cur.pegs && moves<cur.moves)){ localStorage.setItem(getBestKey(id),JSON.stringify({pegs,moves,secs})); } }catch(e){} }
function renderBestScores(){
    const div=document.getElementById('bestScores');
    let html='';
    for(let id of Object.keys(BOARD_DEFS)){
        let b=getBest(id);
        if(b) html+=`<div class="best-item"><span>${id}:</span>${b.pegs} çivi / ${b.moves} hamle</div>`;
    }
    div.innerHTML = html || '<div class="best-item" style="color:#b9d9e8">Henüz kayıt yok</div>';
}

// --- GEÇERLI HAMLELERİ BUL ---
function findAllMoves(){
    let moves=[];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
        if(!isValid[r][c]||!board[r][c]) continue;
        let dirs=[[0,2],[0,-2],[2,0],[-2,0]];
        for(let [dr,dc] of dirs){
            let tr=r+dr,tc=c+dc,mr=r+dr/2,mc=c+dc/2;
            if(tr>=0&&tr<rows&&tc>=0&&tc<cols&&isValid[tr][tc]&&!board[tr][tc]&&isValid[mr][mc]&&board[mr][mc]) moves.push([r,c,tr,tc]);
        }
    }
    return moves;
}

// --- TAHTA YÜKLEMESİ ---
function loadBoard(id){
    stopTimer();
    const def=BOARD_DEFS[id]; if(!def) return;
    rows=def.rows; cols=def.cols;
    isValid=Array.from({length:rows},()=>Array(cols).fill(false));
    for(let i=0;i<rows;i++) for(let j=0;j<cols;j++) isValid[i][j]=def.shape(i,j);
    board=Array.from({length:rows},()=>Array(cols).fill(null));
    for(let i=0;i<rows;i++) for(let j=0;j<cols;j++) if(isValid[i][j]) board[i][j]=true;
    let[er,ec]=def.startEmpty;
    if(isValid[er]?.[ec]) board[er][ec]=false;
    moveCount=0; timerSeconds=0; history=[]; hintMove=null;
    selectedRow=null;
    updateTimerDisplay();
    document.getElementById('moveCount').textContent='0';
    document.getElementById('undoBtn').disabled=true;
    startTimer(); updateUI(); drawBoard();
    currentId=id;
    document.getElementById('boardSelect').value=id;
    renderBestScores();
}

// --- HAMLELERİ UYGULA ---
function applyMove(fr,fc,tr,tc){
    let mr=(fr+tr)/2, mc=(fc+tc)/2;
    // snapshot kaydet
    history.push({ board: board.map(r=>[...r]), moveCount, timerSeconds });
    board[fr][fc]=false; board[mr][mc]=false; board[tr][tc]=true;
    moveCount++;
    hintMove=null;
    document.getElementById('undoBtn').disabled=false;
    updateUI(); drawBoard();
    // oyun sonu kontrolü
    let remaining=countPegs();
    let moves=findAllMoves();
    if(moves.length===0){
        stopTimer();
        saveBest(currentId,remaining,moveCount,timerSeconds);
        renderBestScores();
        if(remaining===1) document.getElementById('gameMsg').innerHTML='🏆 MUHTEŞEM! Tek çivi kaldı! Tebrikler! 🎉';
        else if(remaining===0) document.getElementById('gameMsg').innerHTML='✨ İnanılmaz! Sıfır çivi! ✨';
        else document.getElementById('gameMsg').innerHTML=`🚫 Hamle kalmadı! ${remaining} çivi ile bitti.`;
    }
}

// --- GERİ AL ---
function undoMove(){
    if(history.length===0) return;
    let snap=history.pop();
    board=snap.board; moveCount=snap.moveCount; timerSeconds=snap.timerSeconds;
    selectedRow=null; hintMove=null;
    document.getElementById('undoBtn').disabled=history.length===0;
    updateTimerDisplay(); updateUI(); drawBoard();
}

// --- İPUCU ---
function showHint(){
    let moves=findAllMoves();
    if(moves.length===0){ document.getElementById('gameMsg').innerHTML='🚫 Geçerli hamle yok!'; return; }
    hintMove=moves[Math.floor(Math.random()*moves.length)];
    drawBoard();
    document.getElementById('gameMsg').innerHTML=`💡 İpucu: (${hintMove[0]},${hintMove[1]}) → (${hintMove[2]},${hintMove[3]})`;
}

// --- UI GÜNCELLE ---
function updateUI(){
    document.getElementById('moveCount').textContent=moveCount;
    let left=countPegs();
    document.getElementById('pegLeft').textContent=left;
    let msgDiv=document.getElementById('gameMsg');
    let moves=findAllMoves();
    if(moves.length>0) msgDiv.innerHTML=`🔹 Kalan: ${left} çivi | Hamle: ${moveCount}`;
}

// --- ÇİZİM ---
function drawBoard(){
    if(!ctx) return;
    const rect=canvas.getBoundingClientRect();
    const sz=Math.min(rect.width||500,rect.height||500);
    canvas.width=sz; canvas.height=sz;
    cellW=canvas.width/cols; cellH=canvas.height/rows;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#d6a15a'; ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
        let x=c*cellW, y=r*cellH, rad=Math.min(cellW,cellH)*0.28;
        if(!isValid[r][c]){
            ctx.fillStyle='#b47c48'; ctx.fillRect(x+2,y+2,cellW-4,cellH-4);
            ctx.fillStyle='#8b5a2b'; ctx.font=`${Math.floor(cellW*0.3)}px Segoe UI`;
            ctx.fillText('⚜️',x+cellW*0.3,y+cellH*0.72);
            continue;
        }
        // delik
        ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad+1.5,0,Math.PI*2);
        ctx.fillStyle='#7c5a38'; ctx.fill();
        ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad,0,Math.PI*2);
        ctx.fillStyle='#f7e5c2'; ctx.fill();

        // ipucu vurgusu (kaynak)
        if(hintMove && r===hintMove[0] && c===hintMove[1]){
            ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad+5,0,Math.PI*2);
            ctx.strokeStyle='#00ff99'; ctx.lineWidth=3; ctx.stroke();
        }
        // ipucu hedef
        if(hintMove && r===hintMove[2] && c===hintMove[3]){
            ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad+5,0,Math.PI*2);
            ctx.strokeStyle='#ffaa00'; ctx.lineWidth=3; ctx.stroke();
        }

        if(board[r][c]){
            // çivi
            ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad-2,0,Math.PI*2);
            ctx.fillStyle='#e6b422'; ctx.fill();
            ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad-4,0,Math.PI*2);
            ctx.fillStyle='#c5851a'; ctx.fill();
            ctx.fillStyle='#fff2b5'; ctx.beginPath();
            ctx.arc(x+cellW/2-3,y+cellH/2-3,rad*0.12,0,Math.PI*2); ctx.fill();
            // seçili
            if(selectedRow===r && selectedCol===c){
                ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad+4,0,Math.PI*2);
                ctx.strokeStyle='#ffd966'; ctx.lineWidth=3; ctx.stroke();
            }
        } else {
            ctx.beginPath(); ctx.arc(x+cellW/2,y+cellH/2,rad-3,0,Math.PI*2);
            ctx.fillStyle='#1e3a5f'; ctx.fill();
        }
    }
}

// --- TIKLANMA ---
function handleTap(e){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    let cx,cy;
    if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; e.preventDefault(); }
    else { cx=e.clientX; cy=e.clientY; }
    let col=Math.floor((cx-rect.left)*scaleX/cellW);
    let row=Math.floor((cy-rect.top)*scaleY/cellH);
    if(row<0||row>=rows||col<0||col>=cols||!isValid[row][col]){ selectedRow=null; drawBoard(); return; }

    if(selectedRow===null){
        if(board[row][col]){ selectedRow=row; selectedCol=col; hintMove=null; drawBoard(); document.getElementById('gameMsg').innerHTML='➡️ Hedef boşluğu seç'; }
        else document.getElementById('gameMsg').innerHTML='🔔 Önce bir çivi seç!';
    } else {
        let fr=selectedRow,fc=selectedCol;
        let mr=(fr+row)/2, mc=(fc+col)/2;
        let dr=row-fr, dc=col-fc;
        let validJump=(Math.abs(dr)===2&&dc===0)||(Math.abs(dc)===2&&dr===0);
        if(validJump && isValid[row][col] && !board[row][col] && isValid[mr][mc] && board[mr][mc] && board[fr][fc]){
            applyMove(fr,fc,row,col);
            selectedRow=null;
        } else if(board[row][col]){
            selectedRow=row; selectedCol=col; hintMove=null; drawBoard();
            document.getElementById('gameMsg').innerHTML='🔄 Yeni çivi seçildi';
        } else {
            selectedRow=null; drawBoard();
            document.getElementById('gameMsg').innerHTML='❌ Geçersiz hamle!';
            setTimeout(()=>updateUI(),900);
        }
    }
}

// --- BAŞLATMA ---
function init(){
    const sel=document.getElementById('boardSelect');
    for(let name of Object.keys(BOARD_DEFS)){
        let o=document.createElement('option'); o.value=name; o.textContent=name; sel.appendChild(o);
    }
    sel.addEventListener('change',e=>loadBoard(e.target.value));
    canvas.addEventListener('click',handleTap);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();handleTap(e);},{passive:false});
    document.getElementById('resetBtn').addEventListener('click',()=>loadBoard(currentId));
    document.getElementById('undoBtn').addEventListener('click',undoMove);
    document.getElementById('hintBtn').addEventListener('click',showHint);
    window.addEventListener('resize',()=>drawBoard());
    loadBoard('English');
    renderBestScores();
}
init();
</script>

</body>
