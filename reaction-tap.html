/* diff */
.diff-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
.diff-btn {
  background: #0a1018; color: #F6B45F;
  border: 1px solid #F6B45F;
  padding: 4px 14px; border-radius: 40px;
  font-size: 0.75rem; cursor: pointer;
}
.diff-btn.active { background: #F6B45F; color: #0F1318; }

/* info */
.info-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #0a1018; border-radius: 40px;
  padding: 7px 16px; margin-bottom: 14px;
}
.info-box { color: #F6B45F; font-weight: bold; font-size: 0.78rem; }
.info-box span { color: #eaf2fb; }
.new-btn {
  background: #F6B45F; border: none; font-weight: bold;
  padding: 5px 14px; border-radius: 40px;
  color: #0F1318; cursor: pointer; font-size: 0.78rem;
}

/* stats row */
.stats-row {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.stat-box {
  flex: 1; background: #0a1018; border-radius: 20px;
  padding: 8px 6px; text-align: center;
}
.stat-label { font-size: 0.58rem; letter-spacing: 1px; color: #4a6a8a; text-transform: uppercase; margin-bottom: 3px; }
.stat-val   { font-size: 1.1rem; font-weight: 900; color: #F6B45F; font-variant-numeric: tabular-nums; }
.stat-val.green { color: #2ECC71; }
.stat-val.red   { color: #E74C3C; }

/* arena */
.arena-wrap {
  background: #0a1018;
  border-radius: 28px;
  padding: 10px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.arena {
  position: relative;
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  background: #060d18;
  cursor: pointer;
}

/* ripple on miss */
.arena.miss-flash {
  animation: missFlash 0.3s ease-out;
}
@keyframes missFlash {
  0%,100% { background: #060d18; }
  50%      { background: #2a0a0a; }
}

/* target */
.target {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.06s;
}
.target:active { transform: scale(0.88); }

/* target types */
.target.type-circle {
  background: radial-gradient(circle at 35% 35%, #ffe599, #F6B45F);
  box-shadow: 0 0 20px rgba(246,180,95,0.6);
  border: 2px solid rgba(255,255,255,0.3);
}
.target.type-green {
  background: radial-gradient(circle at 35% 35%, #a8f0c0, #2ECC71);
  box-shadow: 0 0 20px rgba(46,204,113,0.6);
  border: 2px solid rgba(255,255,255,0.3);
}
.target.type-red {
  /* DO NOT tap — penalty */
  background: radial-gradient(circle at 35% 35%, #f0a8a8, #E74C3C);
  box-shadow: 0 0 20px rgba(231,76,60,0.5);
  border: 2px solid rgba(255,255,255,0.2);
}
.target .target-inner {
  font-size: 1.4rem;
  line-height: 1;
}

/* shrink ring */
.target .shrink-ring {
  position: absolute;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.5);
  top: 0; left: 0; right: 0; bottom: 0;
  animation: shrinkRing linear forwards;
}
@keyframes shrinkRing {
  from { transform: scale(1.5); opacity: 0.8; }
  to   { transform: scale(1.0); opacity: 0; }
}

/* appear animation */
.target.appear {
  animation: targetAppear 0.18s ease-out forwards;
}
@keyframes targetAppear {
  0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
  70%  { transform: scale(1.15) rotate(5deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.target.vanish {
  animation: targetVanish 0.15s ease-in forwards;
}
@keyframes targetVanish {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

/* reaction time pop */
.rt-pop {
  position: fixed;
  font-size: 1rem; font-weight: 900;
  pointer-events: none;
  z-index: 200;
  animation: rtPop 0.8s ease-out forwards;
}
@keyframes rtPop {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-55px); }
}

/* round progress */
.rounds-wrap {
  display: flex; gap: 5px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap;
}
.round-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #1e2a3a; border: 1px solid #2a3a4a;
  transition: background 0.2s;
}
.round-dot.hit  { background: #2ECC71; border-color: #27AE60; }
.round-dot.miss { background: #E74C3C; border-color: #c0392b; }
.round-dot.pen  { background: #9B59B6; border-color: #7D3C98; }
.round-dot.curr { background: #F6B45F; border-color: #d4a050; }

/* waiting state */
.wait-msg {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(246,180,95,0.5);
  font-size: 0.85rem; letter-spacing: 2px;
  text-align: center; pointer-events: none;
}

/* overlay */
.overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(15,19,24,0.93);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.overlay-box {
  background: #1e2a3a; border-radius: 40px;
  padding: 36px 40px; text-align: center;
  border: 2px solid #F6B45F; max-width: 320px; width: 90%;
}
.overlay-icon  { font-size: 3rem; margin-bottom: 10px; }
.overlay-title { font-size: 1.5rem; font-weight: bold; color: #F6B45F; letter-spacing: 2px; margin-bottom: 8px; }
.overlay-stats { margin: 12px 0 18px; }
.overlay-row   { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2a3a4a; font-size: 0.82rem; }
.overlay-row:last-child { border: none; }
.overlay-row .lbl { color: #6c8fb0; }
.overlay-row .val { color: #F6B45F; font-weight: bold; }
.overlay-row .val.green { color: #2ECC71; }
.overlay-btn {
  background: #F6B45F; border: none; font-weight: bold;
  padding: 10px 28px; border-radius: 40px;
  color: #0F1318; cursor: pointer; font-size: 0.9rem;
}

.footer { text-align: center; font-size: 0.6rem; color: #6c8fb0; margin-top: 10px; }

<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">REACTION TAP</div>
      <div class="sub">SilverCompass · Reaksiyon Süresi</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="diff-row">
    <div class="diff-btn active" data-diff="easy">Kolay</div>
    <div class="diff-btn" data-diff="medium">Orta</div>
    <div class="diff-btn" data-diff="hard">Zor</div>
  </div>

  <div class="info-bar">
    <div class="info-box">Tur: <span id="roundNum">0</span>/<span id="totalRounds">10</span></div>
    <div class="info-box">🏆 <span id="bestAvg">—</span></div>
    <button class="new-btn" id="newBtn">↺ Yeni</button>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">Son</div>
      <div class="stat-val" id="lastRT">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Ortalama</div>
      <div class="stat-val green" id="avgRT">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">En Hızlı</div>
      <div class="stat-val" id="bestRT">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">İsabet</div>
      <div class="stat-val" id="accuracy">—</div>
    </div>
  </div>

  <div class="arena-wrap">
    <div class="arena" id="arena">
      <div class="wait-msg" id="waitMsg">Başlamak için dokunun</div>
    </div>
  </div>

  <div class="rounds-wrap" id="roundsWrap"></div>

  <div class="footer">Sarı/Yeşil = dokun · Kırmızı = DOKUNMA · Hızlı ol!</div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon" id="overlayIcon">⚡</div>
    <div class="overlay-title" id="overlayTitle">SONUÇLAR</div>
    <div class="overlay-stats" id="overlayStats"></div>
    <button class="overlay-btn" id="overlayBtn">Tekrar Oyna</button>
  </div>
</div>

<script>
(function () {

  /* ---- CONFIG ---- */
  var DIFF = 'easy';
  var CONFIGS = {
    easy:   { rounds: 10, minDelay: 800,  maxDelay: 2500, targetLife: 2500, redChance: 0,    arenaH: 300, targetSize: 72 },
    medium: { rounds: 15, minDelay: 600,  maxDelay: 2000, targetLife: 1800, redChance: 0.2,  arenaH: 320, targetSize: 60 },
    hard:   { rounds: 20, minDelay: 400,  maxDelay: 1600, targetLife: 1200, redChance: 0.3,  arenaH: 340, targetSize: 50 }
  };

  /* ---- STATE ---- */
  var round        = 0;
  var totalRounds  = 10;
  var reactionTimes = [];
  var hits         = 0;
  var misses       = 0;
  var penalties    = 0;
  var waitTimeout  = null;
  var lifeTimeout  = null;
  var appearTime   = 0;
  var gameActive   = false;
  var waitingForTap = false;
  var currentTargetIsRed = false;
  var roundResults = []; /* 'hit','miss','pen' */

  /* ---- ELEMENTS ---- */
  var arenaEl    = document.getElementById('arena');
  var waitMsg    = document.getElementById('waitMsg');
  var overlay    = document.getElementById('overlay');
  var roundsWrap = document.getElementById('roundsWrap');
  var diffBtns   = document.querySelectorAll('.diff-btn');

  /* ---- BEST ---- */
  function bestKey() { return 'rt_best_' + DIFF; }
  function loadBest() {
    var v = localStorage.getItem(bestKey());
    document.getElementById('bestAvg').textContent = v ? v + 'ms' : '—';
  }
  function saveBest(avg) {
    var key = bestKey();
    var cur = parseInt(localStorage.getItem(key) || '99999', 10);
    if (avg < cur) {
      localStorage.setItem(key, avg);
      document.getElementById('bestAvg').textContent = avg + 'ms';
    }
  }

  /* ---- ARENA SIZE ---- */
  function setArenaSize() {
    var cfg = CONFIGS[DIFF];
    var w   = arenaEl.parentElement.offsetWidth - 20;
    arenaEl.style.width  = w + 'px';
    arenaEl.style.height = cfg.arenaH + 'px';
  }

  /* ---- BUILD ROUNDS ---- */
  function buildRoundDots() {
    roundsWrap.innerHTML = '';
    var cfg = CONFIGS[DIFF];
    totalRounds = cfg.rounds;
    for (var i = 0; i < totalRounds; i++) {
      var dot = document.createElement('div');
      dot.className = 'round-dot';
      roundsWrap.appendChild(dot);
    }
  }

  function updateRoundDots() {
    var dots = roundsWrap.querySelectorAll('.round-dot');
    for (var i = 0; i < dots.length; i++) {
      dots[i].className = 'round-dot';
      if (i < roundResults.length) {
        dots[i].classList.add(roundResults[i]);
      } else if (i === roundResults.length && gameActive) {
        dots[i].classList.add('curr');
      }
    }
    document.getElementById('roundNum').textContent = Math.min(round, totalRounds);
    document.getElementById('totalRounds').textContent = totalRounds;
  }

  /* ---- SHOW TARGET ---- */
  function scheduleNext() {
    if (round >= totalRounds) { endGame(); return; }
    var cfg   = CONFIGS[DIFF];
    var delay = cfg.minDelay + Math.floor(Math.random() * (cfg.maxDelay - cfg.minDelay));
    waitMsg.style.display = 'block';
    waitMsg.textContent   = '⚡ Hazır ol...';
    waitTimeout = setTimeout(showTarget, delay);
  }

  function showTarget() {
    if (!gameActive) return;
    var cfg  = CONFIGS[DIFF];
    var w    = arenaEl.offsetWidth;
    var h    = arenaEl.offsetHeight;
    var size = cfg.targetSize;
    var margin = size * 0.6;
    var x    = margin + Math.random() * (w - size - margin * 2);
    var y    = margin + Math.random() * (h - size - margin * 2);

    /* decide type */
    currentTargetIsRed = (Math.random() < cfg.redChance);
    var isGreen        = (!currentTargetIsRed && Math.random() < 0.3);

    /* remove old target */
    var old = arenaEl.querySelector('.target');
    if (old) arenaEl.removeChild(old);

    var target = document.createElement('div');
    target.className = 'target appear ' + (currentTargetIsRed ? 'type-red' : isGreen ? 'type-green' : 'type-circle');
    target.style.width  = size + 'px';
    target.style.height = size + 'px';
    target.style.left   = x + 'px';
    target.style.top    = y + 'px';

    var inner = document.createElement('div');
    inner.className   = 'target-inner';
    inner.textContent = currentTargetIsRed ? '✕' : '●';
    target.appendChild(inner);

    /* shrink ring showing time left */
    var ring = document.createElement('div');
    ring.className = 'shrink-ring';
    ring.style.animationDuration = cfg.targetLife + 'ms';
    target.appendChild(ring);

    target.addEventListener('click', onTargetClick);
    arenaEl.appendChild(target);

    waitMsg.style.display = 'none';
    waitingForTap = true;
    appearTime    = Date.now();

    /* auto-miss if not tapped */
    lifeTimeout = setTimeout(function () {
      if (!waitingForTap) return;
      onMiss();
    }, cfg.targetLife);
  }

  /* ---- TAP HANDLERS ---- */
  function onTargetClick(e) {
    e.stopPropagation();
    if (!waitingForTap) return;
    clearTimeout(lifeTimeout);
    waitingForTap = false;

    var target = arenaEl.querySelector('.target');

    if (currentTargetIsRed) {
      /* tapped red = penalty */
      penalties++;
      roundResults.push('pen');
      document.getElementById('lastRT').textContent = 'CEZA';
      document.getElementById('lastRT').className   = 'stat-val red';
      if (target) { target.classList.add('vanish'); }
      showRTPop('CEZA −50ms', e.clientX, e.clientY, '#9B59B6');
      arenaEl.classList.add('miss-flash');
      setTimeout(function () { arenaEl.classList.remove('miss-flash'); }, 300);
    } else {
      /* correct tap */
      var rt = Date.now() - appearTime;
      reactionTimes.push(rt);
      hits++;
      roundResults.push('hit');
      document.getElementById('lastRT').textContent = rt + 'ms';
      document.getElementById('lastRT').className   = 'stat-val' + (rt < 300 ? ' green' : '');
      updateAvgStats();
      if (target) { target.classList.add('vanish'); }
      showRTPop(rt + 'ms', e.clientX, e.clientY, rt < 300 ? '#2ECC71' : '#F6B45F');
    }

    round++;
    updateRoundDots();

    setTimeout(function () {
      var t = arenaEl.querySelector('.target');
      if (t) arenaEl.removeChild(t);
      scheduleNext();
    }, 350);
  }

  /* arena click = miss (tapped empty area when target visible) */
  arenaEl.addEventListener('click', function (e) {
    if (e.target !== arenaEl && e.target !== waitMsg) return;
    if (!gameActive) { startGame(); return; }
    if (!waitingForTap) return;
    /* missed — tapped wrong area */
  });

  function onMiss() {
    waitingForTap = false;
    misses++;
    roundResults.push('miss');
    var target = arenaEl.querySelector('.target');
    if (target) { target.classList.add('vanish'); }
    document.getElementById('lastRT').textContent = 'KAÇIRDI';
    document.getElementById('lastRT').className   = 'stat-val red';
    arenaEl.classList.add('miss-flash');
    setTimeout(function () { arenaEl.classList.remove('miss-flash'); }, 300);

    round++;
    updateRoundDots();

    setTimeout(function () {
      var t = arenaEl.querySelector('.target');
      if (t) arenaEl.removeChild(t);
      scheduleNext();
    }, 400);
  }

  /* ---- STATS ---- */
  function updateAvgStats() {
    if (!reactionTimes.length) return;
    var sum = 0;
    var best = Infinity;
    for (var i = 0; i < reactionTimes.length; i++) {
      sum += reactionTimes[i];
      if (reactionTimes[i] < best) best = reactionTimes[i];
    }
    var avg = Math.round(sum / reactionTimes.length);
    document.getElementById('avgRT').textContent  = avg + 'ms';
    document.getElementById('bestRT').textContent = best + 'ms';
    var acc = Math.round((hits / Math.max(1, hits + misses + penalties)) * 100);
    document.getElementById('accuracy').textContent = acc + '%';
  }

  /* ---- RT POP ---- */
  function showRTPop(text, x, y, color) {
    var pop = document.createElement('div');
    pop.className   = 'rt-pop';
    pop.textContent = text;
    pop.style.left  = (x - 25) + 'px';
    pop.style.top   = (y - 10) + 'px';
    pop.style.color = color || '#F6B45F';
    document.body.appendChild(pop);
    setTimeout(function () { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 800);
  }

  /* ---- END GAME ---- */
  function endGame() {
    clearTimeout(waitTimeout);
    clearTimeout(lifeTimeout);
    gameActive    = false;
    waitingForTap = false;

    var avgRT = 0;
    if (reactionTimes.length) {
      var sum = 0;
      for (var i = 0; i < reactionTimes.length; i++) sum += reactionTimes[i];
      avgRT = Math.round(sum / reactionTimes.length);
      saveBest(avgRT);
    }

    var best = parseInt(localStorage.getItem(bestKey()) || '0', 10);
    var acc  = Math.round((hits / Math.max(1, totalRounds)) * 100);

    var rating = avgRT < 250 ? '⚡ Üstün' : avgRT < 350 ? '🌟 Harika' : avgRT < 450 ? '👍 İyi' : '💪 Gelişiyor';

    document.getElementById('overlayIcon').textContent  = avgRT < 300 ? '⚡' : '🎯';
    document.getElementById('overlayTitle').textContent = 'SONUÇLAR';

    var statsHtml =
      '<div class="overlay-row"><span class="lbl">Ortalama</span><span class="val">' + (avgRT || '—') + 'ms</span></div>' +
      '<div class="overlay-row"><span class="lbl">En Hızlı</span><span class="val green">' + (reactionTimes.length ? Math.min.apply(null, reactionTimes) + 'ms' : '—') + '</span></div>' +
      '<div class="overlay-row"><span class="lbl">İsabet</span><span class="val">' + acc + '%</span></div>' +
      '<div class="overlay-row"><span class="lbl">Kaçırılan</span><span class="val red">' + misses + '</span></div>' +
      '<div class="overlay-row"><span class="lbl">Ceza</span><span class="val">' + penalties + '</span></div>' +
      '<div class="overlay-row"><span class="lbl">En İyi Ort.</span><span class="val">' + (best || '—') + 'ms</span></div>' +
      '<div class="overlay-row"><span class="lbl">Değerlendirme</span><span class="val">' + rating + '</span></div>';

    document.getElementById('overlayStats').innerHTML = statsHtml;
    overlay.classList.add('show');

    waitMsg.style.display = 'block';
    waitMsg.textContent   = 'Başlamak için dokunun';
  }

  /* ---- START / NEW GAME ---- */
  function startGame() {
    clearTimeout(waitTimeout);
    clearTimeout(lifeTimeout);
    var old = arenaEl.querySelector('.target');
    if (old) arenaEl.removeChild(old);
    overlay.classList.remove('show');

    var cfg  = CONFIGS[DIFF];
    round         = 0;
    totalRounds   = cfg.rounds;
    reactionTimes = [];
    hits = misses = penalties = 0;
    roundResults  = [];
    gameActive    = true;
    waitingForTap = false;

    document.getElementById('lastRT').textContent = '—';
    document.getElementById('lastRT').className   = 'stat-val';
    document.getElementById('avgRT').textContent  = '—';
    document.getElementById('bestRT').textContent = '—';
    document.getElementById('accuracy').textContent = '—';

    loadBest();
    setArenaSize();
    buildRoundDots();
    updateRoundDots();

    waitMsg.style.display = 'none';
    scheduleNext();
  }

  function newGame() { startGame(); }

  /* ---- EVENTS ---- */
  document.getElementById('newBtn').addEventListener('click', newGame);
  document.getElementById('overlayBtn').addEventListener('click', newGame);

  for (var i = 0; i < diffBtns.length; i++) {
    diffBtns[i].addEventListener('click', function () {
      for (var j = 0; j < diffBtns.length; j++) diffBtns[j].classList.remove('active');
      this.classList.add('active');
      DIFF = this.getAttribute('data-diff');
      newGame();
    });
  }

  arenaEl.addEventListener('click', function (e) {
    if (!gameActive && e.target === arenaEl) startGame();
  });

  window.addEventListener('resize', setArenaSize);

  /* ---- INIT ---- */
  setArenaSize();
  buildRoundDots();
  loadBest();
</script>

</body>
