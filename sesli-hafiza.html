<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sesli Hafıza | Aile Bağı | PACDI Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #04162E;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .game-container {
      max-width: 550px;
      width: 100%;
      background: rgba(4, 22, 46, 0.8);
      border-radius: 56px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(246, 180, 95, 0.3);
      text-align: center;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #F6B45F;
    }

    .sub {
      font-size: 0.62rem;
      color: #9bb7d4;
      margin-top: 2px;
    }

    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.78rem;
      background: #0a1018;
      padding: 5px 12px;
      border-radius: 40px;
    }

    .lang-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: flex-end;
    }

    .lang-btn {
      background: #0a1018;
      border: 1px solid #F6B45F;
      color: #F6B45F;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 30px;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #F6B45F;
      color: #04162E;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a1018;
      border-radius: 40px;
      padding: 7px 16px;
      margin-bottom: 14px;
    }

    .info-box {
      color: #F6B45F;
      font-weight: bold;
      font-size: 0.78rem;
    }
    .info-box span { color: #eaf2fb; }

    .new-btn {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 5px 14px;
      border-radius: 40px;
      color: #0F1318;
      cursor: pointer;
      font-size: 0.78rem;
    }

    .voice-area {
      background: #0a1018;
      border-radius: 32px;
      padding: 24px 16px;
      margin-bottom: 20px;
    }

    .voice-icon {
      font-size: 4rem;
      margin: 10px auto;
      background: #1e2a3a;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s;
    }

    .voice-icon:active { transform: scale(0.96); background: #F6B45F; }

    .question-text {
      font-size: 1rem;
      font-weight: bold;
      color: #F6B45F;
      margin: 12px 0;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 20px 0;
    }

    .opt-btn {
      background: #1e2a3a;
      border: 2px solid #1ABC9C;
      border-radius: 60px;
      padding: 12px 8px;
      font-weight: bold;
      color: #1ABC9C;
      cursor: pointer;
      transition: 0.05s linear;
      font-size: 0.9rem;
      text-align: center;
    }

    .opt-btn:active {
      background: #1ABC9C;
      color: #04162E;
      transform: scale(0.96);
    }

    .feedback {
      margin: 12px 0;
      font-size: 0.9rem;
      font-weight: bold;
      min-height: 50px;
      color: #2ECC71;
    }
    .feedback.error { color: #E74C3C; }

    .progress-wrap {
      background: #0a1018;
      border-radius: 40px;
      padding: 6px 12px;
      margin-top: 8px;
      font-size: 0.7rem;
      color: #6c8fb0;
    }

    .footer {
      text-align: center;
      font-size: 0.6rem;
      color: #6c8fb0;
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div><div class="logo" id="gameTitle">SESLİ HAFIZA</div><div class="sub" id="gameSub">Aile Bağı · İşitsel Farkındalık</div></div>
    <a href="index.html" class="back-link" id="backLink">← Geri</a>
  </div>
  <div class="lang-selector" id="langSelector">
    <button class="lang-btn active" data-lang="tr">TR</button>
    <button class="lang-btn" data-lang="de">DE</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>
  <div class="info-bar">
    <div class="info-box"><span id="scoreLabel">🎯 Skor:</span> <span id="scoreNum">0</span></div>
    <div class="info-box"><span id="bestLabel">🏆 En İyi:</span> <span id="bestNum">—</span></div>
    <button class="new-btn" id="resetBtn"><span id="resetText">↺ Yeniden</span></button>
  </div>

  <div class="voice-area">
    <div class="voice-icon" id="playBtn">🔊</div>
    <div class="question-text" id="questionText">Bu ses kime ait?</div>
    <div class="options-grid" id="optionsGrid"></div>
  </div>

  <div class="feedback" id="feedbackMsg"></div>
  <div class="progress-wrap" id="progressMsg">Sesi dinle, doğru kişiyi seç.</div>
  <div class="footer" id="footerText">Aile fertlerinin seslerini tanımak bağı güçlendirir.</div>
</div>

<script>
  (function() {
    // Çok dilli metinler
    var langData = {
      tr: {
        title: "SESLİ HAFIZA", sub: "Aile Bağı · İşitsel Farkındalık", back: "← Geri",
        score: "🎯 Skor:", best: "🏆 En İyi:", reset: "↺ Yeniden",
        progress: "Sesi dinle, doğru kişiyi seç.", footer: "Aile fertlerinin seslerini tanımak bağı güçlendirir.",
        question: "Bu ses kime ait?",
        correct: "✅ Doğru! +1 puan", wrong: "❌ Yanlış. Doğru cevap: ",
        gameOver: "🎉 TEBRİKLER! Ses hafızan güçlü!", newBest: " (YENİ REKOR!)"
      },
      de: {
        title: "STIMMENGEDÄCHTNIS", sub: "Familienband · Auditive Wahrnehmung", back: "← Zurück",
        score: "🎯 Punkt:", best: "🏆 Beste:", reset: "↺ Neustart",
        progress: "Höre die Stimme, wähle die richtige Person.", footer: "Die Stimmen der Familie zu erkennen, stärkt die Bindung.",
        question: "Wem gehört diese Stimme?",
        correct: "✅ Richtig! +1 Punkt", wrong: "❌ Falsch. Richtige Antwort: ",
        gameOver: "🎉 GLÜCKWUNSCH! Dein Stimmgedächtnis ist stark!", newBest: " (NEUER REKORD!)"
      },
      en: {
        title: "VOICE MEMORY", sub: "Family Bond · Auditory Awareness", back: "← Back",
        score: "🎯 Score:", best: "🏆 Best:", reset: "↺ Reset",
        progress: "Listen to the voice, choose the correct person.", footer: "Recognizing family voices strengthens bonds.",
        question: "Who does this voice belong to?",
        correct: "✅ Correct! +1 point", wrong: "❌ Wrong. Correct answer: ",
        gameOver: "🎉 CONGRATULATIONS! Your voice memory is strong!", newBest: " (NEW RECORD!)"
      }
    };

    var currentLang = "tr";
    var score = 0;
    var bestScore = 0;
    var currentIndex = 0;
    var gameActive = true;
    var timeoutId = null;
    var audioContext = null;
    var currentAudioBuffer = null;
    var isPlaying = false;

    // Hazır ses verileri (Web Audio API ile sentezlenmiş farklı sesler)
    // Not: Gerçek uygulamada kullanıcı kendi seslerini kaydedebilir.
    // Demo modunda farklı tonlarda sentez sesler kullanıyoruz.
    var voiceProfiles = [
      { name: "Torun (Çocuk)", freq: 880, duration: 0.6, text: "Büyükanne, seni çok seviyorum!" },
      { name: "Eş", freq: 440, duration: 0.6, text: "Akşama ne yemek istersin?" },
      { name: "Oğul", freq: 330, duration: 0.6, text: "İşten sonra uğrayacağım." },
      { name: "Kız", freq: 660, duration: 0.6, text: "Hadi biraz yürüyüş yapalım mı?" }
    ];

    function getAudioContext() {
      if (!audioContext) {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioContext = new AC();
      }
      return audioContext;
    }

    function generateVoiceBuffer(profile, callback) {
      var ctx = getAudioContext();
      if (!ctx) { if (callback) callback(null); return; }
      var sampleRate = ctx.sampleRate;
      var duration = profile.duration;
      var samples = sampleRate * duration;
      var buffer = ctx.createBuffer(1, samples, sampleRate);
      var data = buffer.getChannelData(0);
      var freq = profile.freq;
      for (var i = 0; i < samples; i++) {
        var t = i / sampleRate;
        var envelope = Math.exp(-t * 3);
        var value = Math.sin(2 * Math.PI * freq * t) * envelope;
        // küçük bir vibrato ekleyelim
        if (profile.name === "Torun (Çocuk)") value *= (0.9 + 0.1 * Math.sin(2 * Math.PI * 12 * t));
        data[i] = value * 0.5;
      }
      callback(buffer);
    }

    var currentVoiceIndex = 0;
    var voiceOrder = [];

    function shuffle(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr;
    }

    function loadQuestion() {
      if (currentIndex >= voiceOrder.length) {
        endGame();
        return;
      }
      var profile = voiceProfiles[voiceOrder[currentIndex]];
      var questionText = document.getElementById('questionText');
      questionText.innerText = langData[currentLang].question;
      generateVoiceBuffer(profile, function(buffer) {
        currentAudioBuffer = buffer;
        // ses butonunu aktif yap
        var playBtn = document.getElementById('playBtn');
        playBtn.style.background = "#1e2a3a";
      });
      // Şıklar: doğru isim + rastgele diğerleri
      var opts = [profile.name];
      var allNames = voiceProfiles.map(function(p) { return p.name; });
      while (opts.length < 4) {
        var r = allNames[Math.floor(Math.random() * allNames.length)];
        if (opts.indexOf(r) === -1) opts.push(r);
      }
      opts = shuffle(opts);
      var optionsGrid = document.getElementById('optionsGrid');
      optionsGrid.innerHTML = '';
      for (var i = 0; i < opts.length; i++) {
        var btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opts[i];
        btn.addEventListener('click', (function(selected) {
          return function() { checkAnswer(selected, profile.name); };
        })(opts[i]));
        optionsGrid.appendChild(btn);
      }
      var feedbackDiv = document.getElementById('feedbackMsg');
      feedbackDiv.innerHTML = '';
    }

    function playCurrentVoice() {
      if (isPlaying) return;
      if (!currentAudioBuffer) {
        // eğer buffer yoksa yeniden oluştur
        var profile = voiceProfiles[voiceOrder[currentIndex]];
        generateVoiceBuffer(profile, function(buffer) {
          currentAudioBuffer = buffer;
          playBuffer();
        });
      } else {
        playBuffer();
      }
    }

    function playBuffer() {
      var ctx = getAudioContext();
      if (!ctx || !currentAudioBuffer) return;
      isPlaying = true;
      var source = ctx.createBufferSource();
      source.buffer = currentAudioBuffer;
      source.connect(ctx.destination);
      source.onended = function() { isPlaying = false; };
      source.start();
      var playBtn = document.getElementById('playBtn');
      playBtn.style.background = "#F6B45F";
      setTimeout(function() { if (playBtn) playBtn.style.background = "#1e2a3a"; }, 300);
    }

    function checkAnswer(selected, correct) {
      if (!gameActive) return;
      if (timeoutId) return;
      var t = langData[currentLang];
      if (selected === correct) {
        score++;
        document.getElementById('scoreNum').innerText = score;
        saveBest();
        document.getElementById('feedbackMsg').innerHTML = t.correct;
        document.getElementById('feedbackMsg').style.color = '#2ECC71';
        currentIndex++;
        if (currentIndex >= voiceOrder.length) {
          endGame();
          return;
        }
        timeoutId = setTimeout(function() {
          timeoutId = null;
          loadQuestion();
        }, 1000);
      } else {
        document.getElementById('feedbackMsg').innerHTML = t.wrong + correct;
        document.getElementById('feedbackMsg').style.color = '#E74C3C';
        var btns = document.querySelectorAll('.opt-btn');
        for (var i = 0; i < btns.length; i++) btns[i].style.pointerEvents = 'none';
        timeoutId = setTimeout(function() {
          document.getElementById('feedbackMsg').innerHTML = '';
          for (var j = 0; j < btns.length; j++) btns[j].style.pointerEvents = '';
          timeoutId = null;
          loadQuestion();
        }, 1500);
      }
    }

    function saveBest() {
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('voice_memory_best_' + currentLang, bestScore);
        document.getElementById('bestNum').innerText = bestScore;
      }
    }

    function loadBest() {
      var saved = localStorage.getItem('voice_memory_best_' + currentLang);
      bestScore = saved ? parseInt(saved, 10) : 0;
      document.getElementById('bestNum').innerText = bestScore || '—';
    }

    function endGame() {
      gameActive = false;
      var t = langData[currentLang];
      var msg = t.gameOver;
      if (score === voiceOrder.length && (bestScore === score || score > bestScore)) msg += t.newBest;
      document.getElementById('feedbackMsg').innerHTML = msg;
      document.getElementById('feedbackMsg').style.color = '#2ECC71';
      var optionsGrid = document.getElementById('optionsGrid');
      optionsGrid.innerHTML = '';
      var playBtn = document.getElementById('playBtn');
      playBtn.style.pointerEvents = 'none';
    }

    function resetGame() {
      if (timeoutId) clearTimeout(timeoutId);
      gameActive = true;
      score = 0;
      currentIndex = 0;
      document.getElementById('scoreNum').innerText = '0';
      document.getElementById('feedbackMsg').innerHTML = '';
      var indices = voiceProfiles.map(function(_, idx) { return idx; });
      voiceOrder = shuffle(indices);
      loadQuestion();
      loadBest();
      var playBtn = document.getElementById('playBtn');
      playBtn.style.pointerEvents = '';
    }

    // Dil değiştirme
    function updateLanguage() {
      var t = langData[currentLang];
      if (!t) return;
      document.getElementById('gameTitle').innerText = t.title;
      document.getElementById('gameSub').innerText = t.sub;
      document.getElementById('backLink').innerText = t.back;
      document.getElementById('scoreLabel').innerHTML = t.score;
      document.getElementById('bestLabel').innerHTML = t.best;
      document.getElementById('resetText').innerText = t.reset;
      document.getElementById('progressMsg').innerHTML = t.progress;
      document.getElementById('footerText').innerHTML = t.footer;
      document.getElementById('questionText').innerHTML = t.question;
    }

    function setLanguage(lang) {
      currentLang = lang;
      updateLanguage();
      loadBest();
      var btns = document.querySelectorAll('.lang-btn');
      for (var i = 0; i < btns.length; i++) {
        if (btns[i].getAttribute('data-lang') === lang) btns[i].classList.add('active');
        else btns[i].classList.remove('active');
      }
      resetGame(); // dil değişince oyunu sıfırla
    }

    document.getElementById('playBtn').addEventListener('click', function() {
      if (gameActive && currentAudioBuffer) playCurrentVoice();
    });
    document.getElementById('resetBtn').addEventListener('click', resetGame);

    var langBtns = document.querySelectorAll('.lang-btn');
    for (var i = 0; i < langBtns.length; i++) {
      langBtns[i].addEventListener('click', function() {
        var lang = this.getAttribute('data-lang');
        if (lang !== currentLang) setLanguage(lang);
      });
    }

    // Başlangıç
    setLanguage('tr');
    // Ses bağlamını kullanıcı etkileşiminde başlatmak için (otomatik oynatma engeli)
    var audioUnlock = function() {
      var ctx = getAudioContext();
      if (ctx && ctx.state === 'suspended') {
        ctx.resume();
      }
      document.body.removeEventListener('click', audioUnlock);
      document.body.removeEventListener('touchstart', audioUnlock);
    };
    document.body.addEventListener('click', audioUnlock);
    document.body.addEventListener('touchstart', audioUnlock);
  })();
</script>
</body>
</html>
