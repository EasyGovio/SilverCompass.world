/* diff */
.diff-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
.diff-btn { background: #0a1018; color: #F6B45F; border: 1px solid #F6B45F; padding: 4px 14px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; }
.diff-btn.active { background: #F6B45F; color: #0F1318; border-color: #F6B45F; }

.info-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #0a1018; border-radius: 40px;
  padding: 7px 16px; margin-bottom: 14px;
}
.info-box { color: #F6B45F; font-weight: bold; font-size: 0.78rem; }
.info-box span { color: #eaf2fb; }
.new-btn { background: #F6B45F; border: none; font-weight: bold; padding: 5px 14px; border-radius: 40px; color: #0F1318; cursor: pointer; font-size: 0.78rem; }

/* timer */
.timer-wrap { display: flex; align-items: center; gap: 10px; background: #0a1018; border-radius: 40px; padding: 7px 16px; margin-bottom: 14px; }
.timer-label { font-size: 0.7rem; color: #F6B45F; font-weight: bold; flex-shrink: 0; }
.timer-track { flex: 1; height: 7px; background: #1e2a3a; border-radius: 4px; overflow: hidden; }
.timer-fill  { height: 100%; background: #2ECC71; border-radius: 4px; transition: width 0.1s linear; }
.timer-val   { font-size: 0.78rem; color: #eaf2fb; font-weight: bold; width: 34px; text-align: right; }

/* section labels */
.section-label {
  text-align: center;
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: #6c8fb0;
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* card rows */
.game-area { background: #0a1018; border-radius: 28px; padding: 14px 12px; margin-bottom: 12px; }
.cards-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }

.card {
  background: #1e2a3a;
  border-radius: 18px;
  padding: 10px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.12s, transform 0.08s, background 0.12s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.card:active { transform: scale(0.95); }
.card.selected { border-color: #F6B45F; background: rgba(246,180,95,0.08); }
.card.matched  { border-color: rgba(46,204,113,0.5); background: rgba(46,204,113,0.06); pointer-events: none; }
.card.wrong    { animation: wrongShake 0.3s ease-out; }
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  30%     { transform: translateX(-6px); }
  70%     { transform: translateX(6px); }
}
.card svg { display: block; }
.card-lbl { font-size: 0.62rem; color: #6c8fb0; }
.card.matched .card-lbl { color: #2ECC71; }

/* divider */
.divider {
  text-align: center;
  font-size: 0.7rem;
  color: rgba(246,180,95,0.4);
  margin: 8px 0;
  letter-spacing: 3px;
}

/* score pop */
.score-pop {
  position: fixed; font-size: 1.1rem; font-weight: 900;
  pointer-events: none; z-index: 200;
  animation: scorePop 0.7s ease-out forwards;
}
@keyframes scorePop {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}

/* overlay */
.overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(15,19,24,0.93);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.overlay-box {
  background: #1e2a3a; border-radius: 40px;
  padding: 36px 40px; text-align: center;
  border: 2px solid #F6B45F; max-width: 300px; width: 90%;
}
.overlay-icon  { font-size: 3rem; margin-bottom: 10px; }
.overlay-title { font-size: 1.5rem; font-weight: bold; color: #F6B45F; letter-spacing: 2px; margin-bottom: 8px; }
.overlay-msg   { color: #eaf2fb; font-size: 0.85rem; margin-bottom: 18px; line-height: 1.8; }
.overlay-btn   { background: #F6B45F; border: none; font-weight: bold; padding: 10px 28px; border-radius: 40px; color: #0F1318; cursor: pointer; font-size: 0.9rem; }

.footer { text-align: center; font-size: 0.6rem; color: #6c8fb0; margin-top: 10px; }

<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">SHADOW MATCH</div>
      <div class="sub">SilverCompass · Görsel-Uzamsal Algı</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="diff-row">
    <div class="diff-btn active" data-count="3">Kolay (3)</div>
    <div class="diff-btn" data-count="4">Orta (4)</div>
    <div class="diff-btn" data-count="5">Zor (5)</div>
  </div>

  <div class="info-bar">
    <div class="info-box">Skor: <span id="scoreNum">0</span></div>
    <div class="info-box">🏆 <span id="bestNum">—</span></div>
    <button class="new-btn" id="newBtn">↺ Yeni</button>
  </div>

  <div class="timer-wrap">
    <div class="timer-label">⏱</div>
    <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="timer-val" id="timerVal">45s</div>
  </div>

  <div class="game-area" id="gameArea"></div>

  <div class="footer">Nesneyi seç → Gölgesini seç · Vintage nesneleri eşleştir</div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon">🏛️</div>
    <div class="overlay-title" id="overlayTitle">OYUN BİTTİ</div>
    <div class="overlay-msg"  id="overlayMsg"></div>
    <button class="overlay-btn" id="overlayBtn">Tekrar Oyna</button>
  </div>
</div>

<script>
(function () {

  /*
    Her nesne için:
    - objPath: renkli SVG path (F6B45F dolgu)
    - shadowPath: gölge SVG path (koyu, eğik/çarpıtılmış — belirgin fark)
    - Gölge: perspektifli yansıma — yatay stretch + dikey sıkıştırma
  */
  var ALL_ITEMS = [
    {
      name: 'Radyo',
      /* dikdörtgen gövde + anten + düğmeler */
      objPath: 'M20,25 L80,25 L80,70 L20,70 Z M30,35 L55,35 L55,55 L30,55 Z M62,35 L72,35 L72,45 L62,45 Z M62,50 L72,50 L72,60 L62,60 Z M50,20 L50,25 M60,18 L60,25',
      shadowPath: 'M10,62 L90,62 L85,75 L15,75 Z M18,64 L50,64 L48,72 L20,72 Z M55,64 L65,64 L64,72 L54,72 Z M67,64 L77,64 L76,72 L66,72 Z'
    },
    {
      name: 'Anahtar',
      objPath: 'M30,50 A20,20 0 1,1 50,70 L50,60 L75,60 L75,55 L80,55 L80,50 L75,50 L75,45 L65,45 L65,50 L55,50 L55,42 L50,42 L50,50 Z',
      shadowPath: 'M15,68 A12,8 0 1,1 35,76 L35,72 L65,70 L65,67 L70,67 L70,64 L65,64 L65,61 L57,62 L57,65 L47,66 L47,60 L42,61 L42,66 Z'
    },
    {
      name: 'Mum',
      objPath: 'M38,70 L62,70 L58,30 L42,30 Z M47,28 Q50,20 53,28 M50,15 L50,22',
      shadowPath: 'M25,75 L75,75 L68,65 L32,65 Z M44,63 Q50,58 56,63'
    },
    {
      name: 'Fincan',
      objPath: 'M25,40 L75,40 L70,70 L30,70 Z M70,50 Q80,50 80,58 Q80,66 70,66 M35,40 Q30,30 40,28 Q50,26 45,36',
      shadowPath: 'M15,72 L85,72 L78,80 L22,80 Z M72,74 Q80,73 80,77 Q80,80 72,79 Z'
    },
    {
      name: 'Pusula',
      objPath: 'M50,20 A30,30 0 1,1 49.9,20 Z M50,50 L55,35 L50,40 L45,35 Z M20,50 L80,50 M50,20 L50,80',
      shadowPath: 'M20,72 A30,10 0 1,1 19.9,72 Z M50,72 L54,66 L50,69 L46,66 Z'
    },
    {
      name: 'Şemsiye',
      objPath: 'M20,50 Q50,15 80,50 Z M50,50 L50,75 Q50,80 55,80 Q60,80 60,75',
      shadowPath: 'M15,72 Q50,62 85,72 Z M50,72 L50,79 Q50,82 53,82 Q56,82 56,79'
    },
    {
      name: 'Kitap',
      objPath: 'M25,25 L75,25 L75,75 L25,75 Z M50,25 L50,75 M30,35 L48,35 M30,43 L48,43 M30,51 L48,51 M30,59 L48,59 M52,35 L70,35 M52,43 L70,43',
      shadowPath: 'M15,72 L85,72 L80,80 L20,80 Z M50,72 L50,80 M20,74 L48,73 M52,73 L80,74'
    },
    {
      name: 'Vazo',
      objPath: 'M40,70 L60,70 L65,45 Q70,35 60,25 L40,25 Q30,35 35,45 Z M38,70 L62,70 M42,30 L58,30',
      shadowPath: 'M30,76 L70,76 L62,72 L38,72 Z M55,72 Q60,68 58,65 L42,65 Q40,68 45,72 Z'
    }
  ];

  /* ---- STATE ---- */
  var NUM_CARDS  = 3;
  var TIMES      = { 3: 45, 4: 55, 5: 65 };
  var currentSet = [];
  var selectedObj = null;
  var score       = 0;
  var bestScore   = parseInt(localStorage.getItem('sm2_best') || '0', 10);
  var timeLeft    = 45;
  var totalTime   = 45;
  var timerInterval = null;
  var gameActive  = false;
  var matchedCount = 0;
  var round        = 0;

  /* ---- ELEMENTS ---- */
  var gameArea  = document.getElementById('gameArea');
  var scoreEl   = document.getElementById('scoreNum');
  var bestEl    = document.getElementById('bestNum');
  var timerFill = document.getElementById('timerFill');
  var timerVal  = document.getElementById('timerVal');
  var overlay   = document.getElementById('overlay');
  var diffBtns  = document.querySelectorAll('.diff-btn');

  bestEl.textContent = bestScore > 0 ? bestScore : '—';

  /* ---- DIFF ---- */
  for (var d = 0; d < diffBtns.length; d++) {
    diffBtns[d].addEventListener('click', function () {
      for (var i = 0; i < diffBtns.length; i++) diffBtns[i].classList.remove('active');
      this.classList.add('active');
      NUM_CARDS = parseInt(this.getAttribute('data-count'), 10);
      newGame();
    });
  }

  /* ---- SHUFFLE ---- */
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  /* ---- BUILD SVG ---- */
  function makeSvg(paths, isObj, size) {
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.style.width  = size + 'px';
    svg.style.height = size + 'px';

    var parts = paths.split('M').filter(function (p) { return p.length > 0; });
    for (var i = 0; i < parts.length; i++) {
      var el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      el.setAttribute('d', 'M' + parts[i]);
      if (isObj) {
        el.setAttribute('fill', 'rgba(246,180,95,0.85)');
        el.setAttribute('stroke', '#F6B45F');
        el.setAttribute('stroke-width', '2');
        el.setAttribute('stroke-linejoin', 'round');
        el.setAttribute('stroke-linecap', 'round');
      } else {
        el.setAttribute('fill', 'rgba(30,50,70,0.9)');
        el.setAttribute('stroke', '#3a5a7a');
        el.setAttribute('stroke-width', '1.5');
        el.setAttribute('stroke-linejoin', 'round');
        el.setAttribute('stroke-linecap', 'round');
      }
      svg.appendChild(el);
    }
    return svg;
  }

  /* ---- RENDER ROUND ---- */
  function renderRound() {
    gameArea.innerHTML = '';
    var cardSize = Math.min(Math.floor((document.querySelector('.game-container').offsetWidth - 80) / NUM_CARDS) - 8, 90);
    cardSize = Math.max(cardSize, 60);
    var svgSize = Math.round(cardSize * 0.72);

    /* Objects row */
    var objLabel = document.createElement('div');
    objLabel.className = 'section-label';
    objLabel.textContent = 'Nesneler';
    gameArea.appendChild(objLabel);

    var objRow = document.createElement('div');
    objRow.className = 'cards-row';

    for (var i = 0; i < currentSet.length; i++) {
      (function (idx) {
        var card = document.createElement('div');
        card.className = 'card' + (currentSet[idx].matched ? ' matched' : '');
        card.style.width = cardSize + 'px';
        card.setAttribute('data-type', 'obj');
        card.setAttribute('data-idx', idx);

        var svg = makeSvg(currentSet[idx].objPath, true, svgSize);
        card.appendChild(svg);

        var lbl = document.createElement('div');
        lbl.className   = 'card-lbl';
        lbl.textContent = currentSet[idx].matched ? currentSet[idx].name : String.fromCharCode(65 + idx);
        card.appendChild(lbl);

        card.addEventListener('click', function () { onObjClick(idx, card); });
        objRow.appendChild(card);
      })(i);
    }
    gameArea.appendChild(objRow);

    var divEl = document.createElement('div');
    divEl.className   = 'divider';
    divEl.textContent = '▼ ▼ ▼';
    gameArea.appendChild(divEl);

    var shadowLabel = document.createElement('div');
    shadowLabel.className   = 'section-label';
    shadowLabel.textContent = 'Gölgeler';
    gameArea.appendChild(shadowLabel);

    /* Shadows row — shuffled */
    var shadowOrder = [];
    for (var k = 0; k < currentSet.length; k++) shadowOrder.push(k);
    shadowOrder = shuffle(shadowOrder);
    gameArea.__shadowOrder = shadowOrder;

    var shadowRow = document.createElement('div');
    shadowRow.className = 'cards-row';

    for (var j = 0; j < shadowOrder.length; j++) {
      (function (pos, origIdx) {
        var card = document.createElement('div');
        card.className = 'card' + (currentSet[origIdx].matched ? ' matched' : '');
        card.style.width = cardSize + 'px';
        card.setAttribute('data-type', 'shadow');
        card.setAttribute('data-idx', origIdx);

        var svg = makeSvg(currentSet[origIdx].shadowPath, false, svgSize);
        card.appendChild(svg);

        var lbl = document.createElement('div');
        lbl.className   = 'card-lbl';
        lbl.textContent = '???';
        card.appendChild(lbl);

        card.addEventListener('click', function () { onShadowClick(origIdx, card); });
        shadowRow.appendChild(card);
      })(j, shadowOrder[j]);
    }
    gameArea.appendChild(shadowRow);
  }

  /* ---- OBJ CLICK ---- */
  function onObjClick(idx, cardEl) {
    if (!gameActive) return;
    if (currentSet[idx].matched) return;
    /* deselect all obj cards */
    var objCards = gameArea.querySelectorAll('[data-type="obj"]');
    for (var i = 0; i < objCards.length; i++) objCards[i].classList.remove('selected');
    cardEl.classList.add('selected');
    selectedObj = idx;
  }

  /* ---- SHADOW CLICK ---- */
  function onShadowClick(origIdx, cardEl) {
    if (!gameActive || selectedObj === null) return;
    if (currentSet[origIdx].matched) return;

    if (selectedObj === origIdx) {
      /* CORRECT */
      currentSet[selectedObj].matched = true;
      matchedCount++;
      var pts = Math.round(10 + timeLeft / totalTime * 20);
      score += pts;
      scoreEl.textContent = score;
      saveBest();
      showPop('+' + pts, cardEl);
      selectedObj = null;
      renderRound();

      if (matchedCount === NUM_CARDS) {
        /* next round */
        round++;
        setTimeout(function () {
          var items = shuffle(ALL_ITEMS.slice());
          currentSet = items.slice(0, NUM_CARDS);
          for (var i = 0; i < currentSet.length; i++) currentSet[i].matched = false;
          matchedCount = 0;
          selectedObj  = null;
          renderRound();
        }, 500);
      }
    } else {
      /* WRONG */
      cardEl.classList.add('wrong');
      timeLeft = Math.max(0, timeLeft - 4);
      setTimeout(function () { cardEl.classList.remove('wrong'); }, 300);
      /* deselect obj */
      var objCards = gameArea.querySelectorAll('[data-type="obj"]');
      for (var i = 0; i < objCards.length; i++) objCards[i].classList.remove('selected');
      selectedObj = null;
    }
  }

  /* ---- SCORE POP ---- */
  function showPop(text, el) {
    var rect = el.getBoundingClientRect();
    var pop  = document.createElement('div');
    pop.className   = 'score-pop';
    pop.textContent = text;
    pop.style.color = '#2ECC71';
    pop.style.left  = rect.left + 'px';
    pop.style.top   = (rect.top - 10) + 'px';
    document.body.appendChild(pop);
    setTimeout(function () { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 700);
  }

  /* ---- TIMER ---- */
  function startTimer() {
    clearInterval(timerInterval);
    timeLeft  = TIMES[NUM_CARDS];
    totalTime = timeLeft;
    timerFill.style.width      = '100%';
    timerFill.style.background = '#2ECC71';
    timerVal.textContent       = timeLeft + 's';

    timerInterval = setInterval(function () {
      timeLeft--;
      var pct = (timeLeft / totalTime) * 100;
      timerFill.style.width      = pct + '%';
      timerFill.style.background = timeLeft > totalTime * 0.4 ? '#2ECC71'
                                  : timeLeft > totalTime * 0.2 ? '#F6B45F' : '#E74C3C';
      timerVal.textContent = timeLeft + 's';
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        gameActive = false;
        setTimeout(showGameOver, 200);
      }
    }, 1000);
  }

  function showGameOver() {
    saveBest();
    document.getElementById('overlayTitle').textContent = '⏰ SÜRE BİTTİ!';
    document.getElementById('overlayMsg').textContent   =
      'Skor: ' + score + '\nEn iyi: ' + bestScore + '\nTur: ' + round;
    overlay.classList.add('show');
  }

  function saveBest() {
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('sm2_best', bestScore);
      bestEl.textContent = bestScore;
    }
  }

  /* ---- NEW GAME ---- */
  function newGame() {
    clearInterval(timerInterval);
    overlay.classList.remove('show');
    score        = 0;
    round        = 0;
    matchedCount = 0;
    selectedObj  = null;
    gameActive   = true;
    scoreEl.textContent = '0';

    var items = shuffle(ALL_ITEMS.slice());
    currentSet = items.slice(0, NUM_CARDS);
    for (var i = 0; i < currentSet.length; i++) currentSet[i].matched = false;

    renderRound();
    startTimer();
  }

  /* ---- EVENTS ---- */
  document.getElementById('newBtn').addEventListener('click', newGame);
  document.getElementById('overlayBtn').addEventListener('click', newGame);
  window.addEventListener('resize', function () { if (gameActive) renderRound(); });

  /* ---- INIT ---- */
  newGame();
}());
</script>

</body>
