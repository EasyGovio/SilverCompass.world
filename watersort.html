<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PACDI Puzzle | Water Sort Puzzle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #04162E;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    /* main container */
    .game-wrapper {
      max-width: 700px;
      width: 100%;
      background: rgba(4, 22, 46, 0.8);
      border-radius: 56px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
    }

    /* header */
    .game-header {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: #F6B45F;
      text-shadow: 0 2px 3px #00000040;
      font-weight: 700;
    }
    .sub {
      font-size: 0.75rem;
      color: #9bb7d4;
      margin-top: 4px;
    }

    /* level & controls row */
    .info-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0A1F3A;
  border-radius: 60px;
  padding: 8px 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
  border: 1px solid #F6B45F30;
}
    .level-box {
      background: #04162E;
      padding: 5px 16px;
      border-radius: 40px;
      color: #F6B45F;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .level-box span {
      color: white;
    }
    button {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 6px 20px;
      border-radius: 40px;
      color: #04162E;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: 0.05s linear;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    button:active {
      transform: scale(0.96);
    }

    /* tubes grid */
    .tubes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      justify-items: center;
      margin-bottom: 30px;
    }
    /* single tube */
    .tube {
      width: 85px;
      background: rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.1s ease;
      border: 2px solid rgba(246,180,95,0.4);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.2), 0 8px 12px rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
    }
    .tube.selected {
      border: 3px solid #F6B45F;
      background: rgba(246,180,95,0.15);
      transform: scale(1.02);
    }
    /* color segment */
    .color-unit {
      width: 100%;
      height: 22px;
      border-radius: 20px;
      transition: all 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    /* empty slot placeholder */
    .empty-slot {
      width: 100%;
      height: 22px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      border: 1px dashed rgba(246,180,95,0.3);
    }

    /* win overlay */
    .win-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 22, 46, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }
    .win-card {
      background: #0A1F3A;
      border-radius: 56px;
      padding: 32px 24px;
      text-align: center;
      width: 280px;
      border: 2px solid #F6B45F;
      box-shadow: 0 20px 35px black;
    }
    .win-card h2 {
      color: #F6B45F;
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .win-card p {
      color: white;
      margin-bottom: 24px;
      font-size: 1.1rem;
    }
    .next-btn {
      background: #F6B45F;
      font-size: 1.2rem;
      padding: 10px 24px;
    }

    /* footer */
    .footer {
      text-align: center;
      margin-top: 12px;
      color: #6c8fb0;
      font-size: 0.7rem;
    }

    /* pour animation class */
    .tube-pour {
      animation: pourGlow 0.2s ease-out;
    }
    @keyframes pourGlow {
      0% { filter: brightness(1); border-color: #F6B45F; box-shadow: 0 0 0 0 #F6B45F;}
      50% { filter: brightness(1.2); border-color: #FFD966; box-shadow: 0 0 8px 2px #F6B45F;}
      100% { filter: brightness(1); border-color: rgba(246,180,95,0.4);}
    }

    @media (max-width: 500px) {
      .tube { width: 70px; }
      .color-unit, .empty-slot { height: 18px; }
      .tubes-grid { gap: 10px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-header">
    <h1>PACDI Puzzle</h1>
    <div class="sub">water sort · brain trainer</div>
  </div>

  <div class="info-bar">
    <div class="level-box">🔹 SEVİYE <span id="levelValue">1</span></div>
    <button id="restartBtn">⟳ YENİDEN BAŞLAT</button>
  </div>

  <div id="tubesContainer" class="tubes-grid"></div>
  <div class="footer">pacdi.de · zihnini dinlendir</div>
</div>

<script>
  // --------------------  WATER SORT PUZZLE (ES5) --------------------
  // Colors mapping
  var COLOR_LIST = ["#F6B45F", "#2ECC71", "#E74C3C", "#3498DB"];
  var COLOR_NAMES = ["gold", "green", "red", "blue"];
  
  // Game state
  var tubes = [];          // array of arrays (each inner array: bottom to top)
  var initialTubes = [];   // store for restart same level
  var selectedTubeIndex = null;
  var currentLevel = 1;
  var winActive = false;
  
  // DOM elements
  var container = document.getElementById("tubesContainer");
  var levelSpan = document.getElementById("levelValue");
  var restartBtn = document.getElementById("restartBtn");
  
  // helper: deep copy tubes
  function copyTubes(tubesArr) {
    var copy = [];
    for (var i = 0; i < tubesArr.length; i++) {
      copy.push(tubesArr[i].slice());
    }
    return copy;
  }
  
  // check win condition: each tube either empty OR all its units have same color
  function isGameWon() {
    var totalUnits = 0;
    for (var i = 0; i < tubes.length; i++) {
      var tube = tubes[i];
      if (tube.length === 0) continue;
      var firstColor = tube[0];
      for (var j = 1; j < tube.length; j++) {
        if (tube[j] !== firstColor) return false;
      }
      totalUnits += tube.length;
    }
    return totalUnits === 16;   // all 16 units placed in uniform tubes
  }
  
  // pour logic: returns true if pour happened
  function tryPour(srcIdx, dstIdx) {
    if (srcIdx === dstIdx) return false;
    var srcTube = tubes[srcIdx];
    var dstTube = tubes[dstIdx];
    if (srcTube.length === 0) return false;
    if (dstTube.length === 4) return false;
    
    var srcTop = srcTube[srcTube.length - 1];
    // destination empty or top matches
    if (dstTube.length > 0) {
      var dstTop = dstTube[dstTube.length - 1];
      if (srcTop !== dstTop) return false;
    }
    // perform pour (one unit)
    var pouredColor = srcTube.pop();
    dstTube.push(pouredColor);
    
    // add animation effect on both tubes
    animatePour(srcIdx, dstIdx);
    return true;
  }
  
  // small visual animation
  function animatePour(src, dst) {
    var allTubes = document.querySelectorAll('.tube');
    if (allTubes[src]) allTubes[src].classList.add('tube-pour');
    if (allTubes[dst]) allTubes[dst].classList.add('tube-pour');
    setTimeout(function() {
      if (allTubes[src]) allTubes[src].classList.remove('tube-pour');
      if (allTubes[dst]) allTubes[dst].classList.remove('tube-pour');
    }, 200);
  }
  
  // render tubes from current model
  function renderGame() {
    container.innerHTML = '';
    for (var i = 0; i < tubes.length; i++) {
      var tubeData = tubes[i];
      var tubeDiv = document.createElement('div');
      tubeDiv.className = 'tube';
      if (selectedTubeIndex === i) tubeDiv.classList.add('selected');
      tubeDiv.setAttribute('data-index', i);
      
      // we display from bottom to top: we need to show 4 slots (max 4)
      // fill with color blocks from bottom (index 0) to top
      // create 4 slots: for each position (0..3) from bottom to top
      // if tubeData length > position, show color, else show empty placeholder
      for (var slot = 0; slot < 4; slot++) {
        var unitDiv = document.createElement('div');
        // slot 0 = bottom, slot 3 = top. TubeData index 0 = bottom, length-1 = top
        var colorIndex = slot;  // bottom = slot0
        if (slot < tubeData.length) {
          var colorHex = tubeData[slot];
          unitDiv.className = 'color-unit';
          unitDiv.style.backgroundColor = colorHex;
          unitDiv.style.boxShadow = 'inset 0 1px 2px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,200,0.3)';
        } else {
          unitDiv.className = 'empty-slot';
          unitDiv.style.backgroundColor = 'rgba(255,255,245,0.03)';
        }
        tubeDiv.appendChild(unitDiv);
      }
      
      // attach click/touch handler
      tubeDiv.addEventListener('click', (function(idx) {
        return function() { onTubeClick(idx); };
      })(i));
      tubeDiv.addEventListener('touchstart', (function(idx) {
        return function(e) { e.preventDefault(); onTubeClick(idx); };
      })(i));
      container.appendChild(tubeDiv);
    }
  }
  
  // handle tube selection & pour
  function onTubeClick(index) {
    if (winActive) return;
    if (selectedTubeIndex === null) {
      // select only if tube not empty
      if (tubes[index].length > 0) {
        selectedTubeIndex = index;
        renderGame();
      } else {
        // optional feedback
      }
      return;
    }
    // already selected: try to pour
    var success = tryPour(selectedTubeIndex, index);
    // clear selection regardless of success or fail
    selectedTubeIndex = null;
    if (success) {
      renderGame();
      // check win condition after move
      if (isGameWon()) {
        winActive = true;
        showWinScreen();
      }
    } else {
      renderGame();  // just refresh to clear highlight
      // little shake feedback on invalid
      var tubesDiv = document.querySelectorAll('.tube');
      if (tubesDiv[index]) {
        tubesDiv[index].style.transform = 'translateX(3px)';
        setTimeout(function() { if(tubesDiv[index]) tubesDiv[index].style.transform = ''; }, 120);
      }
    }
  }
  
  // create random but playable layout for given level (ensures 16 units, 4 colors each, random distribution)
  function generateRandomLayout() {
    // create color pool: 4 of each color (total 16)
    var colorPool = [];
    for (var c = 0; c < COLOR_LIST.length; c++) {
      for (var q = 0; q < 4; q++) {
        colorPool.push(COLOR_LIST[c]);
      }
    }
    // Fisher-Yates shuffle
    for (var i = colorPool.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = colorPool[i];
      colorPool[i] = colorPool[j];
      colorPool[j] = temp;
    }
    // create 6 empty tubes
    var newTubes = [];
    for (var t = 0; t < 6; t++) newTubes.push([]);
    // distribute colors randomly into tubes with max 4 capacity
    for (var idx = 0; idx < colorPool.length; idx++) {
      var placed = false;
      var attempts = 0;
      while (!placed && attempts < 50) {
        var randTube = Math.floor(Math.random() * 6);
        if (newTubes[randTube].length < 4) {
          newTubes[randTube].push(colorPool[idx]);
          placed = true;
        }
        attempts++;
      }
      // fallback: find first tube with space
      if (!placed) {
        for (var k = 0; k < 6; k++) {
          if (newTubes[k].length < 4) {
            newTubes[k].push(colorPool[idx]);
            break;
          }
        }
      }
    }
    return newTubes;
  }
  
  // ensure initial layout is not already solved (avoid instant win)
  function isLayoutSolved(layout) {
    for (var i = 0; i < layout.length; i++) {
      var tube = layout[i];
      if (tube.length === 0) continue;
      var first = tube[0];
      for (var j = 1; j < tube.length; j++) {
        if (tube[j] !== first) return false;
      }
    }
    var total = 0;
    for (var k = 0; k < layout.length; k++) total += layout[k].length;
    return total === 16;
  }
  
  // generate valid unsolved layout for level
  function getUnsolvedLayout() {
    var maxAttempts = 30;
    for (var attempt = 0; attempt < maxAttempts; attempt++) {
      var candidate = generateRandomLayout();
      if (!isLayoutSolved(candidate)) {
        return candidate;
      }
    }
    // fallback: manually create one that is not solved
    var fallback = [[],[],[],[],[],[]];
    var colors = COLOR_LIST.slice();
    // push 4 of each but messy distribution
    var messy = [];
    for (var ci=0; ci<colors.length; ci++) {
      for (var cc=0; cc<4; cc++) messy.push(colors[ci]);
    }
    // shuffle
    for (var s=messy.length-1; s>0; s--) { var r=Math.floor(Math.random()*(s+1)); var tmp=messy[s]; messy[s]=messy[r]; messy[r]=tmp; }
    var idxM=0;
    for (var tubeIdx=0; tubeIdx<6; tubeIdx++) {
      var cap = 4;
      while(fallback[tubeIdx].length < cap && idxM < messy.length) {
        fallback[tubeIdx].push(messy[idxM]);
        idxM++;
      }
    }
    return fallback;
  }
  
  // set new level (random layout)
  function setupNewLevel() {
    var newLayout = getUnsolvedLayout();
    tubes = copyTubes(newLayout);
    initialTubes = copyTubes(newLayout);
    selectedTubeIndex = null;
    winActive = false;
    removeWinOverlay();
    renderGame();
  }
  
  // restart current level (reset to initial saved layout)
  function restartLevel() {
    if (winActive) return;
    tubes = copyTubes(initialTubes);
    selectedTubeIndex = null;
    renderGame();
  }
  
  // level up: increase level counter, generate fresh layout, update UI
  function nextLevel() {
    currentLevel++;
    levelSpan.innerText = currentLevel;
    var newLayout = getUnsolvedLayout();
    tubes = copyTubes(newLayout);
    initialTubes = copyTubes(newLayout);
    selectedTubeIndex = null;
    winActive = false;
    removeWinOverlay();
    renderGame();
  }
  
  // win screen modal
  function showWinScreen() {
    var overlay = document.createElement('div');
    overlay.className = 'win-overlay';
    overlay.id = 'winOverlay';
    overlay.innerHTML = '<div class="win-card"><h2>🎉 KAZANDIN! 🎉</h2><p>Harika bir hamle!</p><button id="nextLevelBtn" class="next-btn">▶ SONRAKİ SEVİYE</button></div>';
    document.body.appendChild(overlay);
    var nextBtn = document.getElementById('nextLevelBtn');
    if (nextBtn) {
      nextBtn.addEventListener('click', function() {
        nextLevel();
      });
      nextBtn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        nextLevel();
      });
    }
  }
  
  function removeWinOverlay() {
    var existing = document.getElementById('winOverlay');
    if (existing) existing.remove();
  }
  
  // restart button event
  restartBtn.addEventListener('click', function() {
    if (winActive) return;
    restartLevel();
  });
  restartBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (winActive) return;
    restartLevel();
  });
  
  // initial game start
  function initGame() {
    currentLevel = 1;
    levelSpan.innerText = currentLevel;
    var startLayout = getUnsolvedLayout();
    tubes = copyTubes(startLayout);
    initialTubes = copyTubes(startLayout);
    selectedTubeIndex = null;
    winActive = false;
    renderGame();
  }
  
  initGame();
</script>
</body>
</html>
