<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wohnrente Berater | SilverCompass</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#f0e4ce; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:620px; width:100%; background:#fffaf2; border-radius:48px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.1); border:1px solid #e6d5b8; text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.4rem; font-weight:800; color:#1a3a5c; }
        .logo span { color:#d4af37; }
        .back-link { color:#d4af37; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#fffaf2; padding:5px 12px; border-radius:40px; border:1px solid #d4af37; }
        .lang-selector { display:flex; gap:6px; margin-bottom:12px; justify-content:flex-end; }
        .lang-btn { background:#fffaf2; border:1px solid #1a3a5c; color:#1a3a5c; font-size:0.7rem; padding:3px 10px; border-radius:30px; cursor:pointer; }
        .lang-btn.active { background:#1a3a5c; color:#fffaf2; }
        .question-area { background:#faf3e6; border-radius:28px; padding:20px 16px; margin-bottom:20px; text-align:left; }
        .step-indicator { color:#6c757d; font-size:0.7rem; margin-bottom:10px; }
        .question-text { font-size:1rem; font-weight:bold; color:#1a3a5c; margin-bottom:16px; }
        .options-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
        .opt-btn { background:#fffaf2; border:2px solid #d4af37; border-radius:60px; padding:12px 8px; font-weight:bold; color:#1a3a5c; cursor:pointer; font-size:0.85rem; text-align:center; }
        .opt-btn:active { background:#d4af37; color:#fffaf2; transform:scale(0.96); }
        .result-box { background:#faf3e6; border-radius:28px; padding:20px; margin-top:20px; border:2px solid #d4af37; text-align:left; }
        .result-title { font-size:1.3rem; font-weight:800; color:#1a3a5c; margin-bottom:10px; }
        .result-detail { color:#333; font-size:0.85rem; line-height:1.6; margin-bottom:12px; }
        .option-card { background:#fffaf2; border-radius:16px; padding:14px; margin:10px 0; border-left:4px solid #d4af37; }
        .option-card.empfohlen { border-left-color:#28a745; background:rgba(40,167,69,0.05); }
        .option-title { font-weight:bold; color:#1a3a5c; margin-bottom:6px; }
        .pro { color:#28a745; }
        .contra { color:#dc3545; }
        .niessbrauch-badge { background:rgba(212,175,55,0.15); border-left:4px solid #d4af37; padding:10px; border-radius:10px; margin-top:8px; font-size:0.75rem; color:#1a3a5c; }
        .partner-box { background:rgba(212,175,55,0.1); border:1px solid #d4af37; border-radius:20px; padding:16px; margin-top:16px; text-align:center; }
        .partner-title { color:#1a3a5c; font-weight:bold; margin-bottom:10px; }
        .partner-btn { display:inline-block; background:#d4af37; color:#fffaf2; font-weight:bold; padding:8px 16px; border-radius:40px; font-size:0.8rem; text-decoration:none; margin:4px; }
        .partner-btn.outline { background:transparent; border:2px solid #d4af37; color:#1a3a5c; }
        .warning-box { background:rgba(220,53,69,0.1); border-left:4px solid #dc3545; padding:12px; border-radius:12px; margin:12px 0; font-size:0.8rem; }
        .community-box { background:rgba(40,167,69,0.1); border-left:4px solid #28a745; padding:12px; border-radius:12px; margin:12px 0; font-size:0.8rem; }
        .back-btn { background:transparent; border:1px solid #1a3a5c; color:#1a3a5c; padding:8px 16px; border-radius:40px; cursor:pointer; font-weight:bold; margin-top:10px; }
        .footer { text-align:center; font-size:0.6rem; color:#6c757d; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo">Silver<span>Compass</span></div>
        <a href="index.html" class="back-link" id="backLink">← Zurück</a>
    </div>
    <div class="lang-selector" id="langSelector">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="question-area" id="questionArea">
        <div class="step-indicator" id="stepIndicator"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsGrid"></div>
        <button class="back-btn" id="backBtn" style="display:none;">← Zurück</button>
    </div>
    <div class="footer" id="footerText">SilverCompass · Ihr Immobilienrente-Berater</div>
</div>
<script>
(function(){
    var langData = {
        de: {
            title: "WOHNRENTE BERATER",
            back: "← Zurück",
            steps: "Schritt {0} von {1}",
            footer: "SilverCompass · Ihr Immobilienrente-Berater",
            resultTitle: "Ihre Wohnrente-Empfehlung",
            teilverkauf: "Teilverkauf",
            umkehrhypothek: "Umkehrhypothek",
            vermietung: "Vermietung + Umzug",
            nichts: "Nichts tun",
            empfohlen: "Empfohlen",
            vorteile: "Vorteile",
            nachteile: "Nachteile",
            erben: "Auswirkungen auf Erben",
            niessbrauchInfo: "⚖ Bestehen Sie auf ein Nießbrauchrecht im Grundbuch – es sichert Ihr lebenslanges Wohnrecht.",
            partnerTitle: "Vertrauenswürdige Partner",
            partnerBtn: "Jetzt informieren",
            communityTitle: "Gemeinschaftshilfe",
            communityText: "Viele türkische Rentner sind in Vereinen. Sie sind nicht allein."
        },
        tr: {
            title: "KONUT EMEKLİLİĞİ BERATER",
            back: "← Geri",
            steps: "Adım {0} / {1}",
            footer: "SilverCompass · Konut emekliliği danışmanınız",
            resultTitle: "Konut Emekliliği Öneriniz",
            teilverkauf: "Kısmi Satış",
            umkehrhypothek: "Ters İpotek",
            vermietung: "Kiraya Verme + Taşınma",
            nichts: "Hiçbir şey yapma",
            empfohlen: "Önerilen",
            vorteile: "Avantajlar",
            nachteile: "Dezavantajlar",
            erben: "Mirasçılara Etkisi",
            niessbrauchInfo: "⚖ Tapuda Nießbrauchrecht isteyin – ömür boyu oturma hakkınız korunur.",
            partnerTitle: "Güvenilir Partnerler",
            partnerBtn: "Şimdi bilgi al",
            communityTitle: "Topluluk Dayanışması",
            communityText: "Almanya'daki birçok Türk emekli dernek veya DİTİB üyesidir. Yalnız değilsiniz."
        },
        en: {
            title: "HOME EQUITY ADVISOR",
            back: "← Back",
            steps: "Step {0} of {1}",
            footer: "SilverCompass · Your home equity advisor",
            resultTitle: "Your Home Equity Recommendation",
            teilverkauf: "Partial Sale",
            umkehrhypothek: "Reverse Mortgage",
            vermietung: "Rent Out + Move",
            nichts: "Do Nothing",
            empfohlen: "Recommended",
            vorteile: "Advantages",
            nachteile: "Disadvantages",
            erben: "Impact on Heirs",
            niessbrauchInfo: "⚖ Insist on Nießbrauchrecht in the land register – it guarantees lifelong residence.",
            partnerTitle: "Trusted Partners",
            partnerBtn: "Get info",
            communityTitle: "Community Support",
            communityText: "Many Turkish retirees are members of associations or DİTİB. You are not alone."
        }
    };
    var currentLang = 'de';
    var currentStep = 0;
    var answers = {};
    var questions = [
        { question:"Wie hoch ist der Wert Ihrer Immobilie?", opts:["Unter 200.000 €","200.000–400.000 €","Über 400.000 €"], key:"immowert", values:["niedrig","mittel","hoch"] },
        { question:"Haben Sie Erben, die das Haus behalten wollen?", opts:["Ja, wichtig","Ja, flexibel","Nein"], key:"erben", values:["wichtig","flexibel","keine"] },
        { question:"Benötigen Sie zusätzliches Einkommen?", opts:["Ja, dringend","Etwas hilfreich","Nein"], key:"einkommen", values:["dringend","hilfreich","ausreichend"] },
        { question:"Wie alt sind Sie?", opts:["Unter 65","65–75","Über 75"], key:"alter", values:["jung","mittel","alt"] }
    ];
    var totalSteps = questions.length;

    function updateLanguage() {
        var t = langData[currentLang];
        document.getElementById('footerText').innerText = t.footer;
        document.getElementById('backBtn').innerText = t.back;
    }
    function setLanguage(lang) {
        currentLang = lang; updateLanguage();
        var btns = document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
        if(currentStep < totalSteps) renderQuestion(); else renderResult();
    }
    function renderQuestion() {
        var q = questions[currentStep];
        var t = langData[currentLang];
        document.getElementById('stepIndicator').innerText = t.steps.replace('{0}',currentStep+1).replace('{1}',totalSteps);
        document.getElementById('questionText').innerText = q.question;
        var grid = document.getElementById('optionsGrid'); grid.innerHTML = '';
        for(var i=0;i<q.opts.length;i++) {
            var btn = document.createElement('button'); btn.className='opt-btn'; btn.innerText=q.opts[i];
            btn.addEventListener('click', (function(key,value){ return function(){
                answers[key]=value; currentStep++;
                if(currentStep<totalSteps) renderQuestion(); else renderResult();
            };})(q.key, q.values[i]));
            grid.appendChild(btn);
        }
        document.getElementById('backBtn').style.display = currentStep>0 ? 'inline-block' : 'none';
    }
    function renderResult() {
        var t = langData[currentLang];
        var optionen = [];
        if(answers.immowert === 'hoch' && answers.erben === 'flexibel' && answers.einkommen === 'dringend')
            optionen.push({ name:t.teilverkauf, empfohlen:true, pro:"Sofort Liquidität, Sie bleiben wohnen", contra:"Weniger Erbe", erben:"Erben erhalten weniger", niessbrauch:true });
        else if(answers.immowert !== 'niedrig')
            optionen.push({ name:t.teilverkauf, empfohlen:false, pro:"Sofort Liquidität", contra:"Weniger Erbe", erben:"Erben erhalten weniger", niessbrauch:true });

        if(answers.alter === 'alt' && answers.erben === 'keine' && answers.einkommen === 'dringend')
            optionen.push({ name:t.umkehrhypothek, empfohlen:true, pro:"Monatliche Rente", contra:"Hohe Zinsen, Immobilie geht an Bank", erben:"Kaum Erbe", niessbrauch:true });
        else if(answers.erben !== 'wichtig')
            optionen.push({ name:t.umkehrhypothek, empfohlen:false, pro:"Monatliche Rente", contra:"Hohe Zinsen", erben:"Kaum Erbe", niessbrauch:true });

        if(answers.immowert === 'mittel' && answers.erben === 'wichtig' && answers.einkommen !== 'ausreichend')
            optionen.push({ name:t.vermietung, empfohlen:true, pro:"Regelmäßige Mieteinnahmen, Haus bleibt in Familie", contra:"Umzugsstress", erben:"Haus bleibt vollständig erhalten", niessbrauch:false });
        else if(answers.erben === 'wichtig')
            optionen.push({ name:t.vermietung, empfohlen:false, pro:"Mieteinnahmen", contra:"Umzugsstress", erben:"Haus bleibt erhalten", niessbrauch:false });

        if(answers.einkommen === 'ausreichend' || answers.erben === 'wichtig')
            optionen.push({ name:t.nichts, empfohlen:true, pro:"Keine Veränderung, volle Kontrolle", contra:"Keine zusätzliche Liquidität", erben:"Maximale Erbmasse", niessbrauch:false });
        else
            optionen.push({ name:t.nichts, empfohlen:false, pro:"Keine Veränderung", contra:"Keine Liquidität", erben:"Maximale Erbmasse", niessbrauch:false });

        var html = '<div class="result-box"><div class="result-title">' + t.resultTitle + '</div>';
        for(var i=0;i<optionen.length;i++) {
            var o = optionen[i];
            html += '<div class="option-card' + (o.empfohlen ? ' empfohlen' : '') + '">';
            html += '<div class="option-title">' + (o.empfohlen ? '⭐ ' + t.empfohlen + ': ' : '') + o.name + '</div>';
            html += '<p><span class="pro">✅ ' + t.vorteile + ':</span> ' + o.pro + '</p>';
            html += '<p><span class="contra">⚠ ' + t.nachteile + ':</span> ' + o.contra + '</p>';
            html += '<p>📜 ' + t.erben + ': ' + o.erben + '</p>';
            if(o.niessbrauch) html += '<div class="niessbrauch-badge">' + t.niessbrauchInfo + '</div>';
            html += '</div>';
        }
        html += '<div class="partner-box"><div class="partner-title">🤝 ' + t.partnerTitle + '</div>';
        html += '<a href="https://www.deutsche-teilkauf.de" target="_blank" class="partner-btn">' + t.partnerBtn + ': Deutsche Teilkauf</a>';
        html += '<a href="https://www.wertfaktor.de" target="_blank" class="partner-btn outline">' + t.partnerBtn + ': Wertfaktor</a></div>';
        html += '<div class="warning-box"><strong>⚠ Achtung:</strong> Unverbindliche Ersteinschätzung.</div>';
        html += '<div class="community-box"><strong>🤝 ' + t.communityTitle + ':</strong><br>' + t.communityText + '</div>';
        html += '<button class="back-btn" onclick="resetBerater()">Wiederholen</button></div>';
        document.getElementById('questionArea').innerHTML = html;
        document.getElementById('backBtn').style.display = 'none';
    }
    window.resetBerater = function() {
        currentStep = 0; answers = {};
        document.getElementById('questionArea').innerHTML = '<div class="step-indicator" id="stepIndicator"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><button class="back-btn" id="backBtn" style="display:none;">← Zurück</button>';
        updateLanguage(); renderQuestion();
    };
    document.getElementById('backBtn').addEventListener('click', function(){ if(currentStep>0){ currentStep--; renderQuestion(); } });
    var langBtns = document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var lang=this.getAttribute('data-lang'); if(lang!==currentLang) setLanguage(lang); });
    setLanguage('de'); renderQuestion();
})();
</script>
</body>
</html>
