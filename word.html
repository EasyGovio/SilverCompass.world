<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kelime Türetme</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(145deg, #071626, #0a1f2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .game-container {
            max-width: 550px;
            width: 100%;
            background: linear-gradient(135deg, #fffaf0, #fdf4e0);
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            overflow: hidden;
            text-align: center;
        }
        .header { background: #0a2a3b; padding: 18px; border-bottom: 3px solid #e6b422; color: #ffdf8c; }
        .stats { display: flex; justify-content: space-between; background: #1f2f3a; margin: 16px; padding: 8px 16px; border-radius: 60px; color: #f7ecc7; }
        .letters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        .letter-box {
            width: 60px;
            height: 60px;
            background: #e6b422;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 20px;
            color: #0a2a3b;
            box-shadow: 0 4px 0 #8b5a2b;
        }
        input {
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 60px;
            border: 2px solid #e6b422;
            outline: none;
            width: 80%;
            margin: 10px;
        }
        button { background: #e6b422; border: none; padding: 8px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 5px; }
        .word-list { background: #ebdfbd; margin: 20px; padding: 10px; border-radius: 40px; max-height: 150px; overflow-y: auto; }
        .message { margin: 10px 20px 20px; background: #ebdfbd; padding: 8px; border-radius: 60px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header"><h2>📖 Kelime Türetme</h2></div>
    <div class="stats">
        <div>📝 Bulunan: <span id="foundCount">0</span></div>
        <button id="newLettersBtn">Yeni Harfler</button>
    </div>
    <div id="lettersContainer" class="letters"></div>
    <input type="text" id="wordInput" placeholder="Harfleri kullanarak kelime yaz...">
    <button id="submitBtn">Kontrol Et</button>
    <div class="word-list">
        <strong>Bulduğun kelimeler:</strong>
        <div id="foundWords"></div>
    </div>
    <div id="message" class="message">Verilen harflerden anlamlı kelimeler türet.</div>
</div>
<script>
    let currentLetters = [];
    let foundWords = [];
    const letterPool = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','R','S','T','U','V','Y','Z'];
    // Örnek kelime listesi (gerçek uygulamada daha kapsamlı bir sözlük gerekir)
    const validWords = ["ATA", "ANA", "CAN", "DEN", "EDA", "ELMA", "KALEM", "MAS", "SAP", "TAŞ", "YOL", "SEL", "KOL", "DAL", "BAL", "GÜL", "SES", "TEST", "KASA", "MASA"];
    
    function getRandomLetters(count = 6) {
        let letters = [];
        for(let i=0; i<count; i++) {
            letters.push(letterPool[Math.floor(Math.random() * letterPool.length)]);
        }
        return letters;
    }

    function renderLetters() {
        const container = document.getElementById('lettersContainer');
        container.innerHTML = '';
        currentLetters.forEach(l => {
            const box = document.createElement('div');
            box.className = 'letter-box';
            box.innerText = l;
            container.appendChild(box);
        });
    }

    function canFormWord(word, letters) {
        let temp = [...letters];
        for(let ch of word) {
            let idx = temp.indexOf(ch);
            if(idx === -1) return false;
            temp.splice(idx,1);
        }
        return true;
    }

    function checkWord() {
        const input = document.getElementById('wordInput');
        let word = input.value.trim().toUpperCase();
        if(word.length < 2) {
            document.getElementById('message').innerText = "En az 2 harfli kelime girin.";
            return;
        }
        if(foundWords.includes(word)) {
            document.getElementById('message').innerText = "Bu kelimeyi zaten buldunuz!";
            return;
        }
        if(!validWords.includes(word)) {
            document.getElementById('message').innerText = "Geçerli bir kelime değil (örnek liste).";
            return;
        }
        if(!canFormWord(word, currentLetters)) {
            document.getElementById('message').innerText = "Bu kelimeyi mevcut harflerle oluşturamazsınız.";
            return;
        }
        foundWords.push(word);
        document.getElementById('foundWords').innerHTML = foundWords.join(', ');
        document.getElementById('foundCount').innerText = foundWords.length;
        document.getElementById('message').innerText = `✓ "${word}" bulundu! Devam et.`;
        input.value = '';
    }

    function newGame() {
        currentLetters = getRandomLetters(6);
        renderLetters();
        foundWords = [];
        document.getElementById('foundWords').innerHTML = '';
        document.getElementById('foundCount').innerText = '0';
        document.getElementById('message').innerText = "Yeni harfler! Kelime türetmeye başla.";
        document.getElementById('wordInput').value = '';
    }

    document.getElementById('newLettersBtn').addEventListener('click', newGame);
    document.getElementById('submitBtn').addEventListener('click', checkWord);
    document.getElementById('wordInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkWord(); });
    newGame();
</script>
</body>
</html>
