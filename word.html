<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kelime Türetme | SilverCompass</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      background: #1a3a5c;
      font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .game-container {
      max-width: 600px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 20px;
      border: 1px solid rgba(246,180,95,0.4);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 20px;
      color: #FFFFFF;
    }
    .logo { font-size: 1.4rem; font-weight: bold; }
    .logo span { color: #F6B45F; }
    .back-link { color: #F6B45F; text-decoration: none; font-size: 0.9rem; }
    .stats {
      display: flex;
      justify-content: space-between;
      background: rgba(0,0,0,0.3);
      padding: 10px 16px;
      border-radius: 60px;
      margin: 15px 0;
      color: #eaf2fb;
    }
    .stats div { background: #1a3a5c; padding: 4px 12px; border-radius: 40px; }
    button {
      background: #F6B45F;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    .letters {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .letter-box {
      width: 70px;
      height: 70px;
      background: #F6B45F;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      border-radius: 20px;
      color: #1a3a5c;
      cursor: pointer;
      transition: 0.05s linear;
      touch-action: manipulation;
    }
    .letter-box:active { transform: scale(0.95); }
    .input-area { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; justify-content: center; }
    input {
      flex: 2;
      padding: 14px;
      font-size: 1.2rem;
      text-align: center;
      border-radius: 60px;
      border: 2px solid #F6B45F;
      outline: none;
      background: #FFFFFF;
      font-weight: bold;
    }
    .word-list { background: rgba(0,0,0,0.2); margin: 15px 0; padding: 12px; border-radius: 24px; max-height: 140px; overflow-y: auto; }
    .word-tag { background: #F6B45F; color: #1a3a5c; padding: 4px 12px; border-radius: 30px; display: inline-block; margin: 4px; font-size: 0.85rem; font-weight: bold; }
    .message { text-align: center; margin-top: 15px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 40px; color: #eaf2fb; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="logo">Silver<span>Compass</span></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>
  <div class="stats">
    <div>📝 Bulunan: <span id="foundCount">0</span></div>
    <div>⏱️ Süre: <span id="timer">00:00</span></div>
    <div>🏆 En İyi: <span id="bestScore">—</span></div>
    <button id="resetBtn">🔄 Yeni Harfler</button>
  </div>
  <div id="lettersContainer" class="letters"></div>
  <div class="input-area">
    <input type="text" id="wordInput" placeholder="Harflere tıkla veya yaz...">
    <button id="submitBtn">✓ Kontrol</button>
  </div>
  <div class="word-list" id="foundWordsList"></div>
  <div class="message" id="message">Harflere tıkla, kelime oluştur.</div>
</div>
<script>
  var validWords = new Set(["ATA","ANA","CAN","DEN","EDA","ELMA","KALEM","MAS","SAP","TAS","YOL","SEL","KOL","DAL","BAL","GUL","SES","TEST","KASA","MASA","AL","AT","AN","BE","CE","DE","EL","EN","ES","ET","GE","IL","IN","LA","LE","ME","NE","OL","SE","TE","YE","YA","KAL","MAL","SAL","TAL","YAL","AK","EK","IK","OK","UC","BES","ALT","BIR","IKI","DORT","ALTI","YEDI","SEKIZ","DOKUZ","CAN","DEN","GUN","SU","IS","SUT","CAM","KAP","KIT","TIP","DIP","LALE","MAL","SAL","YOL","TEL","HAL","BAL","GUL","KUL","SEL","KOL","DAL","YAL","KAR","MAR","PAR","TAR","ZAR","FIR","SIR","KIR","TIR","MIR","NAR","SAR","VAR","YAR","CIR","KIS","TIS","VIS","MIS","NIS","PIS","SIS","TIS","YIS","ZIS"]);
  var currentLetters = [], foundWords = [], timerSeconds = 0, timerInterval = null, gameActive = true;
  var bestKey = "wordBest";
  function updateBestDisplay() { var best = localStorage.getItem(bestKey); document.getElementById("bestScore").innerText = best ? best : "—"; }
  function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = null; }
  function startTimer() { stopTimer(); timerInterval = setInterval(function(){ if(gameActive){ timerSeconds++; document.getElementById("timer").innerText = Math.floor(timerSeconds/60)+":"+(timerSeconds%60<10?"0"+timerSeconds%60:timerSeconds%60); } },1000); }
  function getRandomLetters() { var pool = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N","O","P","R","S","T","U","V","Y","Z","U","G","S","I","O","C"]; var arr=[]; for(var i=0;i<6;i++) arr.push(pool[Math.floor(Math.random()*pool.length)]); return arr; }
  function renderLetters() { var container = document.getElementById("lettersContainer"); container.innerHTML = ""; for(var i=0;i<currentLetters.length;i++) { var box = document.createElement("div"); box.className = "letter-box"; box.innerText = currentLetters[i]; box.addEventListener("click", (function(letter){ return function(e){ e.preventDefault(); document.getElementById("wordInput").value += letter; }; })(currentLetters[i])); box.addEventListener("touchstart", (function(letter){ return function(e){ e.preventDefault(); document.getElementById("wordInput").value += letter; }; })(currentLetters[i])); container.appendChild(box); } }
  function canFormWord(word, letters) { var temp = letters.slice(); for(var i=0;i<word.length;i++) { var idx = temp.indexOf(word[i]); if(idx===-1) return false; temp.splice(idx,1); } return true; }
  function updateFoundList() { var container = document.getElementById("foundWordsList"); container.innerHTML = ""; for(var i=0;i<foundWords.length;i++) { var tag = document.createElement("span"); tag.className = "word-tag"; tag.innerText = foundWords[i]; container.appendChild(tag); } document.getElementById("foundCount").innerText = foundWords.length; }
  function checkWord() { var input = document.getElementById("wordInput"); var word = input.value.trim().toUpperCase(); if(word.length<2) { document.getElementById("message").innerText = "En az 2 harfli kelime girin."; return; } if(foundWords.indexOf(word)!==-1) { document.getElementById("message").innerText = "Bu kelimeyi zaten buldunuz!"; return; } if(!validWords.has(word)) { document.getElementById("message").innerText = "Geçerli bir kelime değil."; return; } if(!canFormWord(word, currentLetters)) { document.getElementById("message").innerText = "Bu harflerle oluşamaz."; return; } foundWords.push(word); updateFoundList(); document.getElementById("message").innerText = "✓ "+word+" bulundu!"; input.value = ""; if(foundWords.length === 15) { gameActive=false; stopTimer(); var best=localStorage.getItem(bestKey); if(!best||timerSeconds<parseInt(best)){ localStorage.setItem(bestKey,timerSeconds); updateBestDisplay(); document.getElementById("message").innerHTML = "🎉 TEBRİKLER! Yeni rekor! 🎉"; } } }
  function resetGame() { stopTimer(); timerSeconds=0; document.getElementById("timer").innerText="0:00"; gameActive=true; currentLetters = getRandomLetters(); renderLetters(); foundWords=[]; updateFoundList(); document.getElementById("wordInput").value=""; document.getElementById("message").innerText="Yeni harfler! Tıkla veya yaz."; startTimer(); }
  document.getElementById("submitBtn").addEventListener("click", checkWord); document.getElementById("resetBtn").addEventListener("click", resetGame); document.getElementById("wordInput").addEventListener("keypress", function(e){ if(e.key==="Enter") checkWord(); });
  resetGame(); updateBestDisplay();
</script>
</body>
</html>
