<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kelime Türetme | Beyin Egzersizi</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(145deg, #071626, #0a1f2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            overflow-y: auto; /* sayfa kaymasına izin ver ama içerikte engelleyeceğiz */
        }
        .game-container {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(135deg, #fffaf0, #fdf4e0);
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            overflow: hidden;
            text-align: center;
            /* mobil kaydırmayı engellemek için */
            touch-action: pan-y pinch-zoom; /* yatay kaydırmayı engelle, dikeye izin ver */
        }
        .header { background: #0a2a3b; padding: 18px; border-bottom: 3px solid #e6b422; color: #ffdf8c; }
        .stats { display: flex; justify-content: space-between; background: #1f2f3a; margin: 16px; padding: 8px 16px; border-radius: 60px; color: #f7ecc7; }
        .score { background: #00000055; padding: 4px 16px; border-radius: 40px; }
        button { background: #e6b422; border: none; padding: 6px 18px; border-radius: 40px; font-weight: bold; cursor: pointer; font-family: inherit; touch-action: manipulation; }
        .letters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 20px;
            flex-wrap: wrap;
        }
        .letter-box {
            width: 70px;
            height: 70px;
            background: #e6b422;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 20px;
            color: #0a2a3b;
            box-shadow: 0 4px 0 #8b5a2b;
            cursor: pointer;
            transition: 0.05s linear;
            user-select: none;
            touch-action: manipulation; /* mobil yakınlaştırma/kaydırmayı engeller */
        }
        .letter-box:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin: 10px 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        input {
            flex: 2;
            padding: 14px;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 60px;
            border: 2px solid #e6b422;
            outline: none;
            background: #fffef7;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 20px 20px;
        }
        .word-list { background: #ebdfbd; margin: 20px; padding: 12px; border-radius: 40px; max-height: 160px; overflow-y: auto; text-align: left; }
        .word-list strong { display: block; margin-bottom: 8px; color: #1e4a6e; }
        #foundWords { display: flex; flex-wrap: wrap; gap: 8px; }
        .word-tag {
            background: #e6b42230;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #2c5a44;
        }
        .message { margin: 10px 20px 20px; background: #ebdfbd; padding: 8px; border-radius: 60px; font-weight: bold; font-size: 0.85rem; }
        @media (max-width: 550px) {
            .letter-box { width: 55px; height: 55px; font-size: 1.5rem; }
            input { font-size: 1rem; padding: 10px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header"><h2>📖 Kelime Türetme</h2></div>
    <div class="stats">
        <div class="score">📝 Bulunan: <span id="foundCount">0</span></div>
        <button id="newLettersBtn">🔄 Yeni Harfler</button>
    </div>
    <div id="lettersContainer" class="letters"></div>
    <div class="input-area">
        <input type="text" id="wordInput" placeholder="Harflere tıkla veya yaz...">
        <button id="submitBtn">✓ Kontrol</button>
    </div>
    <div class="action-buttons">
        <button id="clearBtn">🗑️ Temizle</button>
        <button id="backspaceBtn">⌫ Geri Al</button>
    </div>
    <div class="word-list">
        <strong>✅ Bulduğun kelimeler:</strong>
        <div id="foundWords"></div>
    </div>
    <div id="message" class="message">Harflere tıkla kelime oluştur, sonra Kontrol et.</div>
</div>
<script>
    let currentLetters = [];
    let foundWords = [];
    const letterPool = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','R','S','T','U','V','Y','Z','Ü','Ğ','Ş','İ','Ö','Ç'];
    
    const lettersContainer = document.getElementById('lettersContainer');
    const wordInput = document.getElementById('wordInput');
    const submitBtn = document.getElementById('submitBtn');
    const newLettersBtn = document.getElementById('newLettersBtn');
    const clearBtn = document.getElementById('clearBtn');
    const backspaceBtn = document.getElementById('backspaceBtn');
    const foundWordsDiv = document.getElementById('foundWords');
    const foundCountSpan = document.getElementById('foundCount');
    const messageDiv = document.getElementById('message');
    
    function getRandomLetters(count = 6) {
        let letters = [];
        for(let i=0; i<count; i++) {
            letters.push(letterPool[Math.floor(Math.random() * letterPool.length)]);
        }
        return letters;
    }
    
    // Kaydırmayı engelleyen olay işleyici - kesin çözüm
    function preventScroll(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
    
    function handleLetterTap(letter, event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }
        wordInput.value += letter;
        wordInput.focus();
        // input sonuna kaydır (isteğe bağlı)
        wordInput.scrollLeft = wordInput.scrollWidth;
    }
    
    function renderLetters() {
        lettersContainer.innerHTML = '';
        currentLetters.forEach((letter) => {
            const box = document.createElement('div');
            box.className = 'letter-box';
            box.innerText = letter;
            // Hem click hem touchstart için preventDefault ile kaymayı engelle
            box.addEventListener('click', (e) => {
                e.preventDefault();
                handleLetterTap(letter, e);
            });
            box.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleLetterTap(letter, e);
            });
            lettersContainer.appendChild(box);
        });
    }
    
    // Sadece harf kombinasyonunu kontrol et (anlamlı kelime kontrolü yok)
    function canFormWord(word, letters) {
        let temp = [...letters];
        for(let ch of word) {
            let idx = temp.indexOf(ch);
            if(idx === -1) return false;
            temp.splice(idx, 1);
        }
        return true;
    }
    
    // Basit kelime geçerlilik: en az 2 harf ve sadece harflerden oluşmalı (Türkçe karakterlere izin ver)
    function isValidWord(word) {
        if (word.length < 2) return false;
        // sadece harf ve Türkçe karakterler
        return /^[A-ZÜĞŞİÖÇ]+$/i.test(word);
    }
    
    function checkWord() {
        let word = wordInput.value.trim().toUpperCase();
        if (!isValidWord(word)) {
            messageDiv.innerText = "❌ En az 2 harfli ve sadece harf içeren bir kelime girin.";
            return;
        }
        if (foundWords.includes(word)) {
            messageDiv.innerText = "⚠️ Bu kelimeyi zaten buldunuz!";
            return;
        }
        if (!canFormWord(word, currentLetters)) {
            messageDiv.innerText = "🔤 Bu kelimeyi mevcut harflerle oluşturamazsınız.";
            return;
        }
        // Artık tüm kontroller geçildi, kelime geçerli sayılıyor
        foundWords.push(word);
        updateFoundWordsList();
        messageDiv.innerText = `✅ "${word}" bulundu! Devam et.`;
        wordInput.value = '';
    }
    
    function updateFoundWordsList() {
        foundWordsDiv.innerHTML = '';
        foundWords.forEach(w => {
            const tag = document.createElement('span');
            tag.className = 'word-tag';
            tag.innerText = w;
            foundWordsDiv.appendChild(tag);
        });
        foundCountSpan.innerText = foundWords.length;
    }
    
    function newGame() {
        currentLetters = getRandomLetters(6);
        renderLetters();
        foundWords = [];
        updateFoundWordsList();
        wordInput.value = '';
        messageDiv.innerText = "Yeni harfler! Harflere tıkla veya yazarak kelime oluştur.";
    }
    
    function clearInput() {
        wordInput.value = '';
        wordInput.focus();
    }
    
    function backspace() {
        wordInput.value = wordInput.value.slice(0, -1);
        wordInput.focus();
    }
    
    submitBtn.addEventListener('click', checkWord);
    newLettersBtn.addEventListener('click', newGame);
    clearBtn.addEventListener('click', clearInput);
    backspaceBtn.addEventListener('click', backspace);
    wordInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') checkWord();
    });
    
    // Sayfa kaymasını tamamen engellemek için document seviyesinde touchmove yakalama (sadece oyun alanında)
    document.body.addEventListener('touchmove', function(e) {
        // Eğer dokunulan hedef .letter-box veya onun içindeyse kaydırmayı engelle
        let target = e.target;
        if (target.closest && target.closest('.letter-box')) {
            e.preventDefault();
        }
    }, { passive: false });
    
    newGame();
</script>
</body>
</html>
